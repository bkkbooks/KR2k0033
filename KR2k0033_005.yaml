body:
  text: 滇畧卷五明謝肇淛撰績畧炎徼殊域隔絶中華不有作者孰造草昧自周以來上下二千載矣將帥披荆榛以戡亂使臣銜王命以宣教監司守令撫瘡痍以致太平皆出萬死一生殫精竭知然後革蛇豕之俗奏尺寸之功何容易也金碧不泐滇洱無波蘋薦相仍棠隂未改後之蒞兹土者覩難而思易攷前喆而景行焉則幾矣周莊蹻者楚莊王裔也威王時為將軍將兵循沅江畧巴黔以西軍至苴蘭㭬船於岸而步戰遂滅夜郎至滇池方三百里池旁平地肥饒千里以兵威定属楚㑹秦司馬錯伐楚取黔中道絶不通因王之西南夷之有楚風自蹻始也蹻將小卜者戰死於姚姚人立祠祀之漢司馬遷元封元年以郎中奉使巴蜀南畧卭莋昆明報命司馬相如元封二年以中郎將持節開越嶲與副使王然于壺充國吕越人馳四乘之𫝊畧定西夷卭莋冉駹楪榆諸君長請為臣相如至若水楪人張叔盛覽等皆往受學文獻于是乎始郭昌元封初以將軍率八校尉擊苴蘭斬首數萬遂平南夷為牂牁郡諸夷皆震恐請臣置吏昌復發巴蜀兵擊滅勞深靡莫以兵威諭滇滇王舉國降元封六年益州昆明反復以昌為㧞胡將軍討定之時有中郎將衛廣者與昌同行其後有水衡都尉吕辟胡軍正王平大鴻臚田廣明句町侯亡波皆擊夷有功南中志云亡波夷渠帥也以助擊反者封侯文齊廣漢人王莽時益州越嶲諸夷亂擊之不克乃以齊為太守造起陂池開通溉灌墾田二千餘頃率厲兵馬修障塞降集羣夷甚得其和及公孫述據益土齊固守拒險述拘其妻子許以封侯齊遂不降聞光武即位乃間道遣使自聞蜀平徵為鎮逺將軍封成義侯於道卒詔為起祠堂郡人立廟祀之劉尚建武初夷帥棟蠶與滇池弄棟連然諸夷反尚以威武將軍發廣漢犍為兵及朱提夷萬三千人擊之諸夷棄壘奔走獲榖畜無算復進兵連戰皆破之追至不韋斬棟蠶首虜七千餘得生口五千七百馬三千匹牛羊三萬餘頭諸夷悉平張翕巴郡安漢人永平初為益州太守政化清平甚得夷和在郡十七年卒夷人愛慕如喪父母蘇祈叟二百餘人齎牛羊送喪至翕本縣起墳祭祀詔書嘉美為立祠堂至元初間諸夷復叛天子以翕有遺愛乃拜其子湍為太守夷人歡喜奉迎道路曰郎君儀貌𩔖我府君後湍頗失其心有欲叛者諸夷耆老相曉語曰當為先府君故遂以得安其後廣漢馮顥繼之政化尤多異跡云陳立臨卭人為連然長不韋令蠻夷畏之遷牂牁太守時夜郎王興叛請誅之未報乃從吏數十人行縣至興國興來謁立數責即斬其首衆皆降句町王震恐入粟千斛獻牛羊勞士立歸興子復叛立募諸夷與諸尉長吏共擊斬之西夷悉定徵詣京師賜爵左庶長鄭純字長伯郪人明帝時為西部都尉政令清潔化行夷貊君長皆獻土珍頌徳美天子嘉之以為永昌太守純與哀牢夷人約邑豪嵗輸布貫頭衣二領鹽一斛以為常賦夷俗安之常璩南中志稱其獨尚清亷毫毛不犯夷漢歌詠表薦無數上自三司下及卿士無不歎賞王阜章帝時為益州太守政化尤異有神馬四匹出滇池中丼露降白烏見始興起學校變化其俗杜軫成都人察孝亷除建寧令以徳出政風化大行夷夏悦服累遷尚書郎張喬安帝時為益州刺史夷獠封離等叛永昌諸夷皆應之喬遣從事楊竦等將兵至楪榆擊大破之斬首三萬餘級資財四千餘萬悉以贍軍士降叛夷三十六種舉劾貪姦長吏九十人黄綬六十人諸郡皆平㑹竦病創卒喬上其功勒碑紀之至靈帝熹平中夷復叛益州太守李顒刺史龎芝將巴郡板楯軍討之始平曹鸞巴人靈帝時為永昌太守時黨錮甚嚴鸞上書曰夫黨人者或耆年淵徳或衣冠英賢此宜股肱王室左右大猶者也而久被禁錮辱在囹圄謀反大逆尚䝉赦宥黨人何罪獨不開恕是以灾異迭見水旱薦臻皆由于此宜加原赦以副天心帝怒殺之景毅梓潼人靈帝時為益州太守時南夷屢叛用兵累年喪亂之後民皆困餓斗米千錢室家離散毅至安集後米一斗八錢後主建興元年南中渠帥雍闓殺太守附吳與郡人孟獲誘煽諸夷為亂丞相亮率衆討之由越嶲入斬闓等孟獲素為夷漢所服收餘衆拒亮亮募生致之既得使觀營陣獲曰向者不知虚實故敗今如此即易勝耳亮笑縱使更戰七縱七擒而亮猶遣獲獲止不去曰公天威也南人不復反矣遂至滇池益州永昌牂牁四郡皆平即其渠率而用之或以諫亮亮曰留外人則當留兵留兵則無所食一不易也夷新傷破父兄死喪留外人而無兵必成禍患二不易也又夷累有廢殺之罪自嫌釁重留外人終不相從三不易也今吾欲使不留兵不運糧而紀綱粗定夷漢相安故耳於是悉收其俊傑孟獲等以為官屬出其金銀丹漆畊牛戰馬以給軍國之需終亮之世夷不復反按武侯於滇威徳最逺距今二千年猶人祠而家祝之其遺蹟故址散見諸郡者不可殫述雲南則有諸葛營及刻碑文曰碑即仆蠻為漢奴夷有過者常以石搘之有盟蠻臺大理有畫卦臺天威逕諸葛城故壘及印篆臨安有諸葛山永昌有諸葛營旗臺糧堆打牛坪諸葛寨諸葛堰楚雄有破軍山卧龍岡湯團箐武臺髳州營曲靖有盟夷山分秦山八塔雙井澂江有諸葛營䝉化有巍寳山𤣥珠白塔鶴慶有諸葛寨泉及池姚安有武侯塔遺壘土城武定有故城諸葛營北勝有祭鋒臺隴川有孔明寄箭山普洱有孔明營壘車里有孔明碑其他祠廟未可勝數諸蠻皆畏之如天地愛之若祖考革面革心悠久無斁嗚呼其亦可謂聖而不可知也已李恢字徳昻建寧俞元人昭烈章武元年庲降都督南郡鄧方輕財果毅夷漢敬其威信及卒帝問恢誰可代者恢曰人之才能各有長短故仲尼曰其使人也器之先零之役趙充國曰無踰老臣臣竊不自揣惟陛下察之帝曰孤之本志已在卿矣遂以為庲降都督隨丞相亮南征大破蠻兵功最居多封漢興亭侯時左將軍闗雲長子索亦有戰功開山通道常為前鋒今黔滇有兩闗索嶺永昌有闗索寨是也後都督犍為張翼用法頗嚴夷帥劉胄叛丞相亮以參軍馬忠代之未至羣下咸謂翼宜馳騎即罪翼曰吾方臨戰場當運糧積榖為滅賊計豈可以黜退廢公家務乎於是綂攝不懈代到乃發忠至因翼之資擊斬胄柔逺能邇甚垂恵愛南中居官賢者恢與忠俱最焉吕凱字季平不韋人也仕永昌郡功曹時雍闓等聞先主崩驕黠滋甚凱與府丞蜀郡王伉閉境拒闓闓數移檄永昌稱説之凱答檄曰天降喪亂奸雄乗釁天下切齒萬國悲悼臣妾大小莫不思竭筋力肝膽塗地以除國難伏惟將軍世受漢恩以為當躬聚黨衆率先啓行上以報國家下不負先人功書竹帛名遺千載何期臣僕吳越背本就末乎曩者將軍先君雍侯造怨而封竇融知興歸志世祖皆流名後葉世歌其美今諸葛丞相英才挺出深覩永謀受遺託孤翊贊季葉若能翻然改圖易跡更歩古人不難追鄙土何足宰哉竊聞古義臣無越境之交故畧陳所懷惟將軍察焉其詞甚嚴正由是威徳内著為部中所信故能全其節及丞相亮南征既發在道而闓已為髙定部曲所殺亮至南中上表曰永昌郡吏吕凱府丞王伉等執忠絶域十有餘年雍闓髙定偪其東北而凱等守義不與交通臣不意永昌風俗敦直乃爾以凱為雲南太守封陽遷亭侯㑹為叛夷所害子祥嗣三世為永昌太守世稱其賢而王伉亦封亭侯為永昌太守同時有霍弋者南郡枝江人先伉為守永昌夷獠恃險不賔弋率偏師討之斬其豪帥安輯勞來郡界以寧張嶷字伯岐巴西南充人馬忠之討劉胄也嶷以師屬焉戰常冠軍遂平南夷越嶲郡夷數反前後太守不敢之郡以嶷為之嶷將所領徑往誘以恩信蠻夷皆服盡來降附在郡十五年邦域安穆徵詣成都夷民隨之朝貢者百餘人及卒夷民無不悲泣為立廟四時水旱皆祠之杜良字幼倫晉地人為建寧太守有能聲其後繼良者則耿容陳楷容字仲素廣漢人楷字達之安溪人晉李毅字允剛郪人恵帝時任寧州刺史通達治體化行夷獠及卒西南夷叛衆推毅女李秀領州事秀明爽有父風奨勵戰士嬰城固守城中糧盡炙䑕㧞草而食伺夷稍怠出兵掩擊破之時毛孟者為州治中詣京師告急上不之省孟涕泣曰君亡親喪幽閉窮城萬里訴哀不垂愍救既慚包胥無哭秦之感又媿梁妻無崩城之驗存不若亡乞賜臣死朝廷憐之乃以王遜為刺史王遜字邵伯魏興人先為南夷校尉比剌寧州披荒糾厲收聚離散征伐諸夷俘馘千計威行寧土元帝嘉之賜爵褒中縣公蜀李雄遣李驤來寇遜使將軍姚岳拒戰于堂浪大破之驤僅以身免追至瀘水而還遜以其不窮追鞭之百怒甚髮上衝冠冠為裂夜中卒上憐之以其中子賢為寧州刺史同時有尹鳳南中志作尹奉董霸者皆以治行戰功顯爨深興古人也永嘉中為本郡太守與將軍姚岳同破李雄在郡有治績今南寧縣南十餘里有興古太守爨府君碑其後有爨士徳爨瓚爨雲者相繼為寧州刺史皆有遺愛孫辯江陽人為永昌郡從事太安元年上言南中形勢七部斗絶晉弱夷強加其土人屈塞應復置寧州以相鎮慰朝廷從其言復置寧州朱輔永平中為益州刺史宣示徳威綏懷逺夷白狼槃木等蠻慕化歸義隋梁毗字景和安定人髙祖時為西寧州刺史蠻夷酋長皆服金冠以金多者為豪雋由此逓相凌奪每尋干戈邊境無寧日毗患之後因諸酋長以金來餽毗受置坐側對之慟哭曰此物饑不可食寒不可衣汝等以此相滅不可勝數今將此來欲殺我耶悉以還之於是諸夷感悟遂不相攻擊上善之徵為散騎常侍唐韋仁壽京兆萬年人也髙祖時為寧州納欵朝廷嵗遣使撫接至率貪婪邊人苦之帝素聞仁壽治理以為南寧州都督寄治越嶲詔嵗一按行慰勞仁壽將兵五百人循西洱河開地數千里稱詔置七州十五縣酋豪賔見即授牧宰威令簡嚴人人安悦將還酋長泣曰天子藉公撫鎮奈何去我仁壽以城堡未立為解諸酋即相率築城起廨甫旬而具仁壽乃告以實曰吾奉詔第撫循庸敢擅留夷夏父老悲啼祖行遣子弟隨貢方物天子大悦仁壽請徙治南寧州假兵撫定為益州刺史竇軌所嫉阻之尋卒其後貞觀中將軍王建方永徽中總管趙孝祖開元中待詔何履光皆以誅夷名震西南韋皋字城武京兆萬年人貞元初為劒南節度使時南詔異牟尋雖臣吐蕃苦其貪暴潛求内附皋為書誘諭之復令吐蕃知以離其好二國果相猜阻異牟尋歸唐之志益决遣使齎生金丹砂詣皋金以示堅丹砂以示赤心皋遣屬官崔佐時報之佐時至羊苴咩城異牟尋令衣牂牁服以入佐時曰我唐天子使者安得從小夷服直入宣詔書異牟尋恐懼俯伏流涕受詔使其子及清平官與佐時盟於㸃蒼山神祠遣兵襲吐蕃于神川大破之取十六城斷鐵橋俘其五王降衆十餘萬當時論者以皋為武侯後身云袁滋字徳深蔡州朗山人也為工部員外郎貞元十年南詔既内附朝廷欲遣郎吏撫循之皆憚往獨滋請行帝嘉之擢祠部郎中兼御史中丞為册使賜異牟尋以黄金印異牟尋跪受詔與滋宴出𤣥宗所賜器物指老笛工歌女曰先帝所賜龜兹樂惟二人在耳滋曰南詔當深思祖考成業抱忠竭誠永為西南藩屏使後嗣不絶異牟尋再拜曰敢不承使者之命遣清平官隨入朝張羅疋故南詔清平官也為永昌郡都督以破蠻軍擢大監軍及卒土人為立碑城南稱其義勇有度量時有鄭囘尹仇寛者皆為清平官囘本西瀘令為南詔所虜而心不忘唐異牟尋之歸回之力也仇寛貞元中入陳地圗獻方物拜散騎常侍徐雲䖍乾符初奉使如南詔與驃信抗禮驃信怒曰貴府牒欲使驃信稱臣奉貢我已遣人與唐約為兄弟不則甥舅何貢之有雲䖍曰驃信之先由大唐之命得合六詔為一恩徳深厚中間小忿罪在邊鄙今驃信欲修舊好豈可違祖考之故事乎順祖考孝也事大國義也息戰爭仁也審名分禮也四者皆令徳也可不勉乎驃信待之甚厚授以木夾送還趙康蜀人也避亂依南詔䝉氏封之趙州使治其民功徳茂著及卒土人思慕為立廟四時祀之元姚樞字公茂柳城人從世祖征大理時高祥逆命世祖欲屠其城樞與張文謙劉秉忠力諫復因夜宴樞陳宋太祖遣曹彬取南唐不殺一人市不易肆事明日世祖據鞍呼曰汝昨夕言曹彬不殺事吾能為之樞馬上賀曰聖人之心仁明如此生民之幸有國之福也及克大理樞裂帛為旗書止殺之令分號街陌由是民得相完聚文謙字仲謙沙河人秉忠字仲晦瑞州人舒嚕杰以元帥治臨安好文學大儒與虞集揭傒斯友善及為政文雅雍容隠然一儒者也使車里以黄金采女遺之一無所受蠻酋曰入我土而不為金婦餌者元帥一人而已其時有普化者成都人宣慰臨安亦以忠厚嚴明稱賽音廸延齊沙木斯迪音回人也世祖至元中為雲南行省平章時宗王托和倫驕虐甚賽音廸延齊與結兄弟甚驩王一聽其所為改設令長教民禮義興黌序購經史夷風翕然丕變平羅磐甸和泥雞洞諸蠻威徳逺播及卒士民號哭震野同時有中慶路總管張立道達嚕噶齊愛魯行臺御史中丞程思亷亷訪使張瑾皆有亷恵神明聲而立道剏文廟開陂池教蠶桑尤為循良之冠南詔野史云南詔不知孔子以王逸少為聖人帝已至賽音廸延齊始立孔廟夫滇之學校自漢章有之唐開元初晟羅皮已立孔子廟于國中矣其言繆不足辯也國朝王褘字子充義烏人官翰林院待制洪武五年遣使雲南諭梁王至謂梁王曰皇明創業綂一萬方王僻在西南未被聲教天子不忍鄙夷命褘輯寧若能亟奉版圖以歸職方身名俱存不亦偉乎不聽褘又曰朝廷軫念雲南黎庶不忍盡劉故令開諭若旅拒不服必奉天討秦甲蜀彍循棧道略沈黎而西犄之角之腹背受敵王之將佐利王以為功者不少雖欲泥首牽羊其將能乎王曰漢閉昆明命使莫達唐勤逺畧秖以自憊天朝若以兵臨雲南金碧以為城昆洱以為池雖多無所用之褘曰王未聞乎友諒據楚士誠據吳友定據閩玉珍據蜀重闗天塹險邁金湯兵糧委積淵謀盈庭不四五年率膏鈇質爾元君北走庫庫特穆爾輩賣降往事俱在可鑒也王自度謀勇孰愈誠諒兵強地廣孰愈中國天之所廢誰能興之天之所與誰能禦之今以區區一隅之地逆天犯順與天下抗不亦誤乎王曰先生之言是也請姑就館㑹元使托克托廹梁王殺褘王不得已出褘見之褘慷慨言於托克托曰天既訖汝元命皇明代有天下上即寳位已五年爝火餘燼乃與日月爭光耶吾與汝皆使也以㓙威脅我我寧畏死耶托克托厲聲詈梁王曰今雖孔聖義不可存梁王不能救褘顧謂梁王曰雲南之禍自此始矣遂遇害至洪武八年復遣湖廣參知政事吳雲往諭梁雲字友雲宜興人也比至雲南沙塘口知院等欲令屈節從事改易制書雲責以大義以死自誓亦遇害後雲南平贈褘翰林學士諡忠文𢎞治間贈雲刑部尚書諡忠節按二使之滇雖未成功而殺身成仁精忠勁節與日月爭光視長卿子淵勤逺畧祭淫祠者相去不萬倍哉滇中今有祠曰二忠有司春秋致祭焉傅友徳字惟學潁川人沐英字文英定逺人俱從髙皇帝龍飛有功賜爵友徳潁川侯英平西侯洪武九年以雲南負固不服殺我使臣遣友徳為征南將軍英副之率師三十萬往討友徳從辰沅進英從烏撒進㑹于曲靖擊梁兵大破之俘衆數萬悉遣歸農夷人感泣兵不血刃直趨雲南梁王投水死大軍入城秋毫無犯遂略澂江臨安諸郡悉平之獨大理未下命常茂領兵從間道出㸃蒼山背大軍斬闗以入衆悉驚潰遂拔其城俘段寳二子雲南悉平上詔友徳頒師命英鎮守至十九年復令友徳征未靖諸蠻歸封潁國公英封黔國公世守雲南二十一年百夷屯摩沙勒等入寇衆三十萬英擊大破之俘斬數萬諸酋震恐奉方物乞降上嘗言曰使我無西南之憂者英也子晟昻孫璘琮俱以將畧顯李觀壽州人胡淵定逺人洪武初俱以禆將從𫝊友徳定雲南觀初名觀音保元雲南行省左丞也天兵至歸附從征入獻馬上嘉之賜姓名命鎮金齒署永昌府事既至宣朝廷徳意討叛酋段恵誅之開拓城池申明律令邊境肅然夷不敢犯及卒淵代之復改築城於太保山上開屯田練士卒脩廨宇撫流移數年之間軍政悉舉烽燧晏然俱祠名宦張志淳曰淵更觀舊城既可禦寇防險又使山居城内林木蒼然其績亦不可泯但觀之功而無文記又革府為司廢學為倉以貽鎮守之禍其惡亦不可掩而林公俊創名宦祠于學宫淵首與焉其亦誤矣廢學之人而祀于學何居謂宜别祀於所移之城上斯得之已程本立字原道崇徳人洪武初舉秀才入京以小累謫馬龍他郎甸長官司吏目時王師初靖遺孽尚驕西平侯沐英布政使張紞令本立綂領守禦衆難之本立奮然曰吾當以死救此一方單騎深入楚䧺姚安大理鶴慶麗江開諭利害撫綏安輯自是諸夷悦服軍民乃安戊寅徵入翰林壬午靖難師至遂自盡張紞字昭季西安人洪武初平雲南以紞為右叅政轉布政使凡雲南貢賦法令壇祠公署與夫典儀程度皆所規定夷民心孚逺近奠安歴任三十年擢吏部尚書其時按察使周新副使周樂皆執法亷公不避權要滇人至今思之王恕字宗貫三原人成化間内臣錢能來滇鎮守怙寵播虐人不堪命又遣指揮郭英索賄安南幾釀大亂大學士商輅請舉剛正大臣巡撫雲南恕遂以南京户部侍郎改都御史以往既至首下令捕英英赴水死上疏劾能罪狀併請罷寳玩禽獸之獻又正卯盪之田土絶交阯之貿易滇始知有生人之樂位至冡宰張志淳曰商公輅能舉三原王公及王劾錢能而萬公安王公越皆受賂沮之均大臣也而賢不肖相逺如此陳麒字夢祥南海人也成化間為按察司副使時鎮守太監錢能横甚令藩臬官五日一揖能復不出命錦衣指揮受禮惟陳正立不屈托疾即退能怒一日見叱之曰你這蠻子食蛇慣了故此大膽陳曰豈但蛇豺狼虎豹也要食能目左右欲毆之陳趨出時王恕為巡撫與麒同心能無如之何既而恕召還麒執法如故曰有王巡撫則為人無則不為人乎無何進表行能以事捃摭之逮至滇備加五木坐削籍歸年八十餘卒同時按察使劉釪亦以捕郭英得名釪字伏和安福人林俊字待用莆田人正徳間為雲南按察副使分巡金滄嚴明方正撤毁鶴慶淫祠創築趙州城池一時貪墨望風解綬婪弁虐軍皆置之法自是百姓休息地方用寧經今且百年父老猶能談之繼其後者則有姚祥聶賢樊凖林仕鳳王惟賢皆以亷恵稱祥字應龍歸善人賢字承之重慶人凖字曰式進賢人仕鳳字鳴盛莆田人惟賢字仕官中江人范鏞字鳴逺臨洮人正徳間巡撫雲南時大司馬王瓊専擅不附已者輒搆以事鏞獨不附瓊銜之時富民典史高公韶者先任御史以劾瓊謫官鏞薦之且有矜狂愚建言傷察等語瓊益憾遂誣鏞擅委都司官奏行逮治下詔獄欲加重罪不得降職嘉靖改元録用而鏞已卒賜祭一壇復其官張璞字仲美江夏人正徳間巡按雲南剛明正直風裁凛然各府不問華夷巡歴必至鎮守太監劉裕濫取民間軍牢柴薪醃臘酒米菜戸松子等項銀兩嵗凡幾千璞盡革之裕恚揑奏遣緹騎逮至京下錦衣衛獄卒璞既得罪代之者懼禍一事不理人目為抛柴御史張志淳曰滇人市朽木於海東為薪價賤而無燄曰抛柴言其無當於用也應作泡唐龍字虞佐蘭谿人正徳間巡按雲南時嬖人錢寧威震中外金齒參將盧和充錢門下挾讐勘四平民死火其屍事發論斬寧為奏辯遣官㑹勘行時寧隂囑出之且齎書于龍龍當堂裂之曰和詐為耳官至語龍曰盧和事皆無屍當末減龍曰四人無屍和鍛之以滅跡耳若得末減則天下酷吏紛然鍛人之屍矣吾非不知末減可致富貴恐人云徇錢寧意其將謂何官氣沮龍立曳和堦下加三木武定酋鳳朝明被奏訐不得襲載金寳二十萬賂寧寧以言脇總兵鎮守又寄語巡撫曰但了武定事便請往兵部龍至巡撫首以此示龍龍不可駁還其封備陳鳯氏及朝明罪惡不當襲狀奏于朝竟得㫖降土舍時太監崔和暴横龍劾奏之和恚甚然終憚不敢肆丁丑秋滇大旱龍慮境内有寃獄下令慮囚釋百餘人大雨如注逺近以為神毛鳳韶字瑞成麻城人嘉靖間任監察御史巡按雲南先是閹鎮為害軍民苦之鳳韶至抗疏斥罷咸稱快焉後復以僉憲分巡金滄民受其恵徐瓚字朝儀永康人嘉靖間任按察使土舎安銓叛報至上下憂之瓚曰醜虜敢稱亂者謂我軍弱也今以夷攻夷成擒有日矣乃議調沅江䝉化鎮沅等處夷兵佐以漢軍進勦措處糧餉閲習召募事皆立具晝夜登城徇師復立招降大旗脇從歸者甚衆賊勢日衰無何土舍鳳朝文繼叛與安銓合圍省城震恐瓚登陴呼寇諭以朝廷恩威責以大義寇皆伏地請降且以復官為言瓚諭令退舍俟命寇遂麾衆而退瓚即夕走使掣囘各哨官軍晨合擊賊大敗之俘獲萬餘簡審無辜悉為開釋民深徳焉家為立祠以功擢布政使吕光洵字信卿新昌人隆慶初以兵部尚書都御史巡撫雲南誅鳳繼祖於武定斬王一新於易門殱髙欽於姚安戮僭號二賊於昆陽諸夷膽落邊境晏然至萬厯初巡撫鄒應龍征鐵索箐赤石崖諸賊擒酋長罷勤快等又東征獛蕎甸等夷悉平之至今滇人安枕二巡撫之功居多焉應龍字雲卿長安人陳應春字汝和閩之長樂人隆慶間以僉憲分巡金滄方正明察百廢俱興太和有儒生楊霽妻沈氏為祟所憑百方禳之不去三年骨立生以狀投應春應春為書一札告之城隍是夜沈氏見祟復來囚首跣足言汝夫告我於本道城隍有檄捕我我去矣其狀甚踉蹌言訖竟絶論者謂陳公正人也時同邑陳時範為方伯清介絶俗布袍蔬食精吏牘人不敢欺有神明聲至今人稱二陳公焉二公俱余邑人才品皆為枌榆矜式今其子孫俱貧素若寒士方伯於觀察為先輩而官滇則先後至焉漆文昌瑞州人也沈毅有謀畧舉孝亷為永昌撫夷同知時緬酋應裏連年入寇諸夷各懷反側而猛哈思化等皆助逆時議欲加兵問罪巡撫都御史蕭彦令文昌撫之文昌單騎入城壘宣朝廷徳意諸夷素服其亷能咸稽首聽命遂築闗堡興屯田親履原隰相度地勢悉中機宜至今緬酋不敢内窺以功遷廣南知府擢兵備副使時猛卯多俺叛投緬文昌授計木邦擒而斬之邊患訖息騰永之民至今尸祝焉劉綎南昌人都督顯子也驍勇絶倫萬厯十一年緬酋大舉入寇破順寧肆焚掠上下震恐詔以綎為遊擊將軍討之綎率精兵出隴川猛宻直抵阿瓦盡降其衆阿瓦緬巢穴也酋聞之恐乃遁歸擒隴川賊長岳鳳斬之諸夷附緬者聞綎威名望風降服賊勢遂不復振以功遷去同時參將鄧子龍者豐城人與綎共進大破賊於姚闗斬同叛者灣甸酋景宗真及耿馬舍人罕䖍後緬寇蠻莫復擊敗之繼其後者有巴蜀劉天俸山隂吳顯忠皆以戰功顯循良之績志乗不勝書今録其著者則雲南知府董復㑹稽人葉元廣信人大理知府賈銓邯鄲人吳晟弋陽人任轍巴縣人永昌知府嚴時泰餘姚人楚䧺知府邵敏長沙人戚慎宣城人鶴慶知府林遒節莆田人姚安知府馬自然内江人黄澍侯官人王鼎汝州人廣西知府賀勛長沙人尋甸知府戴鰲鄞縣人林斌莆田人澂江通判晁必登宜賔人後為雲南參政安寧知州伍佐新化人騰越知州李偪吉水人彌勒知州華剛都匀人南安知州荀詵華陽人何應和東莞人昆明知縣黄守純闕太和知縣楊樊貴州人浪穹知縣何宗魯酆都人剛直為太守所殺􅑇嘉知縣虎臣麟遊人不受賂為土官毒死昆陽州同知張昇濟陽人愛民如子運糧至滇池溺死陳陽新淦人有異績擢廣東副使永平主簿郭本玉融人以御史謫剛直亷介無何召還趙州吏目諸葛伯恒蘭谿人秋毫無取于民州有妖蛇為患必以人祭伯恒仗劒斬之擢陜西參議文苑則中丞錢塘鄭顒郴州何孟春吳興顧應祥崇陽汪文盛侍御華亭包節豫章鄧渼藩臬鄱陽童軒吳興徐中行四明張時徹白門劉麟長洲皇甫汸銅梁張佳𦙍縉雲何鏜錢塘陳善莆田方沆閩鄧原岳番禺郭棐華亭馮時可皆以文章名世而政事勛業爛然不能相掩姚安守李贄雖亦有文名而其末也逃入緇流横議殺身君子無取焉死事則布政使貴溪徐樾死沅江之難姚州土舍髙鵠從之僉事安慶張澤死武定之難都督方政都指揮顧勇陳翊侯義江洪死於麓川都指揮張雄征鐵索箐卒于軍姚州土舍髙棟死於普安賊大理衛指揮陳定鶴慶百戸李繼兒及子轅順寧土官經歴董寳俱征麓川死于陣臨安百戸邵鎰征上江死於陣楚䧺指揮吳繼勛鶴慶千戸初維垣永昌把總李潮岳順皆先後死於緬武定同知袁俸照磨張成祿勸知州廣西秦健吏目劉瑀死鳳朝文之難武定衛知事髙心金沙江巡檢俞伯官死鳳繼祖之難武定指揮金守仁千戸王應爵梅應時黄桂鎮撫金榮髙祿豐知縣封川蘇夢暘祿勸州壽官李資坤父子俱死鳳克之難滇畧卷五
