body:
  text: 滇略卷四明謝肇浙撰俗略滇故夷也侏􅍣卉服比於鹿豕刀耕而火耨茹毛而飲血喜相劘怒相齧如斯而已明聖繼作移風易俗頓使黭瞀狉獰之習不百年而比迹中華爭衡上國即三皇五帝神聖其速化不至此顧其敝也揉而狎處有戎心焉枯魚銜索幾何不蠧語曰衆志安定之謂俗夫欲定衆志則在鄉士大夫哉則在良有司哉海內貿易皆用銀錢而滇中獨用貝貝又用小者産於閩廣近則老撾等海中不逺數千里而捆致之俗名曰肥其用以一枚為一粧四粧為一手四手為一緡亦謂之苗五緡為一卉卉即索也一索僅值銀六釐耳而市小物可得數十種故其民便之按上古之制以貝為貨含用貝玉許氏說文曰古者貨貝而寶龜至周而有泉秦乃廢貝行泉漢書曰王莽時大貝四寸八分以上二枚為一朋直二百十六牝貝三寸六分以上一朋直五十公貝二寸四分以上一朋直三十小貝寸二分以上一朋直十不盈寸二分不得為朋每枚直錢三是為貨貝以是觀之漢時錢貝尚竝行貝貴而錢賤也貨殖𫝊曰貝五種大貝牝貝公貝小貝不成貝今之所用者皆小貝及不成貝耳且無選擇無完缺纍纍數之入手即行故尤便於夷玀村氓無機械變詐者郭璞貝贊云先民有作龜貝為貨貴以文采賈以小大簡易則資犯而不過今之用者文采小大又俱不論已秦滅六國時莊蹻王滇自若雖使常頞通道頗置吏焉然竟未嘗奉秦朔也故廢貝行泉之令獨格于滇至今不改耳卉說文云三十并也則古以六十枚為一卉今以八十後轉為索蓋唐以後數錢亦以索職林云參軍之俸月八百索名曰念珠曹是其證也但其數多既不勝荷挈而又易於破壞緣其直甚輕故亦不惜耳輸稅於官與銀互入而收之者又轉易銀以入帑稍為不便云市肆嶺南謂之墟齊趙謂之集蜀謂之亥滇謂之街子以其日支名之如辰日則曰龍街戌日則曰狗街之類至期則四逺之物畢至日午而聚日入而罷惟大理之喜洲市則以辰戌日夜集古者日中為市海內皆同夜集獨見此耳滇民以市為景遊人縱觀正月燈市二月花市三月蠶市四月綿市五月扇市六月香市七月七寶市八月桂市九月藥市十月酒市十一月梅市十二月桃符市一嵗凡十二市民間每月戌日則祭祖於家俗相𫝊謂大士遺教以為萬物發生於辰而歸寂於戌日月出於辰沒於戌又謂戌日供帝釋水則四獸不守地獄門亡魂得出故以是日設祭謂之幽冥録云昔有鬼魂作人令匠補製舊鞾者約以戌日來取詰旦其子過匠肆見鞾認其為亡父所著也驚而詰匠匠曰彼約我戌日來盍伺之子至期往候其父果至見子疾走不顧子從之不能及大哭曰生為父子何相絶之甚也其父曰幽冥異路相見何為汝但能往學于太守是吾幸矣子曰彼貴我賤安從而得其門父曰汝書太守隂行二事投之彼必汝見子如其言見太守守亦驚曰吾此二事無人知之及問其故信鬼神告之此亦足為戌日鬼出之證也元旦清明端午七夕長至人家咸作赤豆羮噉之互以相遺按初學記云共工氏有不才子七人死而為厲性畏赤豆故作羮以祛之是其遺法也冠禮不行久矣婚不親迎猶中土也喪以請僧懴悔追薦為事鉦鼓之聲日夕不絶葬不擇地祭不於廟而於墓墓祭甚數以正月初浣三月清明七月中元十月朔日臘月之末咸往拜墳富者牲醴擔負貧者荷楮錢以往未嘗有輟也唐宋以前葬者多用火化杜氏通典云古者送死於中野衣之以薪而瘞其骨則雖夷俗亦古制也國朝始為之厲禁於是有棺槨墳塋封樹之禮埒於中華李元陽有復火葬議曰一墳所占不過十步而有力之人廣圖風水遂致占田為墳而刀耕火種之民無從措手恐非長久之䇿也夫滇皆山也教之山葬則已矣安可慮其侵田而思復火葬之舊乎節令禮儀大率與中土類若元旦更桃符賀嵗上元觀燈清明插柳四月八日浴佛五日懸艾酌菖蒲七夕乞巧中元祭祀中秋夕月重陽登髙臘月草四日祀竈除夕守嵗飲酒先少後老此皆列郡之所同者惟夷俗稍異耳嵗首官府開印則自胥曹而下至于輿𨽻厮養咸以紅箋乞印一顆歸貼門上以辟不祥外逮孰生村氓無不轉託衙役代為請乞動千百計相𫝊民間有婦為魅據者百方祛之不效州守聞之令取婦衣鈐之以印是夜遂絶然以朝廷之名器下同法司之符籙亦䙝甚矣元夕家家燃燈亦有魚龍走馬及鰲山諸戲然皆染紙為之無他竒巧市上結綵為架作松棚如小屋然爇燈其中遊人歌舞達旦然僅自十三至十五而止至於花爆煙火之屬皆逺不逮他處鄧渼榆城元夕曲八首明月憐三五金波湛湛盈繁燈如列宿自古葉榆城又聞道龜兹樂先朝老笛工今聽上元曲猶有大唐風又可憐日東國也學漢西京髙棚跨廣路火樹兩邊生又阿育三千塔當年尚建燈青蓮紛吐炬呪鉢訝神僧又豔唱銀花合香浮金屈巵遊人迤邐處燈火武侯祠又殘燈風影亂明月露華溥逈照蒼山雪千門生夜寒又獨向繁華候偏深喪亂情幾家南北巷歌哭共天明又罷戲鰲山側初窺鶉火中苴咩今夜月還與故園同永昌以正月十六祠大官小官廟夷漢皆往㑹祭有水旱官亦往禱廟在哀牢山下其神題大官曰大定戎方天下靈帝小官曰大聖信苴利物靈帝不知何神張志淳曰此必䝉氏世隆僭號時即其始祖生長之地而祠之也相𫝊大官為叔小官為姪其塑像冠服皆與蒲蠻同滇中氣候最早臘月茶花已盛開初春則柳舒桃放爛漫山谷雨水後則牡丹芍藥杜䳌梨杏相繼發花民間自新年至二月攜壺觴賞花者無虛日謂之花㑹衣冠而下至于輿𨽻蜂聚蟻穿紅裙翠黛雜乎其間迄春暮乃止其最盛者㑹城及大理也二月八日各郡有迎佛之㑹多于寺中舁遊城市長幼雲集聚觀或焚香膜拜翌日送歸句町諸邑以是日祈求豐稔各社裝演往事走馬戴竿若迎春然三日乃止鶴慶石寶山𤣥化寺有樟木佛一座相傳唐時所造土人神之逺近舁拜無虛日林俊為巡道碎而火之始絶人稱為林劈佛大理有觀音市設於㸃蒼山下閲武場中以三月十五日集二十日散至期則天下之商賈皆來貿易若長安燈市然官恐其喧爭為亂調衛卒以守護之昉于唐永徽間迄今不改相𫝊觀音大士以是日入大理後人如其期焚香頂禮四方聞風各以貨來至今不改永昌之俗三月二十七日俠少之徒聚於諸葛營前走馬賭勝有觀騎樓至日登者如市今樓毁而俗尚存六月二十五日入夜家家束松明為庭燎雜以草花高丈餘燃之殺牲祭祖老少圍坐火下飲酒達旦自官署都邑以及鄉村田野無不皆然謂之火把節又謂星回節相𫝊漢夷酋阿南夫為人所殺誓不從賊以是日赴火死國人哀之因為此㑹詳見獻略至唐南詔亦假是日宴㑹召五詔醉而焚之人謂此節起於南詔非也一云孔明以是日擒孟獲侵夜入城城中父老歡呼設庭燎以迎之未知是否通志又云為火炬照田苗以火色占農一曰焚蟲一曰逐疫皆屬臆說今但相沿為宴樂耳元文璋甫詩雲披紅日恰銜山列炬參差競往還萬朵蓮花開海市一天星斗落人間只疑燈火燒元夜誰信鄉儺到百蠻此日吾皇調玉燭更於何處覓神姦明豫章鄧渼星回節詞有云漸看西日隱簾櫳夜色依然昏火中朱煙翕赩千門合列炬參差四望同遙訝原燐深映雨近驚山燒亂從風又云街衢車馬夜喧闐舉國如狂自昔然東舍椎牛聞擊鼓西鄰酌兕共調絃蓋實録也是夜迤東有角力之戲謂之跌四把腰七月二十三日西洱河濵有賽龍神之㑹至日則百里之中大小遊艇咸集禱於洱海神祠燈燭星列椒蘭霧橫尸祝既畢容與波間郡人無貴賤貧富老幼男女傾都出遊載酒肴笙歌揚帆競渡不得舟者列坐水次藉草酣歌而酒脯瓜果之肆沿堤布列亘十餘里禁鼓發後踉蹡爭驅而歸遺簪墮舄香塵如霧大類京師高梁橋風景也九月朔至九日民間為禮斗之㑹闔室齊戒夜望北斗四十九拜正德甲辰永昌地震民居多覆殺傷無算惟真武觀無恙禮斗人居其下無一傷者衆以為神奉祠彌恪大理之俗以九日登崇聖寺塔闔城士女以及縉紳盡攜餖飣以往列坐松隂入夜乃返飲食惟公宴禮㑹者與中土同其民間所造多糅雜而成如縷切餅餌而暴之其亂如蓬曰蓬餌磨蒟蒻而涗之曰鬼藥熟糯粉和芋為泥而膏沃之綴以米糝曰餳枝濃煎乳酪而揭之曰乳線揉糯及山藥圎而煠之如荔曰粉荔至於魚肉牲畜螺蚌之屬率生斫縷絲和諸椒桂而噉之其名曰勝蓋古人斫膾之遺法今閩廣亦間為之但滇以為常食耳宴飲至進魚然後撤席此俗自楚以西皆爾向在吳興亦然吳興魚至多薦三四種其末乃一大鯉也俗戲謂之春牛蓋迎春牛居其最後也粵西如之飲酒之法雜蕎秫麴稗於巨甕漬令微熟客至則燃火於下以小竹或藤插甕中主客環坐吸而飲之曰咂魯麻程本立詩金杯哈喇吉銀筒速魯麻江樓日日醉忘却在天涯大理五六月間鬻雪者滿市家家以蜜和而咽之曰蜜雪云去心腹熱疾滇人知耕而不知藝知農而不知桑知馬而不知舟好飲而不知釀好鬼而不製香有紙而不善作筆其疾病也知有巫祝而不信醫藥爭鬭不畏刑法而憑盟誓犁田每用二牛三人佐之前者挽車中者扶犁後者服耕種以五月穫以十月田四畝謂之一雙蓋西域語如卷之為􅗡云金王庭筠詩寺僧乞與山前地招客先開四十雙滇西近天竺故其方言云爾唐書南詔𫝊云五畝為一雙則四十雙二百畝也似是夏秋之交稻尚未熟先取其稚穗匾而晾之致餽於親厚謂之嘗新然半作土氣非正味也民間房屋不過丈許必用厚瓦而固以灰土官署亦然風高故也大理風多尤甚自八九月至二三月無晝夜狂吼掀瓦拔木人馬辟易婦女市行者以十二幅布為裙多其襞積以禦風云但風高而不寒亦無塵沙至金沙江濵則隂霾漲天如燕齊道上矣景東䝉化山多有瘴西至永昌始甚蘭滄潞江水皆深緑不時紅煙浮其面日中人不敢渡瘴起於春末止於秋杪夾堤草頭相交結不可解名交頭瘴時則行旅皆絶江岸居民色多黃瘠蚤死惟婦女不染也滇中氣候常暖如閩廣至永昌以西熱稍甚嵐瘴騰空觸人鼻如花氣騰越以西至于南甸干崖雖冬月衣葛汗猶雨下其地有半箇山東即凉西即熱天所以限華夷也豐年米價甚賤即遇凶荒斗米不及百錢其斗斛大倍於他方當有秋時粒米狼戾四逺無復轉販足榖之家亦時以此為苦至於市無乞丐物無騰踊安土樂業數世不知遷徙固依稀西方樂土矣髙皇帝既定滇中盡徙江左良家閭右以實之及有罪竄戍者咸盡室以行故其人土著者少寄籍者多衣冠禮法言語習尚大率類建業二百年來薰陶漸染彬彬文獻與中州埒矣然惟雲南大理臨安鶴慶永昌諸郡四民樂業守法度子弟頴秀士大夫多材能尚節義曲靖楚雄姚安澄江之間山川夷曠民富足而生禮義人文日益興起其他夷夏雜糅然亦蒸蒸向化醇朴易治庶幾所謂一變至道者與雲南郡雄據滇池方廣三百里旁平地肥饒千里有鹽池田漁之饒金銀畜産之富人俗豪汰自漢已然史謂巴蜀商賈竊出取其莋馬僰僮髦牛以致殷富自唐以來日尋干戈國朝一以漢法繩之貢賦煩重捐瘠之色可掬矣然田無旱潦米不轉輸山澤之利取之無禁民至老死不相往來他方樂土未必勝此也大理北控吐蕃西威驃國東有若水南扼昆彌一大都㑹也其富人嫁娶送死以奢靡相髙嵗時餽問無虛月稱貨權子母而不好賈賈人皆他方來貿易繒綵以致厚蓄故水土之利皆歸客商世𫝊蒼洱之間在天竺為妙香國觀音大士數居其地唐永徽四年大士再至教人捐佩刀讀儒書講明忠孝五常之性故其老人皆手念珠家無貧富皆有佛堂一嵗之中齊戒居半民輸賦如競市不待催科百年以來民以飲博廢業田多逋賦胥役怙權鴟張魚肉小民其一變也網亦少踈云臨安之繁華富庶甲於滇中諺曰金臨安銀大理言其饒也其地有高山大川草木魚螺之産不可殫窮又有銅錫諸礦展轉四方商賈輻輳其民習尚奢靡好宴會酒肴筐篚殆無虛日近來多盜枹鼓不時起鶴慶之俗婦帽三尖以布為之知府周贊至諭令易以簪髻逺近化之民間歌曰我周公變我風易簪髻去布幪臨安婦女舊戴皂笠坐市交易近亦稍更矣永昌騰越之間沃野千里控制緬甸亦一大都㑹也山髙水深饒竹木鹿豕魚蝦之利其人儇巧善製作金銀銅鐵象牙寶石料絲什器布罽之屬皆精好甲他處加以諸夷所産琥珀水精碧玉古喇錦西洋布及阿魏鴉片諸藥物輻輳轉販不脛而走四方故其習漸趨華飾飲食宴樂諺謂永昌一日費三百石釀米亭午以後途皆醉人此其敝也葉榆以西接壤竺國故自唐宋以來崇奉釋教日甚一日朔望則裹飯袖香入寺禮佛飯僧俗云信三寶家永為和合㸃蒼雞足九鼎之間緇徒雲集搭挂蘭若金碧輝映相望豪族鄉紳財物不以治第施貧而盡輦為檀林梵宇之費時有飲酒食肉之僧自夷來者託言天竺則民家崇奉若神出妻女以侍之惟恐其不住也至于土官桀驁奸命一遇緇流無不膜拜頂禮捨資如流幸民逋寇竄入其中莫可誰何雖禁之而不可得也按白虎通南詔通紀野史等書什九載佛教神僧靈蹟詭譎可厭亦足見當時之崇尚耳尋甸武定景東沅江䝉化順寧諸郡皆夷漢雜處然夷雖悍而朴直不欺其黠而作僞者皆漢人也麗江廣南廣西永寧純乎夷矣而亦向慕華風敬禮儒釋至於怒相讐殺不可以教化懷服則所習之性固然也詳具夷略滇人多用雞卜其法縛雄雞於神前焚香默祝所占畢撲殺雞取兩股骨洗淨以線束之竹筳插其中再祝左骨為儂儂我也右骨為人人即所占事也兩骨上有細竅盡以細竹籖之斜直多少任其自然直而正者多吉反是者凶其法有十八變然不可得而詳矣大抵與五嶺相類按漢武帝令越巫祠百鬼用雞卜乃知此法自粵始而滇用之皆夷俗也永昌以西人家間有畜蠱者余初未之信後閲爰書得永平人田守徹夫妻俱為之所害人無算守徹乃縣庠青襟也放蠱不但飲食器中即以手撫其頂或摩腹無不立痛歸便血數日以死有教其往拜求解者夫婦復作法以雞置前祝而撲之雞死而人立蘇所畜物人不見其形子婦秦氏一日從米匱中見一黑眚鴨頭而無翅足驚怖失聲怪即不見田大怒出其婦又有庠生隆仲賢者得銀杯於途至家視之朱蛇也仲賢知為蠱敬事之築小室於舍傍樹下以居蠱蠱每夜出光如流四散入人家吮五臟漏盡歸則笥中錢帛盈矣中蠱者不出三日必死事覺余下所司窮治之皆伏法又有變鬼人云夷婦所魅人多死覺則捉而埋之景東山中有花名䝉肚生樹皮上如蘚土人採以用蠱欲人醉死則醉往採欲人淫死則淫往採欲人狂爭死則狂爭往採及毒發一如其狀嘉靖丙寅千户陳祺奉命往景東賜知府陶金金帛祺善書法金厚欵之請書匾額祺醉墨瀋涴其錦袍金恚以䝉肚毒之歸發狂死唐西南夷多用木夾徐雲䖍使南詔南詔待之甚厚授以木夾遣還宋宣和間高泰運貽木夾書於邊將以求貢其製用兩漆板夾文書而刻字其上以為信五嶺雍管之間皆然今夷人交易尚用木刻多在神前呪誓故不敢叛也桂海虞衡志云大理國間有文書至南邊及商人持其國佛經題識猶有用圀字圀武后所作國字也唐書稱大禮國今其國只用理字方言夷玀則侏􅍣不可曉漢人多江南遷徙者其言音絶似金陵但呼院曰萬街曰該鞋曰孩虹曰水椿松炬曰明子蓄水曰海子嶺曰坡子溝曰龍口民呼官太守以下皆曰父母監司以上皆曰祖其山川村落民多用語助字如者樂甸矣角場矣和山坡矣落河矣波海矣邦池矣部鳥泉者鷂山者島山者察鋪它矣者哨矣馬洞驛矣白丁哨矣能鋪者矣哨丘矣哨母丈矣鋪者昌鋪瓦魯之長官司之類不可殫記方言耶夷言耶殊堪捧腹滇以㑹城為界其東曰迤東其西曰迤西合言之曰兩迤迤者迤邐之義逺也村落謂之甸亦謂之睒又作瞼䝉氏有十瞼華言州也夷地村哨謂之喧喧猶寨也保甲謂之牛叢滇略卷四
