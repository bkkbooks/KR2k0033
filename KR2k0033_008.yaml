body:
  text: 滇略卷八明謝肇浙撰文略先王之治民也既生聚之衣食之然後洽以文教被以歌謡南中異域日尋干戈生斯地者保要領之不贍而遑闌及雕龍自漢及唐文獻倣佛足徵宋三百年墮羅剎鬼國矣明興而後詞命文告紀載題詠燦然俱在篇籍不勝汗竹也豈非既富而教王道之成哉今擇其較著可以觀者漢持節使王褒謹拜南崖敬移金精神馬縹碧之雞處南之荒深溪回谷非土之鄉歸徠歸徠漢德無疆廣乎唐虞澤配三皇黃龍見兮白虎仁歸徠歸徠可以為倫歸兮翺兮何事南荒也漢明帝時通博南山道渡蘭津行者苦之歌曰漢德廣開不賓度博南越蘭津渡蘭滄為他人司馬貞西南夷傳贊西南外徼莊蹻首通漢因大夏乃命唐䝉勞深靡莫異俗殊風夜郎最大卭筰稱雄及置郡縣萬代推功劉昫西南蠻傳贊五方異氣所禀不同維南極海曰蠻與戎惡我則叛好我則通不可不德使其瞻風晉常璩述南中志赤德中微巨猾干篡白虜乘釁致民塗炭爰迄靈獻皇極不建牧后失圖英雄迭進覆車齊軌䝉此艱難隋梁睿請略定南寧州疏竊以逺撫長駕王者令圖易俗移風有國恆典南寧州漢世牂牁之地近代以來分置興古雲南建寧朱提四郡户口殷衆金帛富饒二河有駿馬明珠益寧出鹽井犀角晉泰始七年以益州曠逺分置寧州至梁刺史徐文盛徵赴荆州土民爨瓉遂竊據一方國家遙授刺史其子震相承至今而震臣禮多虧貢賦不入每奉獻不過數十匹馬其處去益路止一千朱提北境即與戎州接界如聞彼人苦其苛政思被皇風伏惟大丞相匡贊聖朝寧濟區宇裕後光前方垂萬代闢土服逺今正其時幸因平蜀士衆即請略定南寧自瀘戎已來軍糧須給過此即於蠻夷徵稅以供兵馬其寧州朱提雲南西爨並置總管州鎮計彼熟蠻租調足供城防倉儲一則以肅蠻夷二則禆益軍國今謹建南寧州郡縣及事意如别幅大都督杜神敬昔曾使彼其所諳練今并送往史萬嵗征南寧夷過石城山詩云石城門峻誰開闢更鼓誤聞風落石界天白嶺勝金湯鎮壓西南天半壁唐駱賓王軍中行路難詩君不見封狐雄虺自成羣憑深負固結妖氛玉璽分兵徵惡少金壇授律動將軍將軍擁旄宣廟略戰士橫戈靜夷落長驅一息背銅梁直指三危登劍閣閣道迢遙起戍樓劍門搖曵俯靈丘卭關九折無平路江水雙源有急流征役無期返他鄉嵗月晚杳杳丘陵出蒼蒼林薄逺途危紫蓋峰路澀青泥坂去去指哀牢行行入不毛絶壁千重險連山四望高中外分區宇夷夏殊風土交趾枕南荒昆彌臨北戶川原饒毒霧溪谷多淫雨行潦四時流崩崖千嵗古漂梗飛蓬不暫安捫藤引葛度危巒昔時聞道從軍樂今日方知行路難滄江緑水東流駛炎州丹徼南中地南中南斗映星河秦關秦塞阻烟波三春邉地風光少五月瀘州瘴癘多朝驅疲斥堠夕息倦樵歌向月彎繁弱連星轉太阿重義輕生懷一顧東征西伐凡幾度夜夜朝朝斑鬢新年年嵗嵗戎衣故灞城隅滇池水天涯望轉積地際行無已徒覺炎凉節物非不知關山千萬里棄置勿重陳征行多苦辛且悅清笳梅栁曲詎憶芳園桃李人絳節紅旗分日羽丹心白刃酬明主但令一被君王知誰憚三邉征戰苦行路難幾千端無復歸雲憑短翰空餘望日想長安駱賔王姚州道破諾沒弄楊䖍栁露布臣聞北辰列象六合奉天子之尊南靣乘乾一統成聖人之業故塗山萬國誅後至者防風丹浦一戎緩前禽者就日伏惟陛下登翠媯以握圖居紫微而正象𤣥功不宰混太始以凝神至道無名佇華胥而得夢闡文教以清中夏崇武功以制九夷反踵穿胸之域襲冠帶以來王竒肱儋耳之酋奉正朔而請吏逆賊某浮竹遺嗣沈木餘苖邑殊禮義之鄉人習貪殘之性日者皇明廣燭帝道遐融輒敢亂我天常率九隆而背誕負其地險擕七部以稽誅騷亂邉疆敓攘州郡用是三門授律長驅無戰之師五月渡瀘深入不毛之地岡巒千里西通大荒之郊溪谷萬重南極炎洲之境聳喬林而插月隂兔有假道之標拔崇巖以隱天陽烏無回翼之地峰危束馬路絶懸車賊据臨代之形乘建瓴之勢徵風召雨蝟起蜂飛驅雜種以挺妖封狐千里肆沈黎而作孽雄虺九頭臣始廣布皇恩恭宣帝澤申之以安撫曉之以存亡信重蠻陬無負黃龍之約賞隆漢爵不渝白馬之盟地接冉駹詞屢殫于諭蜀俗通盤瓠聲不輟于吠堯臣遣某某銜枚逺襲卷甲前驅偃危斾而設潛兵疑從天落乘間道而掩不備若出地中彎􅋃而凶黨土崩舉刃而妖徒瓦解雖危苕沸鼎未窮梟首之誅救死扶傷猶致析骸之爨𤣥雲結陳影密西郊赤堇揮鋒氣衝南斗揚塵埃而匝地白日為之晝昏積氛䘲以稽天滄溟為之晦色兵交刃接鳥散魚驚自卯及申追奔逐北斬首千餘級轉戰三十里激流膏而為泉似變萇𢎞之血委亂骸而擠壑若泛鱉靈之尸既而照盡高舂雲昏乙夜賊乃收集餘衆保據高巖臣度彼遊魂慮其宵遁使三軍齊進四靣合圍一鼓先登賞必懸于芳餌九攻按律罪無赦于嚴誅五部雄才三河俠少或生居燕地尤工即墨之圍或家本秦人早習昆明之戰戰踰百里時厯三期前後生擒四千餘人斬首五千餘級諾沒弄楊䖍栁等殞元行陳懸首旌門䝉儉和舍等委衆奔馳脫身挺險昔魏臣伐蜀徒聞蒟醬之竒漢使開卭才通竹杖之利豈若膺紫泥而弔伐指丹徼以臨戎一戰而孟獲成擒再舉而哀牢授首斯並皇威逺暢廟略遐宣奉𤣥德以配天徒知帝力掩皇輿而闡地豈曰臣功不勝慶快之至謹露布以聞又破䝉瞼露布臣聞七緯經天星墟分張翼之野八紘紀地炎洲限建木之鄉西距大秦雜金莖而孕氣南通交址枕銅柱以為鄰俗帶白狼人習貪殘之性河淪赤虺川多風雨之妖水積炎氛山涵毒霧竹浮三節肇興外域之源木化九隆頗作中國之患年將千祀代厯百王鄭純之化不追孟獲之風愈扇三年疲衆徒聞定莋之機五月出師未息渡瀘之役伏惟皇帝陛下祥螭戴玉拓地軸以登皇道契書繩掩天紘而踐帝𤣥雲入戶纂靈瑞于丹陵蒼籙升壇薦禎圖于翠渚六合照臨之地候月歸琛大罏覆載之間占風納賮蠢茲蠻貊敢亂天常橫赤熛以疏疆背朱提而設險石林萬仞巖邑千重望秦阜以相傾崤陵失四塞之阻對梁山而錯峙劒門成一簣之峯不知玉弩垂芒涵水無九嬰之沴瑶階舞銑洞庭有三苖之墟臣等白招乘候順秋帝以揚旌絳節臨邉遲夜郎以解辮營開嶲穴斾轉卭門峻岐折坂之危盡亡襟帶滇池漏江之固曽失藩籬惟逆賊設䝉瞼等未革狼心仍懷豕突陸梁放命旅拒偷安地接祠雞竟無希于改旦山多神鹿終未見于擇音徒開三面之恩逾肆九頭之暴鳩集餘衆蟻結凶徒儋耳椎髻之徒千里霧合鑿齒雕題之孽一呼雲屯於是三略訓兵五申誓衆先登陷敵無遺大樹之功後拒亂行必致曲梁之罰楚人三戶蜀郡五丁氣擁𤣥雲精貫白日沸殘息于層峰更切守陴之哭積圓顱于重阜殆成京觀之封于是乘利追奔因機深入困獸猶鬭似化廩君之魂窮鳥尚飛似驚杜宇之魄僵尸蔽野臨赤坂而非遙流血灑途視丹徼以何逺首領和舍等並計窮力屈面縛軍門寬其萬死之誅賜以再生之路惟䝉瞼脫身挺險負命窮山顧巢穴以靡依逃晷漏而何幾况妖徒革靣徼外非復他人部落離心舟中皆為敵國瞻言梟首指日為期凡在歸降隨事招撫張柬之請罷姚州疏姚州古者哀牢之國絶域荒外山高水深自生人以來洎於後代不與中國交通前漢唐䝉開夜郎滇莋而哀牢不附至光武季年始置永昌郡以統理之其國西通大秦南通交址竒珍異寶進貢嵗時不闕諸葛亮五月渡瀘收其金銀鹽布以益軍儲使張伯岐選其徑卒勇兵以增武備故蜀志稱亮南征而國以富饒甲兵充足由此言之則前代置郡其利頗深今金銀鹽布之稅不供珍竒之貢不入戈㦸之用不實於戎行寶貨之資不輸於大國而空竭府庫驅率平人受役蠻夷肝腦塗地臣竊為國家惜之漢以得利既多歷博南山涉蘭滄水更置博南哀牢二縣蜀人愁怨行者作歌曰歷博南越蘭津渡蘭滄為他人蓋譏漢貪珍竒鹽布之利而為蠻夷之所馳役也漢獲其利人且怨歌今减耗國儲費用日廣而使陛下之赤子身膏野草骸骨不歸老母幼子哀號望祭於千里之外於國家無絲髮之利在百姓受終身之酷臣竊為國家痛之往者諸葛亮破南中使其渠率自相統領不置漢官亦不留兵鎮守人問其故亮言置官留兵有三不易大意以置官夷漢雜居猜疑必起留兵運糧為患更重忽若反叛勞費更多粗設綱紀自然久定臣竊以亮之此策妙得羈縻蠻夷之術今姚府所置之官既無安邉靖冦之心又無且縱且擒之技唯知詭謀狡算恣情割剝貪叨劫略積以為常扇動酋渠遺成朋黨折支諂笑取媚蠻夷拜跪趨伏無復慙耻提挈子弟嘯引凶愚聚㑹蒲博一擲纍萬劒南逋逃中原亡命有二千餘戶見散在彼州專以掠奪為業臣恐一朝驚擾為禍轉大伏乞省罷姚州使𨽻嶲府嵗時朝覲同之蕃國瀘南諸鎮亦皆廢於瀘北置關百姓自非奉使入蕃不許交通來往增嶲府兵選擇清良宰牧以統理之臣愚將為穩便閭丘均成都人與陳子昂杜審言齊名武后時為博士罷官流寓南中碑碣多出其手而西爨王碑其所撰文也有臨水亭詩相傳為寓蒼洱所作其詞云高館基層山幕坐藉芳草傍對野村樹下臨車馬道清朗娛心術幽遐備瞻討回合峰隱雲聮綿渚縈島氣似靈州勝風為青春好相及盛年時無令歎衰老天寶中王師伐南詔前後敗沒二十萬人李白詩羽檄如流星虎符合專城喧呼救邉急羣烏皆夜鳴白日耀紫微三公運權衡天地皆得一淡然四海清借問此何為答言楚徵兵渡瀘將五月將赴雲南征又贈南陵常贊府詩嵗星入漢年方朔見明主調笑當時人中天謝雲雨一去麒麟閣遂將朝市乖故交不過門秋草日上階當時何特達獨與我心諧置酒凌歊臺歡娛未曽歇歌動白紵詞舞回天門月問我心中事為君前致辭君看我才能何似魯仲尼大聖猶不遇小儒安足悲雲南五月中頻喪渡瀘師毒草殺漢馬張兵奪秦旗至今西洱河流血擁僵尸將無七擒略魯女惜園葵咸陽天下樞纍嵗人不足雖有數斗酒不如一杯粟賴得契宰衡持鈞慰風俗自顧無所用辭家方求歸霜驚壯士髮淚滿逐臣衣以此不安席蹉跎身世違終當滅衛謗不受魯人譏儲光羲送李宓伐雲南詩昆明濱滇池蠢爾敢逆常天星耀鐵鎖弔彼西南方冢宰統元戎太守齒軍行囊括千萬里矢謨在廟堂耀耀金虎符一息到炎荒搜兵自交址茇舍出瀘陽羣山高嶄巖凌越如鳥翔封豕驟跧伏巨象遙披攘回溪深天淵揭厲踰舟梁𤣥武掃狐蜮蛟龍除方良雷霆隨神兵硼磕動穹蒼斫伐若草木繫縲同犬羊除醜飲彌河啁啾亂行藏君子惡薄險王師耻重傷廣車設置梁太白收光芒邉吏靜縣道新書行紀綱劒閣掉勒歸武辨朝建章龍樓加命服獬豸擁秋霜邦人頌靈旗側聼河洋洋京觀在七德休哉我神皇高適賀李宓伐蠻歸詩并序天寶十一載有詔伐西南夷右相楊公兼節制之寄乃奏前雲南太守李宓涉海自交趾擊之道路險艱往復數萬里蓋百王所未通也十三載四月至於長安君子是以知廟堂使能而李公效節適忝斯人之舊因賦是詩聖人赫斯怒詔伐西南戎肅穆廟堂上深沈節制雄遂令感激士得建非常功料死不料敵顧恩寧顧終鼓行天海外轉戰蠻夷中梯巘近高鳥穿林經毒蟲鬼門無歸客北戶多南風蜂蠆隔萬里雲雷隨九攻長驅大浪破急擊羣山空餉道忽已逺縣度垂欲窮精誠動白日憤薄連蒼穹野食掘田鼠晡飱兼僰僮收兵列亭堠拓地彌西東臨事耻茍免履危能飾躬將星獨照耀邉色何溟濛瀘水夜可涉交州今始通歸來長安道召見甘泉宫廉藺若未死孫吳知音同相逢論意氣慷慨謝深𠂻按天寶十三載李宓擊南詔閣羅鳯誘之深入至太和城堅壁不戰糧盡引還蠻追擊之全軍皆沒楊國忠隱其敗更以捷聞其䝉蔽若此而達夫乃侈言其功比之廉藺孫吳安得為詩史哉鄭回者唐西瀘令為南詔所虜以為清平官後卒說異牟尋歸唐回有文詞嘗為䝉氏撰德化碑詞繁不具載其銘曰降祉自天福流後𦙍瑞應匪虛禎祥必信聖主分憂遐夷聲振襲久傳封受符兼印兼瓊秉節貪榮搆亂開路南安攻殘西爨竹倩見屠官師潰散賴我先王懷柔伏叛祚不乏賢先獻是繼郡守詭隨貶身遐裔禍連䖍陀亂深豎嬖殃咎匪他塗豕自殪仲通制節不詢長久徵兵海隅頓營江口矢心不納白刃相守謀用不臧逃師夜走漢不務德而以力爭興師命將置府層城三軍往討一舉而平面縳羣吏馳獻天庭李宓總戎猶尋覆轍水戰陸攻援孤糧絶勢屈謀窮軍殘身滅祭而葬之情由故設贊普仁明審知機變漢德方衰邉城絶援徵我兵戎攻彼郡縣越嶲有征㑹同無戰雄雄嫡嗣高名英烈惟孝惟忠乃明乃哲卭瀘一掃軍羣雙滅觀兵尋傳舉國來賓巡幸東爨懷德歸仁碧海效祉金穴薦珍人無常主惟賢是親土宇克開烟塵載寢轂擊梨坑輯熙羣品出入連城光揚衣錦業留萬代之臺倉貯九年之廪明明贊普揚干之光赫赫我王實賴之昌化及有土業著無疆河帶山礪地久天長辨稱世雄才出人右信及豚魚潤深瓊玖德以建功是謂不朽石以刋銘可長可久杜光庭以文章教䝉氏之民䝉學士爨泰葬之玉局峰麓立廟祠之光庭有詩名如題仙居觀詩往嵗真人朝玉皇四真三代住繁陽初開九鼎丹華熟繼躡五雲天路長烟鎖翠嵐迷舊隱池凝寒鏡貯秋光時從白鹿巖前去應許潜通不死鄉又題鴻都觀詩亡吳霸業已功全深隱雲林始學仙鸞鶴自飄三蜀駕波濤猶憶五湖船雙溪夜月鳴寒玉衆嶺秋空斂翠烟也有扁舟歸去興故鄉東望思悠然又題都慶觀詩三仙一一駕紅鸞仙去雲閒逺古壇煉藥舊臺空處所掛衣喬木兩摧殘清風嶺接猿聲近白石溪涵水影寒二十四峰皆可隱振纓長往亦何難賈島久寓雲南有送雍陶入蜀詩江山事若諳那肯滯雲南草色分危磴杉隂近古潭日斜褒谷鳥夏淺嶲州蠶吾自疑雙鬢相逢更不堪雍陶成都人寓雲南有送裴璋還蜀詩家在劒門外新年音信稀自為千里客已送幾人歸陌上月初落馬前花正飛離言殊未盡春雨濕征衣時雲南太守張䖍陀淫虐南詔殺之遂攻成都陶有哀蜀人為蠻所俘者五首但見城池還漢將豈知佳麗屬蠻兵錦江南渡遙聞哭盡是離家别國聲又大渡河邉蠻亦愁漢人將度盡回頭此中剩寄相思淚南去應無水北流又欲出鄉關行路遲此生無復却回時千寃萬恨何人見惟有空山鳥獸知又越嶲城南無漢地傷心從此便為蠻寃聲一動悲風起雲暗青天日下山又雲南路出洱河西毒草長青瘴色低漸近長城誰更哭一時收淚羡猿啼徐凝南詔攻成都詩守隘一夫何處在長橋萬里只堪傷紛紛塞外烏蠻賊驅盡江頭濯錦娘劉灣雲南白門詩百蠻亂南方羣盜如蝟起騷然疲中原征戰從此始白門太和城來往一萬里去者無全生十人九人死代馬卧陽山燕兵哭瀘水妻行求死夫母行求死子蒼天滿愁雲白骨積空壘哀哀雲南行十萬同已矣馬乂蜀中經南蠻俘虜後寄雍陶詩酋馬渡瀘水北來如鳥輕幾年期鳯闕一日破龜城此地有征戰誰家無死生人悲還舊里鳥喜下空營弟姪意初定交朋心尚驚自從經難後吟苦似猿聲權德輿送袁滋持節冊南詔詩西南使星去逺徼通朝聘烟雨僰道深麾幢漢儀盛途經五尺險水愛雙流淨上國洽恩波外臣遵禮命離亭駐騶馭且盡尊中聖白居易新豐折臂翁詩新豐老人八十八頭鬢眉鬚皆似雪𤣥孫扶向店前行左臂憑肩右臂折問翁臂折來幾年兼問致折何因緣翁云貫屬新豐縣生逢聖代無征戰慣聼梨園歌管聲不識旗鎗與弓箭無何天寶大徵兵户有三丁㸃一丁㸃得驅將何處去五月萬里雲南行聞道雲南有瀘水椒花落時瘴烟起大軍徒涉水如湯未過十人二三死村南村北哭聲哀兒别爺娘夫别妻皆云前後征蠻者千萬人行無一回是時翁年二十四兵部牒中有名字夜深不敢使人知偷將大石鎚折臂張弓簸旗俱不堪從茲始免征雲南骨碎筋傷非不苦且圖揀退歸鄉土臂折來經六十年一肢雖廢一身全至今風雨隂寒夜直到天明痛不眠痛不眠終不悔且喜老身今獨在不然當時瀘水頭身死魂孤骨不收應作雲南望鄉鬼萬人塜上哭呦呦老人言君聼取君不見開元宰相宋開府不賞邉功防黷武又不聞天寶宰相楊國忠欲求恩幸立邉功邉功未立生人怨請問新豐折臂翁後敬宗時南詔攻梓州劍南郭釗移書責之乃遣使入貢居易又有蠻子朝詩蠻子朝泛皮船兮渡繩橋來自嶲州道路遙入界先經蜀川過蜀將收功先表賀臣國雲南六詔蠻東連牂牁西連蕃六詔星居初瑣碎合為一詔漸强大開元皇帝雖聖神唯蠻倔彊不來賓鮮于仲通六萬卒征蠻一陳全軍沒至今西洱河岸邉箭孔刀痕滿枯骨誰知今日慕華風不勞一人蠻自通誠由陛下休明德亦賴微臣誘諭功德宗看表知如此笑令中使迎蠻子蠻子導從者誰何摩挲俗羽雙隈伽清平官持赤藤杖大軍將擊金呿嵯異牟尋勞尋閣勸待勑召對延英殿上心貴在懷逺蠻引臨玉座近天顔冕旒下垂親勞徠賜衣賜食移時對移時對不可得大臣相看有羡色可憐宰相拖紫佩金章朝日唯聞對一刻元稹賀南詔獻地圖土貢詩西南六詔有遺種僻在荒陬路尋壅部落支離君長賤比諸蕃甸為幽冗犬戎彊盛頻侵削降有憤心戰無勇夜防抄盜保深山朝望烟塵上高冢鳥道繩橋來欵附非因慕化因危悚清平官繫金呿嵯求天叩地持雙珙益州大將韋令公頃實遭時定汧隴自居劇鎮無他績幸得蠻來固恩寵為蠻開道引蠻朝迎蠻送蠻常繼踵天子臨軒四方賀朝廷無事唯端拱漏天走馬春雨寒瀘水飛蛇瘴烟重椎頭醜類除憂患瘇足役夫勞洶湧胸奴互市嵗不供雲蠻通好轡長駷戎王養馬漸多年南人耗悴西人恐韋臯以南詔兵破吐蕃露布劍南西川節度使同中書門下平章事臣臯等言臣聞天討有辜兵應者勝義者王天佑下民師直為壯曲為老多助之至四極爰輳貞觀則同羅擊延陀開元則九姓殄默啜曰商莫不來享犯漢雖逺必誅德風翔呼河源武節憺呼月􅒸率寧人之有指先元戎之啓行用信威光祖宗不以賊遺君父恭惟皇帝陛下宣昭義問敉寧武功纘八葉之鴻圖奮四征之雄略懷梟鴟銷祲沴禀合太和翦鯨鯢清郊原掃除羣穢王猶允塞我武惟揚竒幹善芳各修貢職條支若木咸順指令邈積石之遐陬有吐蕃之醜類侵敗王略倍奸齊盟乘邉將之騁兵瞰戎亭之虛候為蛇豕食上國盡盜河湟帥蝥賊搖我疆再驚畿甸尚納汙而含垢姑通使以結和清水之盟未乾好畤之師已聚指涇靈而徼賂瞰鹽夏以搗虛夷德無厭弗悔衽金之禍楚氛甚惡輒興衷甲之謀蠢爾為讎整居匪茹維時南詔慕化中朝先零之質諸兒雖嘗并力麋人之率百濮罔不離心頓顙於邉受命於吏斷胸奴之右臂羈南粵以長纓燕貉輸致騎之勤晉戎成犄鹿之勢彼既失鐵橋之險我遂克峨和之郛蓋竄匿於龍沙復䖍劉於麟塞臣等請奮其旅以殱乃讎鳯翔振武靈武之騎獵其西邠寧太原涇原之兵震其北率南山熊羆之校暨東川貙虎之師烏蠻撓其腹心回鶻搗其肘腋衆素飽矣一大治之諸將陳洎等統五萬軍出十一道濟師西皓之半策勳北陸之初遂賈勇而圍昆明將决勝而定青海釋朔方之衆援維州之城九攻九却之計窮七縱七擒之威速連連執訊矯矯獻囚不然我薪而自焚有如破竹之立解拂廬魚潰甌脫兔奔谷靜山空首就焉耆之僇區殫域滅汔聞智盛之降斯皆廟謨淵深神斷天造明見萬里運竒堂上之兵守在四夷制勝目中之虜勒功滇池之柱植表赤嶺之碑一怒安民文之勇也三軍用命克何力焉臣等承帝之明敵王所愾開逺門揭候坐收西極之舊風紫微殿受俘重覩崑丘之茂績臣等無任慶快激切屏營之至謹遣某官奉露布以聞高駢回雲南牒大唐劒南西川節度使牒雲南詔國我大唐聖皇帝德配二儀光齊兩耀仁霑動植聖役神龍煦萬國盡若青天養兆民皆同赤子東鄰若木西屆流沙北通隂山南抵銅柱莫不貢珍納賮航海梯山請奉車書願為臣妾是知卑微螢耀不敢並於太陽齷齪蹄涔焉能踵於神驥且自象寄鞮譯侯甸要荒雖居逺方盡遵中國力爭不得天使其然且以蠓蚋之飛騰不離溝瀆欲追鸞鳯之羽翼擬接熛霄雖是童兒亦知不可且雲南頃者求合六詔併為一蕃與開道塗得接卭蜀許賜書而習讀遽降使而交歡禮待情深招延意厚傳周公之禮樂習孔子之詩書片善既知大恩合報忽窮兵黷武掠土侵疆再犯朗寧重陷交址兩俘卭蜀一劫黔巫塗炭城池皆為灰燼驅歸士庶盡作幽寃凌犯不休貪殘轉甚昔時交址都護不間理兵舊日朗寧元戎未解誅冦受以侵欺容其殘暴今日者親征海裔克復龍編驅駕三千之師勦除十萬之冦沈白衣殁命之衆如赤日消氷殺朱弩佉苴之軍若紅爐熾焰膏塗草莽骸積丘山士卒覩之而稱心夷獠觀之而快意其於勝負詔國洞知昨日來鎮西川移從汶水仗節而不施導騎單車而直抵坤維大開城門放出人物三軍遣歸營幕百姓使返鄉閭此時詔王未離近地固無疑阻今則已知天時誓雪國耻前詔王遣張棟成等揚言和好身才入境兵已繼來况係詔王親行公然詐僞侵欺大國熒惑元戎戮僕之儀須依古典其張棟成等並已軍令處置今則訓練蕃兵指揮漢將鐵衣十萬甲馬五千雍交合從黔蜀齊進昔時漢將有七擒七縱之功今日唐臣藴百戰百勝之術勳名須立國史永書是故牒元楊才照興寶寺碑銘蓋聞率性之謂道妙物之謂神混成天地之先獨化陶鈞之上體至虛之宅無毒無門運不隅之方何自何執出入五物誰測至變之端周流六虛旁行大衍之數知大始者由之揆務佐成物者宗之致能形象分而變化斯彰動靜常而剛柔乃斷𤣥凝易簡之理昭升久大之功仰觀俯察弗昧幽明之宗原始反終遂知生死之說自有適有難保於幻夢之常從迷積迷無挽於風浪之起聖寂起虛𤣥覽大覺慧目隨眠澄心墮體弗諼四誓之言末矢大千之化觀淨性於日種孰類鄒人驗白髮於脅生豈匹虹渚昭四門之逺誡欣厭馳而交懷甘六載之幽求苦樂審其非道術求舊於逺證之式濟維新於所化之生發神足於道場吉祥暫鋪草坐入慈定於樹下波旬立惕興尸光縱混園五老頓忘於本制德勝火窟三愚遂服於仁風示化橋而摧我人指恆河以明生滅大教旁取於五性不化而自行沙輪妙演於三時不言而自治相忘照之極耀幽蔀圓鑒動帝聲之大音盲瞶俱拆遂使九十六種貫魚而聼命二十六品拔茹以成羣闡微座而開大經頒寶藏而振諸方莫不十度成敘六趣捐開束名實者息肩於𤣥團尚清淨者同味於大道時來舍衛鶖子奉命于祗園暫上天官優王遂興于檀像即穢土以闢淨剎寄有相以述真常欲使作三界之歸依為像法之洲渚妙哉恍惚無得而稱焉蓋此寺者大䝉知軍事布燮楊禎之所創也年鍾建極委佐兵機稅蜀衝蕃惟公是倚外則弼諧帝道事竭於君內則翼扇真風心忘於法卜茲勝地創此精藍嵗月已淹痛哉圯毁有公子高踰城光者曽祖相國明公高大明祖定逺將軍高明清考牧公高踰城生者定逺將軍之長子也積剛柔之粹德鍾嶽瀆之休靈清明在躬鑑澄波之千頃風神絶俗挺巨嶽之萬尋率匡救於明朝善彌縫於霸業降德惟欣邁種披恩未殫及人戰則如神鄙圯橋之取履政則凝化踵合浦之還珠載折四豪功高五霸踰城光數當再索慶襲餘芳天質自殊龍章特異夙藴風雲之氣早實仁義之懷和順內凝英華外發器茂識環之嵗蘭桂有芬志高還洛之年清暉自逺敬義無失忠節更堅龍行而異虺吞聲鶚視而羣翔鎩翮難不讓於歷試位則退以居謙鬱其千里之才擢以百里之命奉㫖則仁聲已洽下車則清風載興簞食壺漿歌來蘇而滿路逸民傲吏輟考槃以登朝乃煦以秋陽威以夏日坐甘棠而聼訟設庭燎以思賢振平惠而字小人𢎞義讓以朂君子民識廉耻咸習管子之風家足農桑旁盡孟軻之志緝理之暇澡德𤣥源恨不手布黃金幸齊肩于善施日用留心白馬庶接武於漢明傷德本之未滋慟斯藍之煽燬遂乃俟子來之衆鳩心競之工妙啓新模式仍舊貫上棟下宇遂合大壯之宜矢棘翬飛崛起斯干之勢窮山水之幽致溢烟霞之佳趣西則松風發夕驚聞苦空之音南則江月殘朝忽認靈臺之鏡東臨霧闕近接應供之賢北枕平坡逺盻釣鰲之客一一美麗事事新竒盛矣哉華州之佳境也夫作而不紀非盛德焉乃挹儒風粗陳風烈其詞曰率性曰道妙物稱神混成天地獨化陶鈞形象乃分剛柔斯判幽明迭興生死相換幻夢勿固風浪非常至寂豈默𤣥覽獨章四積弗緩八相斯暇端景固天微鷕衛社四門昭戒六載幽求道成樹下法演鷲頭鶖子標藍優王刻像三界歸依羣生瞻仰傳哉此寺肇自楊公心亡於法事竭於忠創此德基忽遇煽燬不絶人望挺生公子明祖靜城顯考廷邉積善餘慶托嗣家延委事天倫敬而無失恭履秋霜友垂冬日難則厯試位乃居謙擢以百里德化清廉政理之餘留心喜捨想布黃金思題白馬乃仍舊貫式建仁祠於斯盡制大壯德宜𤣥功既擬真珉可紀共彼天長盡善盡美郭松年卭竹寺詩南來作使駐征鞍風景還驚入畫看梵宇雲埋笻竹老滇池霜浸碧雞寒兵威此日雖同軌文德他年見舞干北望烏臺猶萬里幾回揮淚惜凋殘喬堅滇池詩滇水不可涉石㦸參嵯峨胡能宅蛟龍但可藏黿鼉渚風蕩驚湍乃爾泥滓多我欲澄其源應自崑崙阿寸膠諒靡救臨流將奈何商山紫芝曲漁父滄浪歌斯人久不作千載無清波又題河尾關驛壁二首蒼峰千丈玉槎牙錦樹糢糊噪晚鴉濁水難將明月浴好山多被亂雲遮村江日落人爭渡旅店年豐酒易賒可是炎方風景别𤣥冬開遍野桃花又池上蒼山翠作堆池邉花竹映樓臺夜喧燈火庖人語地覆松花使客來戰馬不嘶關柝靜哀猿無語瘴雲開征衣盡拂紅塵去且向郵亭進酒杯張翥西蕃箐詩西道出卭僰百里彌箐林晚行不見日刺水鬱蕭森伏莽有夷獠巢枝無越禽根盤三嶺險氣接四蕃深銀山雪夏白金沙嵐晝霖主恩畀良帥時平靖蠻心風威所播掃瘴地空毒淫願言闢南徼蔽以樹棠隂公孫輔入滇益亂後傷懷詩驅馬霑益州南望滇海頭向來繁華地變滅如浮漚迥不見人烟但見河水流青山宛然在風景何蕭颼郡縣生荆棘汙菜翳田疇夜聼虎豹號晝顧麂鹿遊羣鳥集戰壘野燐飛林丘灼灼道傍花只為行者愁緬思冦亂際藩垣失防秋空虛起外侮口語興戈矛盛衰雖大運禍端亦人謀生靈爾何辜吾欲天公尤李材送楊耀卿使雲南詩飄飄使節出金閨郭隗臺前暫解擕天入五溪無雁到地經三峽有猿啼子雲舊里風烟在太尉家聲日月齊後夜客槎何處望秋河迢遞碧雲低又出使雲南留别詩蒼龍雙闕鬱岧嶤曽待鵷鸞趂早朝往事已隨塵衮衮虛名贏得鬢蕭蕭長林豐草空相憶瘴雨蠻烟苦見招借問都門門外栁為誰留著最長條李京過金沙江詩雨中夜過金沙江五月渡瀘即此地兩巖峻極若登天下視此江如井裏三月頭九月尾烟瘴拍天如霧起我行適當六月末王事役人安敢避來此滇池至越嶲畏途一千三百里干戈浩蕩豺虎穴晝不遑寧夜無寐憶昔先帝南征月簞食壺漿竟臣妾撫之以寬來以德五十餘年為樂國一朝賊臣肆胸臆生事邀功作邉隙可憐三十七部民魚肉豈能分玉石君不見南詔安危在一人莫道今無賽典赤明王奎臨安秋江靜釣詩長江西來幾千里白浪飛流拍天起中有修鱗長比人不入先生釣竿裏先生襟度足與娛直鉤在意不在魚要將清風蕩星斗不與怒濤同卷舒昨夜一絲蘸寒月今夜一絲拂飛雪舉頭傲睨天地裂目光夜射蛟鼉窟先生釣竿幾許長先生經綸千丈强子陵桐江遇文叔尚父渭水逄周王江山回首應非故世事茫茫難縷數赤壁天空雁不來采石月明鯨已去乾坤上下清絶塵天潢水白結氷銀先生有意投竿起嵗月無情那待人史公謹雲南詩城南雙塔高嵳峩城北千山如湧波隔斷中原萬餘里耳邉無處聞絃歌我來正值兵戈後厭聼邉聲出刁斗壯士沈雄細栁營豈效棘門空﨣﨣金戈鐵馬擁雲霧顧爾羣凶如培塿軍中大將漢武侯氣吐虹霓橫素秋七擒七縱平其酋殺氣慘淡空中收羣氓趁墟出方物蒟醬莋馬隨旄牛蠻語侏􅍣若禽鳥笑聼華言不諳曉縱橫跋扈無尊卑翻覺王臣眼中小回首令人憶中國拔劒高歌倚天立碧雞蒼蒼元氣濕梁王宫殿為荆棘鷓鴣朝鳴猿夜集金滿牀頭總何益不如一醉杏花村濯足昆明看山色楊士雲蒼洱圖說蒼洱之景嶂巒萬疊戴雪腰雲如列屏十九曲峙於後者㸃蒼山也波濤萬頃橫練蓄黛如月生五日瀦於前者葉榆水也按酈道元水經注葉榆水一名洱水西漢於此置益州郡葉榆縣夏秋之交山腰白雲宛如玉帶昔人題云天將玉帶封山公五月積雪未消和蜜餉人頗稱殊絶峰峽皆有懸瀑注為十八溪溪流所經沃壤百里灌溉之利不俟鋤疏舂碓用泉不勞人力剨山取石白質黑章以蠟沃之則有山林雲物之狀唐相李德裕平泉莊命曰醒酒石香山白侍郎命曰天竺石好事者往往取為窗几之玩郡之方位延庚挹辛賔夕陽而導初月蓋與臨安之西湖洪永之西山嘉之峨眉齊安之臨臯滁之琅邪同一快麗若夫四時氣常如初春寒止於凉暑止於溫曽無褦襶凍粟之苦此則諸方皆不能及也且花卉蔬果迥異凡常島嶼湖波偏宜臨泛一泉一石無不可坐風帆沙鳥晴雨咸宜浮圖巨麗玉柱標穹傑閣飛樓連幢萃影翠微烟景隂蔚葳蕤千態萬貌不可為喻至其地者使人名利之心消盡崇聖鴻鐘聲聞百里諸峰鐘韻遞為連屬滄波漁火滿地星辰峽壁澗峰植圭攢劍時有隱君子誅茅其中唐人詩云懸燈千嶂夕卷幔五湖秋此語殆為斯地設也又山水環抱如兩弛弓弓弰交處是名兩關天設之險兵燹不及水東磨崖題云此水可當兵十萬昔人空有客三千是為奧區竒甸世稱樂土顧僻在西陲非宦遊莫至也李夢陽何子至自滇南詩醉折荷花别寧期花復開川原一回首雲日共徘徊知向百蠻去云從三峽來進舟雖一賦胡棄楚陽臺何景明寄黔國公詩萬里山川開百粵十年戎馬暗三巴伏波銅柱衝炎塞橫海樓船出瘴沙鴻雁不傳天北字瓊瑶空憶日南華飄飄奉使金門客目斷銀河八月槎又平夷二首滇南八月中緑林何萋萋居人亦相輳數里聞鳴雞路轉無詰曲山行少攀躋回瞻貴陽道咫尺溪壑迷又夜半平夷館風悲氣始凄月光皎東壁白露寒螿啼憑高視中原但覺衆星低長路心益壯浩歌天之西又九日黔國後園二首何處風烟消客愁將軍臺榭枕山丘一年又過重陽日兩鬢空悲萬里秋水國隂多寒已至炎方霜後瘴初收憑高欲送登臨眼更上池邉百尺樓又天空逺水明秋岸梧葉蕭森楓樹殘黃菊數從行處見紫萸獨向醉中看浮雲樓觀滇城暮落日山川僰道寒忽憶登高去年客慈恩湖閣共憑闌御史唐龍公署漫興三首草亭春寂寂野性頗相宜井近硯池滿雨來書榻移幽花依石發過鳥下簷窺乘興入深竹寒光滿素絺又亭上鶯花老風光轉芰荷如何春日裏都向客鄉過逺海波聲少近山雲氣多醉中時慷慨不敢向人歌又洞門鎖清晝一徑落花深把酒對山色讀書隨樹隂田園荒舊業松菊憶初心細草江城暮愁聞鶗鴂吟又登圓通寺詩物外暫招尋惟聞鐘磬音松蘿栖梵影水石定禪心雲去蒼崖濕僧歸紫徑深滇池風雨至正好聼龍吟莆田林俊大理分司詩徙倚近孤松青山隔鄰壁誅茅何者家烟花共遊息啓窗日未曛鈎簾月又夕誰將炯炯心照此幽幽室又蒲縹驛詩草亭動孤酌日斂瘴烟昏老屋因風卷清溪帶雨渾桴鼓新聲在山甌古意存蓽門通細火漁唱起江村僧天祥者不知何許人大理志載其二詩清婉可喜其榆城聼角詩云十年遊子在天涯一夜秋風又憶家恨殺葉榆城上角曉來吹入小梅花又龍關水樓詩此樓登眺好終日俯平湖葉盡村村樹花殘岸岸蘆漁翁晴獨釣沙鳥晚相呼何處微鐘動雲藏島寺孤成都楊慎在滇吟詠至多今摘其尤者滇海曲十二首梁王閣榭水中央烏鵲雙星帶五潢跨海虹橋三十里廣寒宫殿夜飄香又碧雞金馬古梁州銅柱鐵橋天際頭試問平滇功第一逢人惟說潁川侯又化城樓閣壯人寰澤國封疆鎮兩關雲氣裝成銀色界天工斫出㸃蒼山又葉榆巨浸環三島益部雄都控百蠻神禹導河雙洱水武侯征路七星關又沙金水貝出西荒桃竹橦花貢上方香象渡河來佛子白狼槃木拜夷王又雕房草閣瞰夷庭側島懸崖控絶陘雞足已窮章亥步鷲頭空入梵王經又孤戍平溪望大荒邉愁海思入蒼茫帝鄉東北仙雲隔僰道西南媚景長又昆明池水三百里汀花海藻十洲連使者乘槎曽不到空勞武帝御樓船又湖蕩魚蝦晨積場市橋燈火夜交光油窗洞戶吳商肆羅帕封頥僰婦粧又蘋香波暖泛雲津漁枻樵歌曲水濵天氣常如二三月花枝不斷四時春又煮海鹺郎暝漉沙避風仙客夜乘槎雪浮粳稻壓春酒霞嚼檳榔呼早茶又海濵龍市趂春畬江曲漁村弄晚霞孔雀行穿鸚鵡樹錦鶯飛啄杜鵑花題捨資驛垂栁篇云楚雄苴力橋有垂栁一株婉約可愛往來見之賦此志感靈和殿前艷陽時忘憂館裏光風吹千門萬户旌旗色九陌三條雨露姿蒼凉苑日籠燕甸縹眇宫雲覆京縣芳樹重重歸院迷飄花㸃㸃臨池見臨池歸院總仙曹應制分題競彩毫詔乘西第將軍馬詩奪東方學士袍金明緑暗留烟霧舊燕新鶯換朝暮只知睂黛為君顰肯信腰肢有人妬從此沈淪萬里身可堪憔悴四經春支離散木甘時棄攀折荒亭委路塵搖落秋風上林逺婆娑生意華年晚腸斷關山明月樓一聲橫笛清霜坂高嶢除夕詩海濱戍旅久忘歸獨對朝嵐與夕霏莎徑晴沙采樵路柴門秋水釣魚磯太平時節身難遇流轉風光賞莫違街鼓市塵渾隔斷村舂鄰火自相依寄楊𢎞山都諫詩螭頭早掛進賢冠跡逺東墀玉筍班倦意已還飛鳥外歸心原在急流間仙郎高議留青瑣學士新詩滿碧山十九峰前同醉處夢中瓊樹幾回攀慎婦黃氏亦有才情慎久戍滇中婦寄一律云鴈飛曽不到衡湘錦字何由寄永昌三春花栁妾薄命六詔風烟君斷腸曰歸曰歸愁嵗暮其雨其雨怨朝陽相逢空有刀環約何日金雞下夜郎又黃鶯兒一詞積雨釀春寒見繁花樹樹殘泥塗滿眼登臨倦江流幾灣雲山幾盤天涯極目空腸斷寄書難無情征鴈飛不到滇南楊别和三詞俱不能勝張含金齒孝廉所為詩豪宕悲壯用修亟稱之其詠五華臺云五華臺上望昆明淨練微茫似掌平故國欲歸歸未得海風山雨一齊生其滇池歌云金標鐵柱久銷兵戈甲竿旗起戰聲痛哭寃魂空月色凄風終夜弔昆明㸃蒼書院詩仙佛傳經白玉堂老松無數鎖幽香山連海國龍關杳雪擁春城雉堞長萬里衣冠開六詔百年詞賦效三湘繁臺故事今何在雲日徘徊古石梁飲龍津閣詩春日城西獨自遊祗緣擕酒得淹留插天樓閣烟花重泛海魚龍日月浮漢國河山真帶礪晉家人物故風流黃鸝恰恰啼深樹吹盡東風不解愁寄升菴詩豪吟金馬復連然搨盡韋郎五色箋海上風烟俱作客天涯雲物自相憐松凉月坐華亭寺花暖春遊碧玉泉一别昆明池上路滔滔流水八經年又公子思歸幾嵗華王孫芳草遍天涯樓頭豔曲包明月海口新銘蔡少霞光祿塞遙空遞鴈上林枝好正棲鴉夢中記得相尋處東寺鐘殘北斗斜四明張時徹入滇四首天邉乘傳客歷險到殊方草長知烽息民流屬嵗荒巖花薰澗壑木葉墮衣裳何事秋風起愁看白髮長又山路日多雨我行猶未休碧溪雲不定青草瘴仍浮客久旌旄落天空鸛鶴秋卜居何以賦長嘯攬吳鈎又寒燠經時變浮踪不自由迢迢望鄉邑歷歷見林丘紫澗屋頭出白雲巖際流眷言霞卧者即鹿諒非謀又雲起千峰失猿鳴清晝隂褰帷從霧入度隴病泥深石出泉流戰橋低野竹侵桑弧自有事偏動故鄉吟銅梁張佳𦙍督學滇中多所題詠其望中和山云古城東北望蒼翠隱芙蓉臺殿星辰近雲門日夜封紫烟和瘴癘大壑度霜鐘寄謝緱山侣將因跨白龍入滇城云西南天盡見雄都氣象中原自不殊山削芙蓉青並出日銜湖水色平鋪觀風到處周藩服建節何人漢大夫偶向碧雞祠下問那知神物至今無自漾備趨金齒云五月江聲走白沙沙邉石氣盡雲霞峰隂寒積何年雪瘴雨香生古樹花獨立南荒成萬里每憑北斗問三巴蘭津已說明朝渡絶域虛疑漢使槎詠瀾滄橋云叠嶺遙知萬馬愁蘭津西渡赤虹浮黿鼉駕浪聲齊動鳥雀飛梁影並收纜束長江標絶壁天懸雙鏡照中流當時漢卒勞歌地翻石於今作壯遊署中秋懷四首吏隱常依一畝宫案頭幽鳥坐秋風樓高散帙青天上露滴繁花緑樹中小隱㑹心無逺近轉蓬隨地可西東虛慙絳帳橫經日空使諸生侍馬融又瘴海西南日月偏秋空高落五華烟寰中足路將無遍江上茅堂亦可憐滇水向來龍馬窟昆明不見漢樓船桑弧本是男兒事矯首風雲北斗邉又蕭颯孤城木葉秋日南天畔好登樓尊開黃菊香堪把峰擁朱欄翠不收詞賦何如金馬使歌鐘亦接武陽侯羈棲獨抱雙龍匣風雨常令海上愁又偃蹇平生鬢欲絲向來投賦弔湘纍乘時提槧聊三仕落日褰帷更九夷霄漢獨存鴻鵠志秋風吾愛桂花枝一從鄴下論交定白眼逢人祗自疑又金齒道中雜詩十首叱馭何如鳥道難無名花向野林看萬山飛瀑雲齊落多少征人五月寒又古驛樓高雷雨鳴春山無恙夏雲生愁來江漢人千里落日風傳布榖聲又萬峰深處打牛聲父老猶能說孔明一自渡瀘鳴土鼓南中何地不桑耕又橫嶺雲盤曲澗多芙蓉隨杖轉嵳峩泉聲百道凌天出云是西南九渡河又諸夷村落萬峰中駐牧分明漢俗同聞道近來租調苦安邉誰念昔時功又漾備江深江草齊江花開處鷓鴣啼博南矯首青堪摘霞氣猶懸萬嶺西又江濤吹轉大滄東日月雙扶駕海虹千尺鋃鐺驚不渡飛梁虛掛赤霄中又寒濤齊響萬松枝立馬空山拾紫芝何處夷歌聼不斷迎神或是竹王祠又高臺曽是漢時營千載天威尚有名日暮九隆何處望夏雲飛滿不韋城又千山忽盡見哀牢野闊天空俯佩刀風雨驟隨遊客到雷聲吹散大江濤督學鄱陽童軒有鶴慶道中詩巖深多險阻馬足正凌兢暝雪依巢鳥斜陽歸寺僧林疏鳴敗葉澗古積堅氷去去無辭逺荒山更幾層又祿脿驛詩京國雲山逺悠悠入夢思頻年縻薄宦何日是歸期魚鴈音書斷風霜道路遲窗前殘月白起視夜何其歷下李攀龍送豐城杜少府謫滇南詩共惜投荒萬里天當朝起草事空傳主恩緑鬢神仙尉客夢青雲侍從年盤水秋帆開瘴癘黔陽春樹隔風烟孤臣自有豐城劍遙夜思家向斗邉嶺南黎民表送人之騰越詩北闕秋風綰郡章單車人自識循良長途正渡瀾滄水清吏休論寶玉鄉行笥護衣無越艷碉房稽首有夷王漢家不事西南徼卭竹無勞貢上方方伯陳時範碧雞關詩繡壁倚天雞巖枝濕翠低神仙傳漢使驛路控雕題為客關山逺傷心骨肉擕王孫芳草處惆悵欲凄迷又秋日集太華晚陟羅漢寺詩雨霽空江靜不流夕陽霞頂宴高秋漢家金馬開南詔聖世昆明入兖州關塞極天豺虎息河山萬里鳳麟遊天王朔雪炎風地真覺車書奉冕旒吳郡皇甫汸曹溪寺詩鷲影知何處螳川去不遙仙巖鐘夜月金水漢時潮浴罷衣聊振風停幡屢飄逺公一相謝乘醉下溪橋又過吕合驛題仙人骨詩昔人自羽化孤骨尚安存青塜藏金藥難招緱嶺魂豫章姜欣參知過蒲陀崆詩蒼洱西頭路秋來幾往還一村三度水十里九重山僧寺多依嶺人家半雜蠻草年成底事巖險苦躋攀又自蒲縹驛題龍川詩凌晨發蒲縹向夕憩龍川渡口水初落山頭花已然邉城閒戍鼓墟里起炊烟更聼輿人語村村大有年吳興徐中行入滇二首蒼然平楚望云是古滇疆白日開南徼青天豁大荒河山猶內地花木自殊方吹盡浮雲色雄風萬里長又一出夜郎道才看曉日生風聲連海壯地勢入滇平氣色開金馬烟花滿石城寄言張博望此去可橫行又登太華山觀昆明池詩隂隂松柏隱香臺的的晴波萬頃回仙掌逺從西嶽出神池忽似上林開鏡中斜日搖金剎天外飛霞送酒杯共憶樓船曽賜宴新詩不數漢臣才莆田方沆督學滇中有西巡過祿豐詩千山開井邑隴畝報年豐籬落晴烟外襜帷嶺樹中疏花秋自發絶壁路仍通凄斷登臨恨閩雲半畝宫又捨資驛讀垂栁篇懷楊用修太史詩嗟爾承明供奉年投荒萬里主恩偏詞林雅擅穿楊技荒徼空傳垂栁篇過客西風頻駐馬郵亭落日自啼䳌卧觀遺跡淋漓處倣佛龍蛇晝起烟又龍尾關天生橋詩蒼嶺青未了寒烟野戍平危梁通地脈削壁類天成霜色孤鴻暝濤聲萬馬行昔年曽割據形勝控榆城又蒲陀崆詩尋源聞黑水百折此山隈鳥道雙旌轉隂崖一線開奔濤疑聚雪觸石忽喧雷為别東流性南溟去不回又過永昌城南諸葛營詩諸葛行營地晨征野望微名垂滇日月雲閃漢旌旗霽色川原闊清時壁壘稀采風聞父老猶自說天威閩司空林如楚蒼山圖歌吾聞㸃蒼名山乃在哀牢之北鶴川之東勢與碧雞金馬相爭雄巋基盤礴三百里上架井絡摩蒼穹帝遣蒼山君下鎮坤戶為愚公夸娥有力不得舉至今嶄絶蠻夷中夕嵐朝靄窈窕而葱蘢錦屏障斷西南風屏端十九峰一一肖芙蓉初疑翠鬟參差明鏡裏又驚睥睨連雲起巫陽十二九華九巘缺巒﨑安足擬上有靈湫長寂寥琳宫寶剎山之腰紫蒲仄岸人難掇殘雪深林寒不消四時龍氣作微雨但覺颯瀝松泉飄奔流却投西洱海波光萬頃堆瓊瑶赤崖玉案何么麼有似數㸃青萍漂誰令顧虎頭寫此白團扇可憐咫尺間攢峰如眼見西曹隱吏懷仙客齊中提擕滿幽色玩之不减㸃蒼石真山真水真竒瑰我昔對之心顔開今朝把圖重歎息始知靈根千劫凝真胎維嶽生申變幻亦如此不爾那得藩宣為翰才吁嗟乎名山嵗晚長崔嵬尚平多纍胡為哉藜笻芒屩生塵埃我無凌風翼矯首空徘徊㑹借擲金孫綽筆為君乘興賦天台福唐薛夢雷到滇詩迢迢使節赴昆明一别乾坤萬里程吳楚褰帷江月曉黔沅飛斾嶺烟晴五華雨過春長在列柏風來暑自清金碧山川時極目燕閩雲日總關情又泛昆明池憩羅漢寺詩昆明池上碧山頭此日登臨霽色收烟曉佛燈蘿薜洞雨來官舸杏花洲危崖絶頂浮金馬巨浪中流起白鷗千頃風波堪縱目誰憐身世轉悠悠送漆兵憲城屯猛卯城蠻烟瘴雨十年餘憲府天恩下玉除霜署新持金馬節雪山仍擁畫熊車城臨雄鎮關逾壯地闢龍荒餉未虛報主險夷君莫問朝廷原有紀功書送沐都護西征詩傾城士女擁行旌都護爭看出漢營開鎮十朝雄將略登壇萬里肅軍聲白猿玉劒秋霜淨朱鷺金鐃夜月明不待華山歸馬日彩毫先為賦西征汝南李叔茂本固巡按滇中有楚雄道中詩山行亦不惡疏雨夜來過祗覺峰巒秀誰云瘴癘多人家依水竹僧寺隔烟蘿越嶺分林莽遙聞伐木歌又悠悠持使節日日繞山行跋涉吾須倦登臨眼自清巖花爭媚客谷栁暗啼鶯落日松杉外蒼茫見楚城春日雲泉山寺詩何處登髙可當歸雲山亭寺坐霏微披林便覺塵心逺把酒平分爽氣飛谷裏鶯聲頻遞籟巖頭蘿薜巧裁衣晚來目極寒烟外幾㸃冥鴻帶落暉天生橋觀浪詩攢崖逼仄鬱崔嵬誰鑿𤣥關一竅開力士峽中驅石起靈鼇海上駕山來浪花晝捲千層雪濤勢晴喧萬壑雷鎖鑰西南形勝在分符須仗不凡才龍尾關詩䝉王此割據形勝亦竒哉鷲嶺排雲入龍關倚劒開霸圖猶在眼戰骨已成灰落日秋原外悲風動草萊潯陽萬禺存嗣達分守金滄夏日署中書懷詩四首朝來退食後虛室靜無喧樹古叢蒼鼠巖高蹲老猿海風侵市冷山霧壓林昏伏日猶重祫寒暄可共論負乘來滇國探竒問洱蒼關仍嚴虎豹節已愧羔羊厭苦馳邉檄浮沉歷瘴鄉音書秋後杳歸鴈隔衡陽南中車騎少成我寡交遊宦况悲遒景鄉心怵早秋懶從靈鵲喚間任好雲留欲擬江南賦開軒問斗牛險易惟吾適東西任所之無文空諭蜀垂老更居夷窺鏡羞蓬鬢橫金負素絲此中多勝地杖策且搘頥遊三塔寺得十二韻勝地標三塔叢林入萬松鐸隨天籟發影混嶽雲封世界光牟照浮圖祕鬼工僧貧閒掛衲地靜逺聞鐘古剎頽金象遙空下玉龍燈傳靈鷲嶺香辨㸃蒼峰海夜潮音沸山隂法梵重烏蠻饒釋國丹洞幾仙踪炎夏銷煩劇長秋縱懶慵水田裁舊式鹿苑戀清供慧逺欣同趣𤣥暉喜見逄偶從林靖入因悟勝因宗天台王士性㸃蒼山歌㸃蒼山高躡空連峰十九如掛弓峰峰流泉落澗底下浸榆葉涵山東高山積雪照人眼六月吹墮隨罡風寒光飛翠迸馬首太隂皓氣摩蒼穹我聞㸃蒼有竒石胡自山蒼石還白豈是隂崖太古雪化作瑶華㸃空碧玉宇璚樓亙終古影落榆河驚水府驪龍弄珠蛟起舞吐炬燃天作風雨洪濤不沒大鸛洲瞥然大地如欲浮四時變態更譎幻深山巨澤良悠悠我欲乘風御列缺排雲直踏中峰裂珊瑚出水月未高倦來且嚼山頭雪又同吳張二憲使登九鼎山歌君不見巴西吳使君君家九峰號凌雲三峩隱隱天際分又不見沅陵張仲子君家九疑隔湘水白雲盡入蒼梧裏就中九鼎亦㠝岏五雲自昔稱竒觀朅來選勝正陽九北風吹鴈天宇寬白衣望斷黃花老落落長松翠色寒疏櫺朗月照清夜大壑噫氣摶林端燕壘蜂房嵌空碧清磬一聲天咫尺秋旻欲化無羽翼仰頭好把雙星摘君為我浩飲我為君朗吟烏帽籠頭吹不落杖底青山知我心醉睨㸃蒼山上雪手撲飛花和酒咽又昆明泛舟宿太華山縹眇樓詩高秋風雨欲西來秀拔三峰掌上開半浸混茫分野色平臨紫翠落城隈洪濤漲處無烟嶼青海翻時有劫灰共道風光天外盡誰看咫尺在蓬萊又登山臨水為誰留蓼白蘋青起暮愁萬頃濤聲行木末千尋嶽色倚池頭石鯨不見秋風動金馬來追夜月遊何限乾坤蕭瑟意依然縹眇一飛樓番禺郭棐為滇右轄遊陟名勝題詠不絶其秋日遊湧泉寺詩天開寶剎凌雲出地湧珠泉抱寺流龍氣光銜祇樹曉鶯花紅映綺園秋共憑罨畫調鸚鵡醉倚闌干望斗牛笑問巖前飛瀑水幾時還作曲觴遊中秋宴集詩璧月盈盈夜金風淡淡秋榆花當席照桂影滿庭流把袂來金碧傳杯近斗牛共酣滇海飲不數武昌樓登太華山寺詩南甸名山雄㝢內諸公佳興共夷猶㑹探滇海無邉景先向華峰絶頂遊四野黑雲山似墨滿天紅雨客登樓此中氣候由來早六月凉風恰是秋閩鄧原嶽澄江道中詩嵗晚厭行役單車豈遑處衾冷不成寐出門復何許雪霽天色寒風急江聲怒何處落梅花徘徊日將暮過玎璫嶺詩灌木千章合巖花三月深泉聲盤嶺急雲氣結林隂駐幰方危磴褰帷復逺岑嵐光添秀色霛籟發清音不盡搜羅興其如汗漫心計程無百里問徑有千尋擁腫圍竒樹鈎輈語怪禽未須愁瘴癘頗已愜登臨西塞狼烟定南天鴈羽沈嘯歌還不廢聊此散煩襟過華亭寺讀方子及碑詩載酒尋僧席屢移春山何處不相宜琉璃影散天花落金碧光搖法鏡垂地近西方開竺國烟銷下界瞰昆池栖霞片石應堪語苦憶南朝江總持同漆使君宿九鼎蘭若詩九鼎山頭列九峰雲間幻出碧芙蓉香林寶閣僧廬淨叠嶂懸崖佛剎重夜靜泉聲時雜磬天隂嵐氣欲迷鐘憑君遍說諸名品可是南宗與北宗吳郡馮時可分巡大理僅九閲月以祝釐去其白水關驛對月詩淺山曵輕雲茂林鬱深碧夜氣凉如水當窗迎皓魄露華洗空氛清暉流几席已欣鳥道脫尚恨鴛樓隔抱影獨寤寐銜恩感今昔天宇本自寬人生胡自窄萬里遊亦竒百城臨且適當劇即程書乘閒亦振屐悠然如在林孤臣何局蹐登葉榆城詩命駕初尋寺沿城更上樓白雲爭岫起碧水與天浮汗漫遊應逺蹉跎嵗且秋長安何處望佇立思悠悠㸃蒼山詩蒼崖㸃霄漢隨照映孤城晴雪嵗時積竒雲日夕生龍蛇依石卧鸛鶴傍松鳴十八溪分注家家環珮聲豫章鄧渼以侍御按滇所至題詠殆遍其姚安道中詩山霧四塞烟霏微林深箐密人行稀青蛉川北日初霽弄棟城頭雲亂飛映水鳬茈故寂歷迎風燕麥相因依故鄉節候復誰記五月南中猶夾衣盤龍山寺遊矚詩勝地不回車將貽山靈誚况值冬景霽乘高展清眺涉澗潄潺湲搴蘿陟窈窕蔥楚宛浮翠含桃靜宜笑此景在冬惟滇中有之泉香泄暗竇巖光發幽竅花龕據峰腹茲焉得佳要俯睇漸微茫仰攀益孤峭幽賞如素期沈疴即已療尸曠詎因斯竊欲辭廩料人日登太保山詩太保山頭七日春邉城景物迥愁人甲兵未解銀生戍耕種才餘漆齒民地險風烟迷大候天清楊栁映蘭津登高倍切思歸嘆恰數離家二載身泛西洱河詩觴豆笙歌載兩頭春風徐漾木蘭舟魚龍徙族聞中夜蒲栁分行辨四洲弓月全臨隄影出蓮峰遙學浪花浮清尊滿泛空明色宛在蒹葭白露秋重入碧雞關詩碧雞關頭雞早鳴碧雞山下車彭彭車塵起處見芳草云是秦時五尺道出亦從此關入亦從此關麥秀漸漸雉子斑斑衝寒獨往今始還君不見路傍山躑躅巨於赤茸鞦宛轉當馬頭爾非孔氏徒胡為轍環卒不休男兒不習異鄉味空誚衣冠楚沐猴閩布衣徐􅎾豫章送謝在杭之滇二首彭蠡湖邉惜解擕星軺遙指夜郎西天書日下銜丹鳯山色雲中見碧雞南甸諸蠻金裹齒東方千騎鐵為蹄官閒到處堪吟嘯洱海年來靜鼓鼙又纍纍金紫已垂身六詔分藩簡重臣文比王褒堪奉使詩工謝朓動驚人雲光五色皆成彩天氣經年總似春手版支頥朝爽入㸃蒼如黛絢嶙峋閩曹觀察學佺送謝在杭參滇藩詩萬里滇南國迢迢使節臨親朋稀見面夷漢共傾心有水皆名海無花不作林碧雞金馬跡到日一搜尋南昌楊春茂巡按滇中有遊青華洞詩迢遞問青華迂回一徑斜洞天晴滴雨海色曙來霞聼樹簫鳴玉飛杯酒送花勝情遊未巳前路報猶賖又天生橋詩誰謂河無梁天生古渡長雙虹梯兩岸一水竇中央蒼石流雲潤梅花濺玉香橋頭峰峭壁曾此繫名王又鐵索橋詩一水銀河迥千尋鐵索通填成疑駕鵲懸度擬飛虹過客喧馳馬真人冷御風蒼烟籠石壁天地永神功閩布衣陳鴻寄謝在杭先生參滇藩詩南行萬里奉新恩徼外方知嶽牧尊六詔星辰隨擁傳五華烟月對開軒路通密箐蠻居異山枕荒祠漢甸存應有彩雲供灑翰朝朝飛傍紫薇垣滇中掌故則漢陸賈南中行記一卷楊終子山哀牢傳一卷晉常璩南中志一卷嵇含南中草木狀一卷唐李克雲南風俗記一卷韋臯西南夷事狀十卷袁滋雲南記五卷韋齊休雲南行紀二卷樊綽雲南志十卷南蠻記十卷徐雲䖍南詔録三卷竇滂雲南别録一卷行記一卷李德裕西南備邉録十二卷僰文白古通一卷宋辛怡顯天禧雲南録三卷元郭松年南詔行紀一卷李京雲南志略四卷張道宗古滇說原集一卷明王奎南雲稿二卷李思聰百夷傳一卷韓宜可南雲稿二卷楊鼐南詔通紀十六卷楊慎滇載記一卷滇程記一卷南中集十卷倪輅南詔野史一卷吳懋葉榆檀林志八卷陳善黔南類編十卷彭汝實六詔紀聞一卷田汝成炎徼紀聞二卷顧應祥南詔事略一卷郭棐炎徼瑣言四卷鄧渼南中集四卷鄧原嶽碧雞集一卷薛夢雷彩雲篇二卷馮時可滇南稿二卷陳用賔修攘備考二卷太保山樵逸緬甸始末二卷諸葛元聲滇事紀略十四卷滇略卷八
