body:
  text: 滇略地理類三都會郡縣之屬提要臣等謹案滇略十卷明謝肇浙撰肇浙有史觽已著録此書乃其官雲南時所作分為十門一曰版略志疆域也二曰勝略志山川也三曰産略志物産也四曰俗略志民風也五曰續略志名宦也六曰獻略志鄉賢也七曰事略志故實也八曰文略志藝文也九曰夷略志苗種也十曰雜略志瑣聞也雖大抵本圖經舊文稍益以新事然肇浙本文士于記誦亦頗博洽故是書引據有徵叙述有法較諸家地志體例特為雅潔薛承矩序稱其上以搜楊終常璩之所未及下以補辛顯怡李京楊慎田汝成諸紀載之漏遺杭世駿道援堂集有是書跋亦謂其詳逺略近博觀而約取蒼山洱水之墟稱善史焉均非溢詞也乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:fffec6152c2e8efd60f2fdbf6bbf7ed0261cafaecd3a414e4e5cac82c15b1284
