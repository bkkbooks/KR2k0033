body:
  text: 滇略卷九明謝肇浙撰夷略造化之大無私覆載世之治也守在四夷故雕題黑齒得奉琛賮與赤舄朱紱鴈行雖戎也而有華心焉逮其敝也墨吏之徴求市儈之漁獵至不堪命挺而走險幸而戡定之赤子塗炭亦已甚矣語曰為虺不摧為蛇將若何夫有劉纍則龍可豢也有梁鴦則虎可馴也而何蛇虺之問乎逺者麓川近若緬甸彼實不德而觀之兵則干羽之謂何班定逺曰察政不得下和今非徒察而已也殷鑒不逺敢告司僕周末楚威王使將軍莊蹻略地至滇既定屬楚將歸報會秦拔黔中道塞不通遂以其衆王之傳世至當羌漢元狩間遣使至滇指求身毒國當羌問使者曰漢孰與我大使者還報天子惡其不遜時白子國仁果都白崖善撫其衆於是封仁果為滇王册以玉印蹻世乃絶漢初有竹王者興於遁水一女子浣衣水濱有三節大竹流入足間推之不去聞有兒啼聲持歸破之得一兒養之長有才武遂雄一方以竹為姓捐所破竹於野生竹成林今通海竹王祠竹林是也王嘗從人止大石上命作羮從者白無水王以劍擊石水出今竹王水破石存焉後漸驕恣漢武帝開牂牁以重幣購諸種侯王侯王服從遂斬竹王置牂牁郡復封其三子為列侯今竹王三郎祠在焉迤東諸夷多其種也白國之先西海有阿育王生三子長曰福邦次曰𢎞德季曰至德封長季二子於金馬碧雞分主其地次子封於蒼洱之間阿育奉佛教惡殺不茹葷腥日食白飯人稱為白飯王次子傳世至仁果以慈信治國國人戴之漢元狩間天子以玉印册為滇王後遣王然于等將兵入滇滇王舉國降改為益州郡仁果子孫世守家法不尚染采不殺生仍號白國傳至十五世孫鳳龍佑那諸葛武侯收用豪傑封之於其故地賜姓張氏先主崩後越嶲帥髙定殺郡將軍焦璜舉郡稱王以叛益州大姓雍闓亦殺太守鄭昻益州夷不從闓使建寧孟獲説夷叟曰官欲得烏狗三百頭膺前盡黑蟎腦三斗斫木搆三丈者三千枚汝能得不夷以為然皆從闓斫木委曲髙不至丈故獲以此欺夷也朝廷更以蜀郡張裔為太守闓假鬼教曰張裔府君如瓠壺外雖澤而內實粗殺之不可縛與吳於是即送裔於吳丞相亮既平四郡移南中徑卒青羌萬餘家於蜀為五部所當無前號為飛軍分其羸弱配大姓焦雍婁爨孟量毛李為部曲置五部都尉號五子故南人言四姓五子也晉罷寧州置南夷府以天水李毅為校尉持節統兵鎮南中統五十八部夷族都監行事每夷供貢南夷府入牛金旃馬動以萬計皆豫作忿恚致校尉官屬其供郡縣亦然南人以為饒自四姓子弟仕進必先經都監夷人大種曰昆小種曰叟皆曲頭木耳環鐵裹結無大侯王如汶山漢嘉夷也夷中有桀黠能言議屈服種人者謂之耆老使為主論議好譬喻物謂之夷經今南人言論雖學者亦半引夷經與夷為姓曰遑耶諸姓為自有耶世亂犯法輒依之藏匿或曰有為官所法夷或為報仇與夷至厚者謂之百世遑耶恩若骨肉為其逋逃之藪故南人輕為禍變恃此也其俗徴巫鬼好詛盟投石結草官常以盟詛要之諸葛亮乃為夷作圖譜先畫天地日月君長城府次畫神龍龍生夷及牛馬羊後畫部主吏乘馬幡蓋巡行安恤又畫牽牛負酒齎金寶詣之之象以賜夷夷甚重之許致生口直又與瑞錦鐵券今皆存每刺史校尉至齎以呈詣動亦如之見南中志張氏十七代至張樂進求時哀牢人細奴邏耕于巍山數有祥異社會之日衆祭銅柱柱頂故有金鏤鳥忽飛下奴邏左肩衆駭異以為天意所屬進求乃以女妻之因讓國焉是為南詔南詔之先哀牢夷蒙伽者捕魚江中溺死其妻沙一坐江濱觸沈木而孕生子九人南中志作十人後至其所沈木化為龍作人語曰吾子何在諸于驚走獨少子不去背龍而坐龍舐其背其母鳥語謂背曰九坐曰隆因名少子曰九隆志作元隆及長而黠衆推為王世世相繼漢世祖建武二十三年王賢栗遣兵乘箄船南攻鹿茤鹿茤民弱小將為所擒會天大震雷疾風暴雨水為逆流箄船沈沒溺死者數千人後賢栗復遣六王攻鹿茤鹿茤王迎戰大破哀牢軍殺其六王哀牢人埋六王夜虎掘而食之哀牢人驚怖引去賢栗懼謂諸耆老曰哀牢略徼自古以來初不如此今攻鹿茤輒被天誅中國有受命之王乎是何天祐之明也漢威甚神即遣使詣越嶲太守願帥種人歸義奉貢世祖納之以為西部屬國其地東西三千里南北四千六百里唐初其裔曰細奴邏者耕于巍山在今蒙化數有祥異白國王張樂進求因以位讓之遂自立為竒王時九隆之裔渠帥有六分據其地蠻謂王為詔故曰六詔而奴邏為南詔最強至孫皮羅閣受唐册封賜名歸義後以計誘五詔至醉而滅之盡有雲南之地徙居太和城立龍首龍尾二關尋遣孫鳳迦異入朝授鴻臚少卿妻以宗女賜樂一部南詔於是始有中國之樂死子閣羅鳳立以怨殺太守張虔陀陷越嶲王師討之敗績遂改國號曰大蒙改元贊普鍾至孫異牟尋改國號大理自稱日東王立三皇五帝廟以太和為東京昆明為西京封界內點蒼為中嶽絳雲為東嶽在祿勸州蒙樂為南嶽在者樂甸髙黎共為西嶽在騰衝玉龍為北嶽在麗江以黑惠江瀾滄江潞江麗江為四瀆立官號曰九爽三託其地東至於銅柱南至於驃國西至於太石北至於神川幅員三千餘里至貞元間韋臯諭之復歸唐仍號南詔然猶改元諡廟號未嘗奉正朔也四傳至世隆僭稱帝冦邊無虛日為髙駢所破死又二傳至舜化貞以唐昭宗乾寧間為其臣鄭買嗣所篡蒙氏自細奴邏至舜化貞十有三世歷三百十年而亡世系詳滇載記今不具載下倣此蒙氏建國設官立把國事八人曰坦綽曰布燮曰久贊曰酋望曰正酋望曰員外酋望曰大軍將曰員外立九爽分理曰幕爽主兵琮爽主户籍慈爽主禮罰爽主刑勸爽主官人厥爽主工作萬爽主財用引爽主客禾爽主商賈皆清平官酋望大軍將兼之又立三託曰乞託主馬祿託主牛巨託主倉廪大府主將曰演習副曰演覽中府主將曰繕裔副曰繕覽下府主將曰淡酋副曰淡覽小府主將曰幕撝副曰幕覽府有陀酋若管記有陀西若判官王自稱曰元謂其下曰昶王母曰信麼妃曰進武外有六節度弄棟永昌銀生劍川柘東麗水有二都督會川通海有十瞼雲南瞼白崖瞼又曰勃弄臉品淡瞼邆川瞼蒙舍瞼大釐瞼又曰史瞼苴咩瞼又曰陽瞼蒙秦瞼矣和瞼趙川瞼人丁壯者皆為戰卒王之親兵曰朱弩佉苴佉苴韋帶也兵百人置羅苴子統自曹長以降繫金佉苴尚絳紫有功者加錦又有功加金波羅虎皮也凡兵出以望苴蠻前驅以清平子弟為羽儀王左右有羽儀長八人清平官見王不得佩劍惟羽儀長佩之為親信有六曹長曹長有功補大軍將大軍將十二與清平官等六詔蒙氏最盛故詳載之鄭買嗣本唐瀘令鄭回之後回為閣羅鳳所虜世授清平官唐昭宗光化五年滅蒙氏自立改國號曰大長和改元安國死子旻嗣攻蜀黎州王建發兵擊大破之俘斬無算溺死數萬人求婚於南漢漢主以會城公主妻之子隆亶嗣未幾為東川節度使楊干貞所殺鄭氏三傳歷年二十六而亡楊干貞既滅鄭氏求清平官趙善政而立之改國號曰大天興閲十月復奪之而自立改國號大義寧改元尊聖干貞貪虐無道國人怨之越二年通海節度使段思平率衆攻之干貞走死段氏有其國干貞死處有萬箭樹在瀾滄江南二十里干貞縊於此樹萬衆攢射故名後人過者必射樹以厭勝迄今猶然樹髙百丈矢著如蝟段氏之先武威郡白人也有名儉魏者佐蒙氏有功賜名忠國擢清平官六傳至思平生有異兆楊干貞忌之使人索捕思平逃匿得竒戟于神品甸波犬村思平逃難隱姓名為獵者以一犬自隨至品甸投宿逆旅主人舍中有戟一枝及牛革四疊思平夜卧風忽起吹倒其戟洞貫牛革思平驚曰是何銛利豈神戟及明問主人曰汝置戟何為曰防盜耳思平曰防盜行路莫若戟居家若犬今我行爾居願以犬易戟主人許之因留犬取戟以去地名波犬以此又得神驥於葉鏡湖在雲南縣驥自湖中躍出飢摘野桃剖之核膚有文曰青昔思平拆之曰青乃十二月昔乃二十一日今楊氏政亂吾當以是日舉義乎遂借兵黑爨三十七部皆助之至洱河是夕夢人斬其首又夢玉瓶耳缺鏡破懼不敢進兵其軍師董迦羅曰三夢皆吉兆也公為大夫夫去首天子兆也玉瓶去耳為王王者兆也鏡中有影如人有敵鏡破則無影無影則無敵矣思平乃決明旦引兵欲渡莫知所從見江尾一婦衣白被纓而浣者指曰人從我江尾馬從三沙矣爾國名大理從之得濟既逐楊氏而有蒙國遣人於江滸覓白衣婦不獲掘地中得白石大士一座遂改國號曰大理改元文德時後晉天福二年也十傳至連義為其臣楊義貞所弒篡立四年段氏故臣髙升泰討滅之而立段壽輝傳子正明國人奉升泰為主而段世中絶髙升泰以宋哲宗元符二年立改國號曰大中國改元上治臨終屬其子曰段氏不振國人推我我不得已從之今其子已長可還其故物爾後人勿效尤也及卒其子泰明遵遺言求段氏子正淳立之號曰後禮國而髙氏世相之専執國柄稱國主焉段正淳既立六傳至于興智元呼必賚將兵自臨洮行二千里渡金沙江薄大理興智及其相髙泰祥拒戰大敗泰祥死之俘興智於善闡遂滅其國段氏二十有二主歷三百五十年而亡元既滅段氏設大理都元帥府仍録段氏子孫世守其地赦興智封為摩訶羅嵯管領八方興智死元政亂中原多故段氏復據之稱為總管傳八世段光與宗室梁王搆怨相讎殺後梁王為明玉珍所攻光子功救之大破玉珍軍梁王妻之以女已又忌而殺之功子寶聞髙皇帝開基金陵奉表歸順洪武十四年王師下雲南寶子明負固不服潁川侯傅友德西平侯沐英攻克之俘明及二子至金陵上諭之曰爾父寶曾有降表朕不忍廢賜其長子名歸仁授永昌衛鎮撫次子名歸義授鴈門衛鎮撫于是滇中悉平髙皇帝既定滇中置藩臬郡縣吏賦役學校一與諸藩等復慮夷情反側有司遷轉不常莫能得其要領仍以土官世守之其在內地者與流官雜處専主盜賊不時生發撫馭諸夷在夷地者賦役訟獄悉以委之量編差發羈縻而已雖有流官但寄空名隨牒聽委不得有為於其國若廣南麗江之屬土官雖桀驁専擅而禮節少殺不敢與郡縣吏鴈行其僻處者沒世不與期會焉土知府則景東陶姓蒙化左麗江木順寧猛永寧阿廣西昻鎮沅刀元江那尋甸安武定阿後改姓鳯孟定刀孟艮號帕詔無姓凡十二而順寧廣西元江尋甸武定俱以叛亂勦滅改設流官土府同知則姚安髙廣南儂陸涼州資北勝州髙凡四土知州則安寧董鄧川阿雲龍段寧州祿霑益安路南秦後革羅雄海寶山羅蘭州羅富州沈威逺刀灣甸景鎮康悶大候奉蒗蕖阿凡十五而大候以叛逆改雲州設流官土知縣則羅次闕嶍峨祿雲南楊元謀吾今革土州同知則鎮南段姚州髙師宗阿維摩資今屬李通安髙順州子土州判則北勝章鎮南陳土縣丞則雲南楊永平馬楚雄楊定邊阿亦佐沙土主簿則雲南張廣通段定逺李嶍峨王土府知事則曲靖闕鶴慶髙景東薑土府照磨則廣西闕土典史則浪穹王土巡檢則煉象關李回磴關楊祿脿趙南平關李定西嶺李安南坡楊楚場楊賓居董你甸李青索鼻楊蒲陀崆楊鳳羽鄉尹上江觜楊下江觜何箭桿場字上五井楊順蕩井李師井楊十二關李打牛坪蒙蔓神寨闕金沙江馮甸頭蔣水眼關蔣鎮南楊英武關張阿雄者白水關闕關索嶺闕觀音山王三岔河楊保甸陶禾摩村闕凡三十有三而猛猛猛撒在夷地者不與焉土驛丞則德勝關王雲南袁打牛坪楊騰衝徐壻楊襲龍川江王壻刀襲南甸管錫鉛張右甸段觀音水井楊枯柯楊牛街黃愠禾王干崖李古喇李尸碗薑景永李平麓徐在城田觀音山郭景東裁革板橋雲速為闕凡二十有二長官司則十二關李納樓茶甸普教化騰王弄阿虧容甸阿溪處甸朿思陀甸遮左能寨獵落恐甸他鳳溪蔣施甸蔣因逺羅必甸闕刺次和闕華甸闕香羅闕瓦魯之闕祿谷寨闕者樂甸刀鈕兀闕芒市放八寨闕孟璉刀瓦甸闕茶山早猛緬刀里麻正姓刀副姓早麻沙闕凡二十有七宣慰使則車里刀靖安闕木邦罕孟養刀後為思明奪緬甸莽八百大甸刀老撾無姓底馬撒闕大古喇二司皆為緬所併凡九宣撫司則馬龍闕南甸正刀副劉干崖正刀副劉經歷廖隴川多耿馬罕蠻莫思猛密思凡七安撫司則潞江綵千夫長則鶴慶劍川南甸各一百夫長則鶴慶九人劍川十有一人已上土官自知府至驛丞悉屬諸道節制長官在內治者如之其他羈縻而已有事則備兵使者發符調之然惟行於三宣六慰而止逺者不能及也西南諸夷種類至多不可名紀然大端不過二種在黑水之外者曰僰在黑水之內者曰爨僰有百種爨亦七十餘種僰性柔弱爨性強悍僰耐濕好居卑爨耐燥好居髙僰以織紡稼穡為業爨以生畜射獵為業僰自為地有酋長法令嚴明與中國無異爨雖有頭目然與郡縣雜處習染詐偽小則鼠竊狗偷大則聚衆相攻殺不可禁止此其大較也今録其著者僰夷在迤西黑水之外即百夷也好居卑濕棘刺之地故從僰從人其俗稱宣慰曰昭其官屬有叨孟昭録昭綱之類叨孟統政事領軍民多者數十萬人少者不下數萬昭録萬餘人昭綱千人遞減至十人俱繫鈒花金銀寶帶官民皆用笋殼為帽以金玉諸寶為頂如寶塔狀上懸小金鈴插翠花翎毛後垂紅纓貴者衣用紵絲綾錦以金飾之出入乘象象鞍三面以鐵為闌藉以重裀懸以銅鈴鞍後奴一人銅帽花裳執長鈎制象為疾徐之節招搖于道以為貴相見合掌為敬長于已者則跪拜雖貴為叨孟見宣慰莫敢仰視問對則膝行以前筵宴貴人上坐僚屬厮役以次列坐于下食不用筯每客一卒跪座側持水瓶盥帨凡物必祭而後食樂有三曰僰夷樂緬樂車里樂僰夷樂者學漢人筝笛之類歌中國曲緬樂者緬人所作排簫琵琶之類作則衆皆拍手而舞車里樂者車里人所作以羊皮為長鼓拍之間以鐃板無文字小事則刻竹木為契大事則書緬字為檄所居無城池因山為寨無倉廪之積租賦之輸每收成後遣親信往各甸計房屋徵金銀謂之取差發房一間輸銀一兩或二三兩其刑法殺人者死姦者死竊者全家處死劫者一村皆死故無姦盜道不拾遺軍民無定籍聚為軍散為民正軍謂之昔刺猶中國言壯士也戰則用繩索自縛于象上縆桑為弩以革為盔銅鐵雜革為甲驛路無郵亭半里許搆一小草樓五人坐守雖千里報在旦夕官民居以草覆之無陶瓦小民以竹為樓器皿用金銀車渠琉璃等器其俗男貴女賤以妻為僕非疾病衰老不得少息生子貴者以水浴于家賤者浴于河三日後以子授其夫耕織自若頭目有妻百數雖庶民亦有十數妻者處女先與人通及筓始用媒妁以羊酒財帛為禮而娶之子弟有職名則受父兄跪拜父母亡不用僧道祭則用婦人祝于尸前親人各持酒物聚百數人飲酒歌舞達旦謂之娛尸婦人羣聚擊碓杵為戲數日而葬葬則一人持火及刀前導至葬所以板數片瘞之其人平生所用器皿盔甲戈盾之類環懸墓側而去自後絶無祭掃之禮矣又有死三日後命女巫祭送謂遣逺去不使復還家也其類有小伯夷大伯夷蒲人阿昌縹人古刺哈喇緬人結􅞫遮些地羊鬼哈杜怒人野人等名然風俗大同小異近來內地皆有其人間有讀書入庠者矣小伯夷熟夷也永昌西南環境皆是男婦服飾稍近中華亦通漢語居村寨性馴謹耕食織衣種類不甚繁無長幼禮其人體貌頗清秀而語言鵙舌大伯夷在隴川以西男子翦髮文身婦人跣足染齒以色布裹其首飲食簡而頗精居喜近水男女皆袒浴于河婦人惟緊護兩乳謂乳非父母所生乃天地所賜不宜人見也男逸女勞紡績負擔不輟其人強壯者寡柔弱者多蒲人散居山谷無定所永昌鳳溪施甸二長官司及十五喧二十八寨皆其種也形貌粗黑性猛悍男女皆束髮為髻男以青布裹頭腰繫緑繩婦人以花布皆勤力耐勞苦事耕鉏所種蕎麥棉花黑豆知漢語通貿易昔年地方有事多資其力今漸弱而貧矣阿昌一名峩昌耐寒畏暑喜燥惡濕好居髙山刀耕火種形貌紫黑婦女以紅藤為腰飾性嗜犬祭必用之占用竹三十三根略如筮法嗜酒背負不擔弗擇汚穢覓禽獸蟲豸皆生噉之采野葛成衣無酋長管束雜處山谷夷玀之間聽土司役屬今永昌有羅古羅板羅明三寨皆阿昌夷也其俗父兄死則妻其母嫂近年羅板寨百夫長早正者病且死其妻方艾忽持刀欲殺之妻驚問故曰我死汝必屬吾弟矣妻以死誓俄而正死妻遂大慟不食而死縹人婦女以白布裹頭衣短衫露其腹以紅藤纒之莎羅布為裙兩接上短下長男女同耕哈喇男女色黑如漆不知盥櫛男子以花布為套衣婦人以紅黑藤纒腰數十圍産子以竹兜盛之負於背古喇男女色黑尤甚略同哈喇緬人有數種有老緬得楞子阿瓦如猛别雍會普浣洞吾擺古皆其類也地方平衍數千里性好鬬而貪利食不用匙筯交戰長於鳥銃俗好佛男婦俱以布盤其首色黑類哈喇男短衣長袴勢嵌緬鈴行聲謖謖然别有一布護之擺古最逺而強結􅞫者以象牙為大環從耳尖穿至頰以紅花布一丈許裹頭而垂帶於後衣半身衫而袒其右肩遮些綰髮為髻男女皆貫耳佩環性喜華彩衣僅盤旋蔽體飲食精潔戰鬬長於弓矢倚恃象銃稍與緬同孟養一帶多其種類地羊鬼短髮黃睛性姦狡嗜利出沒不常或與人相讎能用器物行妖術易其肝膽心腎使為木石不救以死或行蠱飲食中婦有所私者他適輒藥之及期歸解以他藥過期不歸則死哈杜稍類哈喇怒人頗類阿昌皆居山巔言語不通略似人形而已茶山里麻之外又有一種野人赤髮黃睛以樹皮為衣首戴骨圈插雉尾纒紅藤醜惡凶悍登髙涉險如飛男婦漁獵為生茹毛飲血夜宿樹上逢人即殺無酋長約束二長官司為所戕破至避之滇灘關內戛里境上諸夷大都習僰所為以其金裹兩齒者謂之金齒蠻漆其齒者謂之漆齒蠻文其面者謂之繡面蠻黥其足者謂之繡腳蠻彩繪撮其髻者謂之花角蠻已上皆僰種也爨夷則黑水之內以其王姓爨故名按陸涼有爨王碑云楚今尹子文之後受姓班氏西漢末食邑於爨遂以為氏華陽國志云爨昌寧大姓也其後世為鎮蠻校尉晉爨深為興古太守隋爨玩亂史萬嵗平之今其種類散處於滇各郡依山谷險阻而居聚為冦盜亦有與漢民雜處耕稼納賦者男子椎髻去鬚髯佩雙刀喜鬬輕死婦女披髮衣皂貴者錦繡飾賤者披羊皮乘馬則並足橫坐室女耳穿大環翦髮齊睂裙不掩膝男子無貴賤皆披氊跣足夫婦之禮晝不相見夜則同寢子生未十嵗不得見其父妻妾不相妬忌疾不識藥惟用男巫號曰大覡皤以雞骨占吉凶正妻曰耐德非所生不得繼位若耐德無子或有子未及娶而死者始及庶出及野合所生者酋長無繼嗣則立妻女治事死以豹皮裹而焚之獵月為春節豎長竿橫設一木左右各坐一人以互落為戲多養義士名苴可厚贍之戰鬬視死如歸善造堅甲其利刃有價直數十馬者摽鎗徑弩置毒矢末沾膚立死官兵捕之則鳥鼠散至於附近耕種者愚蠢侏􅍣又受市駔魚肉而不能自直也其在麗江近四川者曰磨些與吐蕃接界多羊馬及麝香名鐵好喜戲獵挾短刀以硨渠為飾少不如意鳴鉦鼓相讎殺兩家婦女投場和解乃罷不祀神佛唯正月五日登山祭天俗甚儉約飲食疏薄有力者尊敬官長嵗暮競殺牛羊相邀請一客不至則為深恥人死以竹簣舁至山下無貴賤皆焚之在臨安西南境外者曰斡泥蠻巢髙林治生甚儉家積貝以一百二十索為一窟藏地中將死則囑其子曰我平生藏貝若干汝可取幾處餘者勿動我來生用之近郡者曰烏爨牳撲刺些袁等蠻性悍形陋潛匿山谷惟事剽掠一言不合引刃相剚死則以財物償之在尋甸者曰野蠻無衣服以木皮蔽體形貌醜惡男少女多一夫有十數妻者持木弓以禦侵盜不事農畝入山採草木及動物食之無器皿藉以蕉葉近郡者曰黑玀玀白玀玀畜牧為生好勇鬬很史稱盧鹿乂曰羅落今訛為玀玀又作猓其人即爨也種多名異在順寧沿瀾滄江而居者曰普蠻一名撲子蠻體黑性悍専為盜賊騎馬不用鞍跣足衣短甲膝頸皆露善用鎗弩馳突如飛男子以布二幅縫合而挂體無襟袖領緣寢無牀衾拳屈而卧婦人綰髻腦後織紅黑布幅搭於右肩穿左脅而扱於胸前别用布一幅蔽腰見人不拜但屈膝而已武定諸夷曰羅婺曰黑白爨曰木察種類不一俗尚略同而黑爨尤為凶頑廣南之夷曰儂人沙人男女同事犂鋤搆樓而居男服青衣曳地賤者掩脛婦人綰髮跣足取蟲鼠充食病惟祭鬼不知醫藥其酋儂姓智髙之裔也時勾引東川交趾入內地虜掠永寧諸夷住山腰以板覆屋俗皆披氊富貴至二三領暑熱不去首戴喜鵲窩帽郡轄四長官司皆西蕃性最暴悍隨畜遷徙又有野西蕃者倏去倏來尤不可制北勝夷有數種曰玀玀麼些冬門尋丁俄昌巢處山林挾兵帶弩以採獵為生而已安寧以西負鹽者皆黑爨老者一人任華人壯者二人之事壯者任一牛之力其别種善捕魚者名普時楚雄之夷為羅婺居山林髙阜以牧養為業男子髻束髙頂戴笠披氊婦人方領黑衣長裙披髮跣足所居有房屋無牀榻以松毛鋪地而卧其西南有和泥蠻男子剪髮齊睂衣不掩脛婦人頭纒布或黑或白長五尺以紅索尺許綴海貝青緑珠為瓔珞桶裙無襞積女子以紅黑布相間綴於裙之左右既適人則以藤絲圈束膝下婚姻男以水潑女足為定飲酒以一人吹蘆笙為首男女牽手周旋跳舞為樂死者葬以雞雌雄各一殉之曲靖之夷亦曰黑白爨椎髻皮服居深山雖髙岡磽礲亦力墾之種甜苦二蕎自贍善畜馬食蕎不釡燒淨石調麵糊其上使熟噉之麥熟則炮穗以食姚安諸夷曰散摩都玀玀強悍好鬭交易用鹽米一日一小市五日一大市苴却鄉有黑齒百夷樓棲河浴寢卧無尊卑但以氊席間之而已廣西有黑爨土獠沙蠻等種雜居各據其俗得犬方祭有爭辨詣鬼神盟詛直者敢前曲者縮朒婦人以布為袍圓領大袖土獠則以黑線繡布裹頭纒腰已上皆爨種也蒙山老爨不死久則生尾不食人食不認子女好山惡家健走如獸土人謂之秋狐然亦不恆有元時羅武蠻羅僄百年尫弱子孫以氊裹送之深箐後生尾長一二寸相傳三百嵗不知所終夷人中有號為僕食者不論男女年至老輒夜變異形若犬或彘或驢于人墳前拜之其尸即出為彼所食蓋出白夷一種焉楊慎滇程記云百夷家畜一撥厮鬼無形而善噬人魂中者越宿死死則百夷取其尸為醢鬼畏犬聞犬聲則逺遁不返殆謂是耶吐蕃在麗江鐵橋之北一名古宗一名西蕃一名細腰蕃在唐常冦雲南南詔不能勝讓之為兄後為韋臯所破斬首數十萬斷鐵橋自是不復為患我髙皇帝既平雲南遂裂吐蕃二十三支分屬郡邑以土官轄之麗江府控制古宗永寧府北勝蒗蕖等州控制諸蕃今蕃人皆效順惟我所麾矣者樂甸與景東接壤諸夷以氊布茶鹽貿易或五日一集或十日一集旦則婦人日中則男子更代為市凡宴會婦人皆不與酋長死非其子孫别立者衆共擊之猛緬猛猛猛撒所謂三猛也附近順寧而猛猛最為強徑部落萬人時與二猛為難其地田少箐多射獵為生猛緬地雖廣衍而民柔怯酋長忠順猛撒微弱近折而入耿馬矣車里即産里伊尹四方獻令産里以象齒矩狗獻周公作指南車導之歸故名車里在者樂甸西南千里下臨九龍江有諸葛營壘及碑夷性頗淳額上刺一旗為號作樂以手拍羊皮長鼓而間以鐃鐸若中國僧道之樂鄉村飲宴則擊大鼓吹蘆笙舞牌為樂木邦蜀漢時木鹿大王之後也在姚關南度喳里江千餘里土酋罕姓以征緬功分土稍廣後常與緬搆怨近服於緬時為窺伺中國夷數種男子皆衣白文身髠髮摘髭鬚修睂睫婦人衣白桶裙耳帶金圈手帶象鐲男貴女賤其地産胡椒孟養地名香柏城俗呼迤水下濕夜寒民多瀕江為竹樓以居一日數浴有鬼窟山險甚夷據為硬寨官民皆髠首黥足有不髠者則酋長殺之不黥足者則衆嗤之曰婦人也婦人則綰髻腦後白布裹之布衫桶裙白行纒而跣足緬甸古朱波地亦曰撣曰驃至宋謂之緬有江頭太公馬來安正國蒲甘緬王五城在騰衝西南千餘里其夷柔而詐屋廬象馬舟楫之類悉備男子善浮水綰髻于頂以青白布纒之婦髻綰於後不施脂粉専事佛有大事則抱佛説誓或詣僧決之其文字進上者用金葉書之次用紙次用貝葉謂之緬書其國雖廣大始亦衰弱為木邦孟養所殘破嘉靖末莽瑞體始強盛及其子應裏尤黠并吞六宣慰之地侵冦內郡滇為之敝始得平定八百大甸者世傳其酋長有妻八百各領一寨因名八百媳婦與木邦接壤男女服食皆同但刺花樣於睂目間與客相見則把手為禮喜事佛寺塔極多一村一寺每寺一塔殆以萬計號慈國其酋惡殺不喜爭敵侵不得已而應得所讎而罷産安息香今入於緬老撾俗呼撾家以其夷好佩雕爪云在八百媳婦西南二千餘里即越裳氏也自周以後不通中國明永樂初其酋備方物入貢服食亦類木邦但性獷悍身及睂目皆刺花繡酋長居髙樓見人不下部屬見之所至有定地名曰等限使客亦然而設通事引之其酋一代止生一子承襲絶不生女國人稱中國皇帝曰天旺即天王之意又西千餘里則西洋海矣自車里至老撾是為六慰南甸干崖隴川所謂三宣也在騰越南半個山下其山巔界限華夷北寒南暑迥然各天南甸俗與木邦同干崖舊名干賴睒其地熱有桑四時皆蠶織五色絲為錦充貢其田一嵗兩收婚姻以穀茶雞卵為聘客至亦以為供隴川麓川也有諸葛孔明寄箭山過此盡平地一望數千里絶無山溪亦無果樹麗江於諸土酋中傳世最逺自唐貞觀以來譜系厯厯可考其名如蒙段氏以子上名接父下名也洪武初首入貢賜姓木代有錫豫其地土廣大産金富厚不資酋死則以生平所好鞍馬寶玩置於一處厝棺其中盡焚之遣人馳馬於灰燼中拾其骨得一即置櫝藏巖石內而封焉或馬疾不得骨即他物亦可其酋世盡臣職為國家制吐蕃捍西戎至今木增者母節子孝尤為諸夷冠冕云酋俗子十五即襲父職不則求分異獨木增早失父孺慕無間事母尤備色養母羅氏善馭士卒親弓馬纍立戰功云孟定府舊名景麻在雲州之西土酋刀姓後為麓夷所滅今木邦舍目有其地川原平衍土瘠人稀男子光頭赤腳黑齒著白布戴竹絲帽婦人戴漆藤大笠狀類團牌頂尖身衣文繡飾以珂貝有景幸土城馬援營在焉萬厯十一年土舍罕虔附緬叛官軍討平之分其地為耿馬宣撫司與孟定隔水而居孟艮蠻名孟掯在姚關東南二千里自古不通中國永樂初來歸附其酋名怕詔其官師曰司祿酋長曰刀猛卒伍曰皆些出入以象名曰象馬兵革犀利復多幻術為家不設扃鑰漢人舍之有竊其貨者夷主諷呪盜者即病心腹必詣其家歸貨謝過其人復為解之有巨石或利刃出其懷若鷙鳥搏其畜雞去諷呪頃之鳥墜自空有石在鳥膆野象或踐其禾亦如之不知何術也中國使至其地其夷帥自言曰是我兄天子使來也偃然坐受朝拜不爾不令生還夷帥居層樓以避炎氣有妻數百人晡候乘象出浴于江浴畢罽服羅拜其主主解約臂金鐲授者當夕其地多虎守禾者皆於樹杪結草樓衣皆套項桶裙鵝毛為褥沃野數千里正德間雲南知府趙渾曾以撫夷入其地自後無人至者威遠州唐南詔銀生府之地濮落雜蠻所居今盡為僰男女勇健走險如飛其境內莫蒙寨有河汲其水澆炭火上煉之即成細鹽交易無稱斗止以小篾籮計多寡而量之灣甸州蠻名細睒在姚關東南七十里民亦僰夷婦人貴者以象牙作筒長三寸許貫於髻插金鳳蛾其項絡以金索手帶牙鐲以紅氊帶東臂纒頭衣白布窄袖短衫黑布桶裙不穿耳不施粉其地瘠山髙水迅每至六月瘴癘盛行水不可涉地不可居有黑泉水漲時鳥過輒墜夷以竿挂布浸而暴之拭盤盂人食立死有孟通山所産細茶勝於中國鎮康州蠻名石睒在灣甸東南黑僰所居形惡體黑以青白布為衣跣足荆棘中如飛男子出婦人閉戶靜坐以待有事籤雞骨卜吉凶病不服藥専祭鬼死則剜木為棺殯之墳上植一樹為識土田瘠狹有無量烏木龍二山其産大藥鮮子䗲膽孟璉舊名哈瓦正統間平麓川始來歸附在車里木邦之間所部內有莫乃場礦世専其利以致殷富人多剽悍好劫掠鈕兀自古不通中國明宣德間始歸附民皆類倭泥蒲蠻男子綰髻於頂白布纒頭婦人白晳盤頭露頂以花布為套頭見人不拜芒市舊曰怒謀曰大枯睒小枯睒即唐史所謂茫施蠻也在永昌西南四百里川原曠邈田土富饒人稍脆弱男子衣繒布婦人分髮直額為一髻垂後跣而衣皮萬厯初土酋放福導緬入冦討斬之轄於隴川新唐書曰茫君號也永昌南有茫天連茫鮓茫施皆樓居無城郭有漆齒金齒銀齒三種夷見人以漆及鏤金銀飾齒寢食則去之今芒市夷多以酸石榴皮及藥染齒使黑初無金銀鏤飾者黑齒則信然謂之漆謂之為飾見人寢食脫去皆妄傳也猛密在騰越南千餘里其地産寶井金礦估客雲集山髙田少米榖騰貴花果瓜蔬與中國同但多地羊鬼為行人祟南距緬僅十程常苦侵暴土酋思姓後以避緬徙蠻莫蠻莫舊猛密分地也在騰越西蠻哈山下山如象鼻行者纍足風俗與猛密同茶山在騰越西北五百里踞髙黎共山地瘠土寒不生五穀其人強獰好鬬土酋早姓舊屬孟養永樂三年孟養叛茶山不從自詣闕下授長官司其地僻逺常為野人殺虜今奔入內地阿幸栖住里麻與茶山接壤舊亦屬孟養土酋刀姓亦以拒賊功授官所轄皆峩昌夷近其地亦為野人所奪奔入內地赤石坪栖住緬僰以西其人不知四時節序望月測時地多平川土沃人繁勤於務本牛不穿鼻故不服耕惟婦人用钁鋤之春夏多雨秋冬多晴夏月濕熱尤甚冬月常如中國仲春晝暖夜稍寒無霜雪煙瘴居多犯者必死草木禽獸皆有異者有草小穗而尖自結為一藂衣染之身即染瘴路傍大木多二幹並生髙三五丈許結為連理有矮腳雞其鳴無時牝雞亦然魚有鮎頭而鯉身者牛有水牛頭而黃牛身者又有牛峰如駝者市有熱池一畝許水沸如湯人不敢近以生肉投之即熟物之珍者犀象孔雀䗲蛇雲母琥珀古喇錦編藤漆器以氊布茶鹽互相貿易歐陽文忠公歸田録云家藏西南夷人所賣蠻布弓衣其文織成梅聖俞春雪詩真寶玩也此物即古喇錦也僰夷之地西南際海海行五月至佛大國阿育國大秦國伽盧國有泛海至伽盧國者述其事曰土熱衢路植椰子檳榔仰不見日王居金銀為瓦香木為爨堂飾明珠有二池金隄舟楫皆飾金寶王姓困木長名摩羅惹其相名曰摩訶思那王輿以金繩牀逺則乘象嬪侍數百人青甓為圓城周百六十里十有一門四隅作浮圖民皆居中鉛錫為瓦荔枝為材俗喜佛法有百寺琉璃為甓錯以金銀丹彩紫礦塗地覆以錦罽王居亦如之民七嵗祝髮止寺至三十有不達其法者復為民衣用白㲲朝霞以蠶帛傷生不敢衣戴金花冠翠帽絡以雜珠王宫設金銀二鐘冦至焚香擊之以占吉凶有巨白象髙八尺訟者焚香跪象前自思是非而退有災疫王亦焚香對象跪自咎無桎梏有罪者束五竹捶背重者五輕者三殺人則死土宜椒栗稻粱蔗大若脛無麻麥以金銀為錢形如半月號登伽他亦曰足禪他與諸蠻市以江豬白㲲琉璃罌缶相易婦人髙髻飾以珠琲衣娑裙披羅段行持扇近城有沙山不毛地亦與波斯婆羅門接距西舍利城二十日行西舍利者中天竺也一切借貸賒傭通財期約諸事不知文字惟以木刻為符各執其半如約酬償毫髮無爽如有不平赴酋長口訟以石子計其人之過酋長訓之使改不改則死行兵有紀律所過一草不動閨門極嚴婦人既嫁壻有言其婦外窺者婦家父母親戚俱來掘地為坑不問虛實縛女埋之以為辱宗夫死不嫁自稱鬼妻婦女種藝紡織養蠶織錦有織大布者機闊八尺口誦佛號乃擲一梭婦女不下樓樓上各設牀幔帷一女使守幔人不敢近其地炎熱一日三浴多在河中婦女脫衣能不露體辮髮垂肩好著白衣垂纓絡多跣足如中土畫白衣觀音之飾世傳觀音以女像化其俗故女人效之妻妾不妬忌婦人制畫則以繩穿其耳夜則以鐵絆其足婦人進食於夫必叩頭至地民雖在暗室聞其長過必跪舉手加額爭戰時有僧止之即罷其自稱國號皆唐虞之舊故知五帝幅員之廣也夷語飲酒曰堯不刺飲茶曰樂拍食飯曰送食肉曰答到呼夫曰僕呼妻曰媚呼子曰阿貫呼父曰阿艮呼母曰阿婆又大伯夷謂天為法故其酋皆加法字如思倫法思任法之類夷酋姓多曰刀曰罕曰曩者相傳國初平諸夷時太祖惡其反覆賜以刀曩斧砍四姓今砍作罕亦作坎但無斧姓者想滅絶耳夷姓則有茶只伽卡可打切阿絞些􅞫矣喇字等俱中國所無也滇略卷九
