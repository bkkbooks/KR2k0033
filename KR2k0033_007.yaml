body:
  text: 滇略卷七明謝肇浙撰事略三代荒服若存若亡文獻不足徵也秦漢故實十不得一自唐以降瓜分雲擾淪沒異域孰識之哉明興二百五十年來歸命大吏服漢冠裳而蜂蠆之警時起於衣袖鴟梟之習未懷其好音譸張衡命無歲無之糜縣官金錢無訾算至於今外示舞干中實厝火欲求高枕未有期也夫明王馭夷治以不治乃其本在自治始慎擇守令將帥無使貪黷擾亂之則幾矣周成王初越裳氏獻白雉重譯而至曰吾受命國之黃耉曰久矣夫天之無烈風淫雨海不揚波三年矣意者中國有聖人乎盍往朝之及返迷失故道周公錫以指南車期年乃至其國越裳即今老撾春秋時庸與百濮伐楚又麇人率百濮伐楚周末楚頃襄王使將軍莊蹻將兵循江上略巴黔以西至滇池方三百里旁平地肥饒數千里以兵威定屬楚欲報會秦擊楚拔黔中郡道塞不通因以其衆王滇變服從其俗以長之秦使常頞略通五尺道頗置吏漢武帝元狩元年命王然于柏始昌吕越人間出西南夷至滇指求身毒國是歲有彩雲見於白崖遣使迹之乃置雲南縣元鼎六年復使王然于以破越及誅南夷兵威風諭滇王入朝元封元年郎中司馬遷奉使西征巴蜀南略卭莋昆明還報命二年以中郎將司馬相如持節開越嶲按道侯韓説開益州授經教學復遣將軍郭昌衛廣平西南夷未服者舉兵臨滇滇王降以為益州郡賜之玉印最寵焉六年漢既通西南夷欲前往大夏而昆明閉殺使者奪幣物於是天子赦京師亡命遣拔胡將軍郭昌將擊之斬首數十萬後復遣使竟不得通昭帝始元三年姑繒葉榆復反遣水衡都尉吕辟胡一作破胡將兵擊之敗還明年復遣軍正王平大鴻臚田廣明等並進大破之時句町侯亡波同入滇擊反者捕虜有功封為句町王宣帝五鳳三年遣諫大夫王褒求金馬碧雞之神時方士言益州有金馬碧雞之寶可祭祀而致上使褒往祠焉時蠻久叛路莫能通乃就蜀巴郡醮祭移文及還道病卒上惜之成帝時夜郎王興句町王禹漏卧侯俞相攻殺帝遣大中大夫張匡持節和解之句町不服刻木作漢使射之後陳立為牂牁太守誅興禹乃降王莽時越嶲姑復夷人叛殺略吏民莽遣將軍廉丹發巴蜀卒徒十餘萬擊之不克光武建武八年渠帥棟蠶姑復楪榆弄棟諸羌叛益州太守繁勝退保朱提十九年遣武威將軍劉尚擊諸叛羌平之二十七年哀牢夷賢栗等率種人詣越嶲太守鄭鴻降求內屬封為君長明帝永平元年姑復夷復叛益州刺史發兵討破之斬其渠帥傳首京師十二年哀牢王栁貌率衆內屬以其地置哀牢博南二縣割益州郡西部六縣為永昌郡始通博南山度蘭滄水十七年白狼夷入貢作詩誦漢功德益州刺史朱輔譯進之白狼今麗江也章帝建初元年哀牢王類牢反太守王尋奔楪榆詔募發夷漢討之二年昆明夷鹵承等應募率種人與諸郡兵大破類牢於博南斬之封鹵承為破虜傍邑侯時有神鹿兩頭見於點蒼山西能食毒草元和間神馬出昆明池甘露降白烏見和帝永元六年永昌徼外夷遣使譯獻犀牛大象九年徼外蠻及撣國王遣重譯貢珍寶賜以金印紫綬小君長皆加印綬錢帛安帝永初元年永昌徼外僬僥種夷三千餘口內附獻象牙水牛封牛元初五年卷夷大牛種封離等叛永昌夷皆應之衆至十餘萬遣中郎將尹就討之敗績詔徵就還令以兵屬益州刺史張喬喬遣從事楊竦至楪榆擊大破之封離降永寧元年撣國王復來貢獻樂及幻人靈帝熹平五年殺永昌太守曹鸞後主建興元年益州耆帥雍闓等反殺建寧太守成昻三年改益州郡為建寧郡以李恢為太守分建寧永昌置雲南郡以吕凱為太守分建寧牂牁置興古郡以馬忠為太守丞相諸葛亮南征討雍闓斬之擒孟獲益州永昌牂牁越嶲四郡平即其渠帥用龍佑那為酋長賜姓張氏改號建寧晉惠帝太安元年建寧朱提大姓毛詵等叛南夷校尉李毅討破之二年毛詵等復叛奉建寧太守馬恢為刺史李毅收恢殺之而夷愈盛毅疾甚不能出嬰城固守而已光熙元年寧州刺史李毅卒懷帝永嘉四年以王遜為南夷校尉寧州刺史滅五苓夷以地勢形便上分永昌為梁水郡改益州郡為晉寧郡從之明帝太寧元年蜀李雄遣李驤冦寧州王遜遣將軍姚嶽等擊大破之是年遜卒以其子堅為寧州刺史成帝咸和二年寧州秀才龎遺起義兵攻李雄將任回李謙等雄遣將羅恆等救之刺史尹鳯遣禆將姚嶽太守楊術援遺戰于臺登敗績術死之八年李雄陷寧州宋文帝元嘉十八年晉寧太守爨松子舉兵反寧州刺史徐循討平之梁武帝時建寧越嶲叛都督王紀撫定之天監十三年殺寧州刺史李略太清三年寧州土酋爨瓉據城以叛詔授瓉寧州刺史時侯景方亂不能討也隋文帝開皇十四年南寧夷爨玩反遣太平公史萬嵗討之自青蛉川度西洱河入渠濫川破三十餘部爨玩降十八年南寧羌復反萬嵗以受賂坐除名唐高祖武德元年以爨玩子𢎞達為昆州刺史四年昆彌遣使內附七年命韋仁壽檢校南寧州都督寄治越嶲仁壽將兵循西洱河開地置七州十五縣請徙治南寧州詔可太宗貞觀元年以爨歸王為南寧州都督二十二年命右武衛將軍梁建方討松外諸蠻遣使詣西洱河諭其帥楊威等皆欵降是年西洱河大首領楊棟東洱河大首領楊斂皆入朝授官秩册建寧張樂進求為首領大將軍進求尋遜位於蒙氏高宗永徽元年遣左領軍將軍趙孝祖討白水蠻及大勃弄小勃弄大破之虜其酋長楊承顛改雲南縣為匡州四年蒙氏細奴邏遣使入朝賜以錦袍五年西洱河蒙儉和舍等作亂以李義為姚州道總管討之斬其帥諾沒弄楊虔柳等諸蠻悉平顯慶元年西洱河大首領楊棟來附麟德元年置姚州都督府於昆明之弄棟川咸亨三年永昌蠻冦邉殺長史李孝讓辛文協詔以太子右衛梁積壽為姚州道行軍總管討平之調露二年永昌蠻復叛上命李義復總師討之敗績郎將劉惠等戰死乃廢姚州武太后垂拱四年南蠻郎將王善昆州刺史爨乾福請復置寧州延載元年永昌蠻酋董期帥部落二萬戶內附神功二年蜀州刺史張柬之乞省罷姚州使𨽻嶲州不納睿宗景雲元年姚州附吐蕃攝監察御史李知古請發兵擊降之增置州縣羣蠻引吐蕃攻知古殺之姚嶲路絶太極元年姚州蠻冦蜀詔靈武監軍右臺御史唐九徵為姚嶲道討擊使吐蕃以鐵絙梁漾濞二水通西洱蠻築城戍之九徵毁絙夷城建鐵柱於滇城以勒功玄宗開元二年南詔盛羅皮遣張健成入朝乃築柘東龜城姚嶲蠻冦姚州都督李蒙討之敗沒三年盛羅皮立孔子廟於國中十七年嶲州都督張審素討西南蠻破之克雲南昆明城十八年南詔皮羅閣滅五詔二十五年皮羅閣陷太和城又襲大釐城據之二十六年皮羅閣賂節度使王昱求合六詔為一許之遣使册為雲南王賜名歸義徙治太和城天寶元年南寧州諸蠻叛陷安寧命御史韓洽等督蒙歸義討平之五載歸義遣其孫鳯迦異入朝授鴻臚卿八載遣特進何履光率十道兵定南詔境永昌人楊興為蒙氏布燮率所部內附上降璽書褒美旌其門世為永昌酋長九載楊國忠以鮮于仲通為劒南節度使雲南太守張虔陀淫虐南詔閣羅鳯忿怨攻殺之取夷州三十二十載遣劒南節度使鮮于仲通討南詔戰於西洱河敗績大將王天運死之閣羅鳯遂陷雲南僣號大蒙國十二載復遣劒南留後李宓擊南詔於西洱河全軍敗沒前後死者二十萬人閣羅鳯因陷嶲州會同軍據清溪關以破越析肅宗至德元載南詔陷越嶲代宗大厯十四年閣羅鳯死孫異牟尋嗣連吐蕃入冦神策都將李晟擊破之德宗貞元元年異牟尋徙居史城僣封五嶽四瀆以點蒼山為中嶽烏蒙山為東嶽蒙樂山為南嶽高黎共山為西嶽玉龍山為北嶽以黑惠江金沙江澄江瀾滄江為四瀆四年異牟尋徙居羊苴咩城請內附五年南詔遣烏蠻鬼主夢衡苴聘於劒南節度使韋臯求入朝臯遣其屬崔佐時報之盟于點蒼山九年南詔遣使上表詔册封雲南王以韋臯為雲南安撫使異牟尋遣使楊嘉明詣臯獻夷中歌臯遣幕府崔佐時由石門趣雲南復通石門南道十年臯以南詔兵伐吐蕃大破之取鐵橋十六城俘其五王來獻捷異牟尋遣弟獻地圖土貢請復號南詔詔以袁滋為册使賜以金印十一年南詔尹輔酋等隨袁滋入朝九月復獻馬六十匹十六年南詔進奉聖樂舞上御麟德殿觀之憲宗元和十一年南詔勸龍晟為其下弄棟節度使王嵯巔所殺立其弟勸利寇安南穆宗長慶四年始賜勸利印是歲勸利死弟豐祐嗣朝廷遣京兆少尹韋審規持節臨册豐祐遣洪成酋等入謝文宗太和三年南詔入冦陷卭戎嶲三州東川節度使郭釗以鄂嶽襄鄧忠武軍伐之又冦成都入其郛遣右領軍衛大將軍董質伐之豐祐上表請誅西川節度使杜元頴詔貶元頴為循州司馬四年豐祐遣使請罪五年西川節度使李德裕索南詔所掠百姓四千人六年南詔掠驃國民三千徙之柘東八年南詔遣使貢方物武宗會昌六年南詔冦安南經略使裴元裕死之宣宗大中十二年南詔冦安南陷都護府發朱弩佉苴助守猶嵗朝貢十三年豐祐死子酋龍嗣朝廷以名近廟諱不行册禮酋龍遂僣號改國號曰大禮陷播州懿宗咸通元年南詔遣清平官董成等詣成都節度使李福囚之劉潼釋之有詔成等至京師見别殿遣還二年南詔冦安南攻陷雍州是年九月以左司郎中孟穆為南詔弔祭使不果行四年南詔陷安南經略使蔡襲死之五年南詔掠嶲州西川節度使蕭鄴邀擊大破之又冦雍州官軍敗沒七年嶺南節度使高駢大破南詔復取交址八年南詔遣楊酋慶來謝釋董成之囚且歸成都俘三千人節度使李師望殺其使十年南詔入冦陷嘉黎雅三州十一年攻成都節度副使王建立戰死十四年陷黔中是年以牛叢為劒南西川節度使南詔謾書求入朝假道叢囚其使四十人釋二人還僖宗乾符元年南詔冦西川陷黎州入卭崍關二年冦雅州西川節度使高駢檄責之四年酋龍死子法嗣請和親六年嶺南節度使辛讜遣使徐雲虔如南詔廣明元年遣宗正少卿李龜年使南詔與和親中和三年以宗室女為安化公主妻南詔南詔遣趙隆眉楊竒鯤段義宗朝行在高駢上言三人南詔心腹宜止而鴆之上從其言隆眉等死蠻遂衰不復振昭宗天復二年南詔清平官鄭買嗣奪蒙氏而滅之僣號大長和國後梁乾化四年南詔冦蜀王建發兵大破之後唐莊宗同光元年南詔以朱鬃白馬求婚南漢南漢以增城公主妻之魏王繼岌齎書招諭南詔明宗天成元年東川節度使楊干貞殺南詔鄭隆亶立侍中趙善政三年趙善政僣號大天興國干貞尋廢之自立僣號大義寧國後晉天福元年通海節度使段思平討楊干貞干貞走死二年段思平自立僣號大理國居羊苴咩城三年南詔段思良廢其主思英而自立宋太祖至道元年南寧酋長龍漢􅚜貢方物太宗淳化五年李順亂蜀招安使雷有終遣辛怡顯使南詔英宗治平二年蔣波繡雲龍賜等州蠻來貢波州今劒川雲龍即今雲龍州也神宗熙寧九年南詔廉義遣使入貢後為其臣楊義貞所弒元豐三年段氏臣高智升討義貞誅之立廉義之子壽輝善闡侯高升泰廢之立思廉庶孫正明五年高升泰廢其主正明而自立哲宗紹聖元年升泰僣號大中國升泰死子泰明以父命求正明弟正淳立之號後禮國徽宗崇寧二年正淳遣高泰運入朝求經籍得六十九家以歸按乾道中南詔使者見廣南人言其國有五經廣注春秋後語三史加注張孟押韻集聖厯諸書政和五年廣州觀察使黃璘奏大理求欵附七年南詔遣進奉使天駟爽彥賁李紫琮副使坦綽李伯祥來朝貢馬三百八十匹及麝香牛黃細氊碧墟山諸物詔册其主和譽為大理國王按宋史作段和譽南詔通紀作段正嚴高宗紹興三年廣西奏大理求入貢郤之六年廣西經略安撫司奏大理貢象馬詔護送行在所優禮答之孝宗淳熙二年知靜江府張栻令雍管提舉司精選洞丁以制大理八年大理封其相高護隆子隆政為姚府等三郡演習演習華言牧守也理宗淳祐元年黎守閻師古言大理請道黎雅入貢安撫使孟珙郤之使道雍廣四年蒙古攻靈關大理將高禾逆戰敗死十二年蒙古呼必賚擊大理由臨洮踰吐蕃至麗江所至望風欵附寶祐元年呼必賚入大理相國高泰祥死之擒其主段興智仍命安輯大理二年元兵克昆明遂定雲南諸郡以蠻部三十六路四十八甸皆設土官命大理金齒都元帥府統之元世祖中統元年段興智入朝道卒以子信苴日為總管守大理南詔通紀作智興族弟信苴實至元二年諸爨部叛信苴日討平之四年以皇子和克齊為雲南王鎮中慶路今雲南府雲南都元帥布呼丹毒殺和克齊王府文學張立道遣人告變詔逮至皆伏誅十四年遣信苴日伐永昌之西騰越蒲蠻阿昌金齒未降部族十九年遣台布桑阿克逹爾率師從金齒征𬗟二十五年以雲南王額森特穆爾鎮大理二十六年始立迤西各路宣慰等司二十七年以皇孫噶瑪拉為梁王鎮雲南二十九年改封噶瑪拉為晉王三十年以皇曽孫松山為梁王成宗大德五年調雲南軍征八百媳婦雲南土官宋隆濟叛八月遣薛綽爾等兵伐金齒諸蠻六年宋隆濟攻貴州遣伊蘇岱爾會劉國傑討平之武宗至大元年以諸王婁丹襲封梁王梁王伐大理破總管段光兵殺其將高蓬泰定帝泰定元年封特穆爾布哈為梁王文宗至順元年雲南諸王圖卜戩叛陷威楚臨安自立為雲南王詔置雲南行樞密院以徹爾特穆爾知院事率師討之二年雲南平順帝至正二十三年明玉珍紅巾賊攻雲南總管段功迎擊大破之梁王以女阿結妻功為奏授雲南平章無何忌而鴆之阿結及從官楊淵海皆從死子段寶嗣此順帝至正二十三年癸卯年事也今志作成宗癸卯差一甲子誤矣二十七年梁王攻大理不克奏升段寶為雲南左丞皇明洪武初段寶遣段真奉表歸欵五年遣翰林待制王禕八年遣中書省參知政事吳雲俱招諭雲南梁王不下死之十四年秋七月命潁川侯傅友德為征南將軍永昌侯藍玉西平侯沐英為副總兵征雲南平之梁王投水死十五年三月克大理俘段寶二孫遂下鶴慶金齒諸路是年六月元布延圖復叛據佛光寨額森布哈陷鄧川十月金齒土官高大惠并額森呼圗克搆麓川夷入冦屠永昌大理土官高生等叛圍雲南都督郭英討平之十六年征南將軍傅友德都督郭英擊布延圖大破之布延圖自焚死大惠逃為白人所殺十七年移中土大姓以實雲南是年廣南特磨道作亂總兵沐英討平之十八年段土官復叛指揮李觀討平之十九年命傅友德耿炳文再征雲南諸蠻平之二十一年緬蠻叛總兵沐英往討大敗之生獲象四十匹而還五月命潁國公傅友德率兵再至雲南討曲靖普安孟定龍海曲麻馬乃等處未靖諸蠻二十二年廣西府阿赤部酋者滿矣情搆越州土酋阿資以叛西平侯沐英討平之誅者滿矣情獨阿資不獲二十八年西平侯沐春降越州斬阿資梟其首誅其同惡者一百四十一人二十九年寧逺州刀拜爛麓川蠻刀千緬俱叛逐宣慰思倫法遣西平侯沐春討之三十一年夏四月麓川平永樂元年車里宣撫司土酋刀暹答侵地虜官西平侯沐晟請討之上勑晟以理告諭暹答悔懼還所虜及地遣使入謝三年遣沐晟征八百大甸平之四年遣官招諭雲南西南夷大古喇小古喇等部落皆願內屬置宣慰司二長官司五緬甸攻孟養遣行人張洪持節諭之宣慰使那羅塔遣使謝罪詔宥之十年封汝南王於大理後以逺改封今點蒼山無為寺有王碑記洪熙元年户部尚書夏原吉上言時政請罷雲南採辦金寶數事許之正統三年麓川酋思任法法夷言王也志作發誤反征南將軍黔國公沐晟討之不克都督方政戰死晟駐師怒江思任法陽請降晟信之不進兵方政屢請戰不許政遂與麾下夜往襲其柵破之既而蠻兵大集政求援晟不答一軍俱殁事聞上遣使問罪晟曰我主將也失律在我遂不食至楚雄卒上憐之薄其罪仍賜贈諡遣行人祭政贈威逺伯諡忠毅立祠永昌五年秋七月廣南維摩師宗沙人儂人作亂都督沐昻討平之六年夏五月遣都御史王驥定西伯蔣貴太監曹吉祥等統東南兵十五萬征麓川思任法逃獲其妻妾象馬寶玉無算時維摩州蠻韋郎羅作亂移師平之還朝封驥靖逺伯貴進侯爵其他升官職者四百餘員八年秋蔣貴王驥等以征麓川為名再入雲南九年秋七月緬人獲思任法函其首獻于軍十三年靖逺伯王驥帥師復征麓川河西學教諭詹英上章劾其濫行爵賞老師費財乃班師景泰二年緬人執麓川思機法獻俘成化十六年遣都御史程宗撫猛密猛密故木邦部落也其地有寶井成化初木邦宣慰罕淫虐猛密酋曩罕弄遂叛投𬗟既而鎮守太監錢能王舉索寶石不得疏於朝請征之罕弄懼重賂大學士萬安遣宗撫處宗承安意盡以所略木邦地畀之孟養諸番不平洶洶欲亂適𢎞治改元安宗斥罷副使林俊始割其地還木邦語具田汝成炎徼紀聞𢎞治三年你甸鐵索箐賊作亂官兵討平之思任法子思祿攻猛密取蠻莫等十七寨遂據孟養嘉靖五年孟養思倫法攻緬甸破阿瓦城虜其宣慰莽紀嵗殺略無算遂與木邦瓜分其地蓋以報執思任法之怨也詔遣永昌知府嚴時泰往諭之不聼六年尋甸酋安銓及武定酋鳯朝文叛圍雲南命兵部尚書伍文定討平之十年巡撫歐陽重以衛軍冒餉銀核之軍士大譟詔罷重官十九年雲南衛舍人把天持等謀作亂伏誅二十六年永昌枯柯夷作亂兵備副使韓廷偉撫定之二十九年元江土舍那鑑弒其主憲而自立都御史石簡討之不克三十年那鑑殺左布政使徐樾時鑑詐降樾受命往撫之入賊境伏發被害官兵從者殱焉詔贈其官逾年官軍大集鑑乃自殺是年緬酋莽瑞體據古喇宣慰司殺其酋長遂入孟養八百老撾瑞體莽紀嵗幼子避思倫法難奔洞吾與古喇相近古喇酋兄弟相攻瑞體和解之遂部署衆兵絶其道路二酋皆死盡有其地緬自此始強三十七年木邦宣慰罕拔與隴川宣撫多士寧相讎殺遣指揮路九萬撫之三十九年東川土酋阿堂與霑益土官安九鼎相攻殺巡撫都御史遊居敬集師討之為巡按御史王大任所劾詔逮居敬赴京下獄論戍四十年詔取點蒼屏石五十於大理巡撫都御史蔣宗魯奏罷之四十二年易門賊李向陽等作亂自稱混天大王掠安寧三泊等州縣南安泥叢諸賊響應巡撫都御史吕光洵討平之四十三年武定酋鳯繼祖叛殺略無算隆慶元年巡撫雲南尚書吕光洵討武定酋悉平之奏設流官改治立禦建學作城六年隴川宣撫司目把嶽鳯弒其主多士寧投緬萬厯元年冬十一月命巡撫侍郎鄒應龍同黔國公沐昌祚西征鐵索箐赤石崖擒夷酋羅勤快等七十二村悉平二年春二月復東征獛等夷秋八月征蕎甸等夷皆平之立營戍守四年緬大舉攻迤西副使羅汝芳遣兵援之大破其衆瑞體遁去七年緬破迤西據之十年嶽鳯以緬兵破千崖執土婦罕氏是年莽瑞體死瑞體生時值大雪惟瑞體屋上獨無夜所居室奕奕有光及長沈鷙狡譎善用兵信賞必罰故以孑然亡命拓地萬里滇為之敝死子應裏嗣尤險詐有謀略瑞體併鄰拓疆多其力云十一年緬酋莽應裏紏隴川賊嶽鳯冦順寧破施甸猛淋盞達諸寨殺略無算詔以劉綎為遊擊將軍鄧子龍為參將會諸夷兵擊大破之斬嶽鳯應裏遁去十三年羅雄州土舍者繼榮弒其父者濬而自立巡撫都御史劉世曽討誅之初者濬悅營長之婦殺其夫而奪之踰年生繼榮稍長即欲殺父濬幽之十餘年既老無子欲以為嗣釋之出出即據州逐父當事往諭乃佯迎父歸竟弒之招集亡命出劫師宗維摩等州世曽乃遣遊擊將軍劉綎及守備張先聲等合兵討之繼榮敗欲走交趾先聲追斬之奏改羅雄為羅平十五年應裏復攻迤西陷密堵送速二城兵備按察使李材遣遊擊劉天俸擊破之復二城既而巡按御史蘇鄼論材上首級不實詔逮材及故永昌知府陳嚴之同知宋儒騰越知州陳克侯等下獄材謫戍嚴之等皆削籍密堵送速二城雖迤西屬而距永昌逺甚酋長思威來告急同知宋儒難之兵備李材方喜立功遣天俸等督兵往援天俸亦憚行令把總杜栻李朝以少兵往而多以中國旗幟授迤西兵緬見謂漢兵大至驚潰思威追擊大破之斬首千餘天俸遂以為功報捷材以上聞及驗級則夷兵不知取級往返二千餘里半已烏有材等遂得罪既而迤西遣人貢方物入謝而御史疏業已發乃刪削其表文以進故獄竟具十七年征緬歸兵作亂討平之初劉鄧二帥入滇多募亡賴子弟及西事粗定議令散去人給三金衆以為不足官復逼之發遂大譟行劫而東至楊林漆文昌往諭賊不聼幽之空室漆從地道出遂合寧州土官祿華誥等兵殱之十八年緬入孟養二十年緬入蠻莫鄧子龍擊却之二十一年緬入蠻莫破等練與猛卯多俺分道入冦巡撫都御史陳用賓遣兵擊走之是年巡撫都御史陳用賓城八關於騰衝曰萬仞曰神護曰巨石曰銅壁曰鐵壁曰虎踞曰天馬曰漢龍每四關設一守備戍之自是緬不敢深入皆廣南知府漆文昌之功也二十二年擒多俺及其子皆斬之用賓復檄暹羅同攻緬緬疲於奔命自此邊患少息西韃靼冦臨西麗江知府木旺擊破之二十五年大候州土酋猛廷瑞叛討平之改置雲州詔逮參政李先著下獄猛廷瑞之叛也與其妻父奉學興兵攻堂兄思賢所過州縣殺掠無算巡撫都御史陳用賓疏請征勦遣參將吳顯忠直抵順寧破賊衆圍之廷瑞困急乞降而先著聞有旨令廷瑞擒奉學自贖遂令撤兵廷瑞得遁入觀音山勢復振顯忠乃再集兵討之誅奉學虜廷瑞檻送軍門用賓謂先著受賄縱賊以狀聞逮下詔獄死二十六年車里老撾耿馬孟養等各入貢是年遣太監楊榮開採雲南諸礦二十七年緬攻孟養官軍往援破走之二十九年蠻莫酋思正作亂焚掠干崖隴川三十年緬攻蠻莫思正奔騰越伏誅三十一年緬酋雍罕遣使欵貢三十三年五宣慰司又為緬所陷三十四年正月指揮賀世勳梁高門等率衆攻太監楊榮殺之焚其尸時榮縱放爪牙四索金寶夷漢洶洶又日鞭責諸辨故乘衆怒戮之及其黨百餘人皆死事聞詔誅首亂者餘勿問三十五年隴川宣撫多安民叛歸緬殺鎮撫林承恩十一月武定土酋鳯克叛陷郡城脅推官白明通索府印遂圍雲南巡撫陳用賓以印豫之乃解是時雲南承平日久武備單弱上下束手無䇿而賊勢張甚用賓取印於藩司布政使薛夢雷持不可既而賊日熾城且不守竟索印豫之及用賔得罪夢雷亦以新巡撫解任以其持議不堅也三十六年正月鳯克陷祿豐殺知縣蘇夢暘又陷元謀羅次嵩明等諸州縣殺略無算用賓尋發兵討平之俘克等檻送京師既而言者交章論用賓棄印及總兵沐睿等失機罪詔遣緹騎逮治及都司張名世武定知府陳典推官白明通祿勸知州黃榜俱下獄論死用賓在滇十六年其防西事最悉至於建關堡營屯田檄暹羅以分緬勢俾騰永之間帖席者二十餘年功亦懋矣而變起肘腋倉皇失措遂至身名俱殞悲夫蓋嘗竊論滇事若遊居敬無功而無罪者也李材李先著罪少而功多者也用賓功罪相當者也而皆身嬰縲絏或以喪軀任事之難不其然乎三十七年多安民伏誅隴川平是嵗雲龍州土官段嘉龍縱妻虐夷為族舍段進忠所殺四十一年蕎甸賊攻宜良知縣龔著擊却之時諸賊皆黔國莊丁積年流劫州縣官莫能捕而宜良庠生梅友竹者亡賴為縣所蹤迹遂搆賊至著以死守城募鄉民擊賊破之賊散去捕友竹於通海戮之四十七年水西賊掠霑益守備方策禦之敗績時烏撒土官安效良娶水西女不相得水西攻之效良逃至霑益賊亦追至扣城索效良方策易之出戰兵寡為所破僅以身免賊遂大掠而去四十八年雲龍州平段進忠既弒其主時議務羈縻之而進忠愈肆猖獗逼脅州官殺掠無忌於是巡撫中丞召諸道兵欲勦之進忠窘急從間道趨永平至龍尾關分守道與大理守謀誘入關而擒之檻送軍門散其餘黨數百人疆理其地定賦稅焉滇略卷七
