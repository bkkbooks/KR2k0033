body:
  text: 滇畧卷三明謝肇淛撰産畧語曰十步之内必有豐草禹貢黑水梁州土青黎而賦下中三錯聖人羈縻荒服固不竭澤而漁之也商周西南之獻及於象齒矩狗已非却獒之懿軌矣至漢書始言滇土平敞有鹽池田漁之饒金銀畜産之富人俗豪忲居官者皆富及累世夫官之富民之瘠也至於今而惟正之徵發嵗増筐篚之羔鴈日廣市僧箕斂以鴟張貪估壟斷而㒺利刮金佛面削鐵針頭鮒已涸而决無時馬方逸而求未已滇自此困矣故上有閉闗焚裘之令而後源可清下有馬羊金粟之長而後流不竭其以為陸海而捆載之非余所敢知也湯四方獻令曰西南産里即今車里百濮以象齒矩狗為獻孔氏曰矩狗狗之善者也今志作短狗誤周王㑹白民即滇白人貢乘黄似麒有角卜人即濮人貢砂丹砂也黑齒即永昌夷貢白鹿漢元狩間張騫使大夏見卭竹杖問所從來曰卭西二千里身毒國所産遂遣使至滇指求身毒身毒今天竺也距麗江可二千里又廣志云永昌有濮竹圍三尺餘大者一節受一斛可為船小者數升可為㯢榼杜詩籠竹和煙滴露稍籠吐蕃地名也舊唐書吐蕃𫝊有籠官大籠官又韋臯𫝊擒籠官四十五人擒主籠官節度則其地産竹因以名之耳張志淳南園漫録載之唐䝉使南越食蒟醬問所從來曰道西北牂牁今臨安大理俱有之即蓽茇也其實似蔞子土人以和五味宋司馬光送張寺丞詩漢家尺五道置吏撫南夷欲使文翁化兼令孟獲知盤堆蒟醬實歌雜竹枝詞本草通鑑諸注及張志淳南園漫録皆以蔞子為蒟醬誤矣然蔞子一名扶留而扶留有三種蓽苃與焉見廣州記二者名亦相通但今所合㯽榔食者的非蒟耳唐昭宗時南詔大旱二蕎不收飢民食烏昧不給至取草根木葉啖之烏昧者野燕麥也滇中霑益一路有之土人亦皆採食謂之鬼麥黔中尤多諸葛元聲曰古樂府田中燕麥何嘗可穫不知燕麥實有麥豈當時滇未通中國徒聞其名耶釣藤藤也可以釀酒土人漬米麥於甖熟而著藤其中内注沸湯下燃微火主客執藤以吸按釣藤即千金藤主治霍亂及天行瘴氣善解諸毒其功似與㯽榔同也樹頭酒緬出其樹𩔖㯶櫚高五六尺結實大如掌緬人納麯甖中懸之實下劃實使汁入甖久則成酒其葉即貝葉也古以寫經今緬以書字㯽榔樹高十餘丈臨安廣南諸郡有之葉如芭蕉花如金粟實如桃李土人四剖其房并實乾而貫之食者佐以石灰及扶留扶留蔞子也似桑椹而緑味辛烈其功消宿食袪瘴癘故閩廣人亦噉之但閩廣人於㯽榔去皮而噉實於蔞噉葉而棄子此為異耳荔枝臨安有二樹其一近北山寺大可合抱一在王參戎墅僅六寸徑耳熟以三月形味皆劣於閩廣又有龍眼一株味皆差似嶺南然此三樹之外土人百計種之不育也閩廣有橄欖又有餘丼二物味相似而形逈别橄欖長大兩頭纎餘丼圎小而短樹亦不同滇有餘丼蜜而薦之土人亦謂之橄欖大理賔川之黄柑色味甚佳大者如椀謂之獅頭柑舊志謂北勝州産非也自秋及春皆噉之香櫞尤大如𤓰味勝閩中逺甚猩猩果曲靖大理俱有之高數丈春花秋實狀如彈丸色如血故名味酸可食雞㚇菌屬以形似名永平産者最佳以六七月大雷雨後生沙土中或在松下林間鮮者多蟲間有毒出土一日即宜采過五日即腐采後過一日即香味俱盡所以為珍土人鹽而脯之熬液為油以代醬豉亦作㙡集韻㙡土菌也㚇者鳥飛而縮其足之象雞取其形或作蟻誤也余按古人謂蕈為樹雞唐肅宗取作博子與張良娣戲者名或取此閩村谷中亦有之俗不知珍謂之雞肉菰又有白生牛乳菌栁菌松菌皆其屬也而味不逮䝉榆山中亦産天花而土人不識謂之八擔柴抹猛果也形如小猪夷語果曰抹猪曰猛又謂之抺母樹高大葉長如掌實與芭蕉相𩔖而差短夏月熟味丼酸滇程記曰色𩔖櫻桃形如橄欖馬金囊其味似文官果而非文官果樹生而此蔓生也咀之飲水留丼不散一云傅惡瘡良波羅蜜形如瓜短瓣攢生如椀其味黄者丼赤者酢潞江及虧容夷地所産大理上闗和山之麓有樹高七八丈葉如桂花開白色每朶十二瓣以應月數遇閏輒多一瓣相𫝊仙人所種更無别本土人因其地名之曰和山花豫章鄧渼詩有云此花種來不知嵗要識嵗功驗花蒂霜葉青青雪作葩風前十二釵横斜又云古來才士有棄置不信請看和山花龍尾闗以西山中産和木肌理膩白而甚鬆如南方杉木然取以為器絶佳古度臨安賔川山中俱有之記云不花而實實從皮中出大如安石榴色赤可食實中有如蒲梨者取之為粽數日不煮皆化成蟲如蟻有翼穿皮飛出俗謂之無花果然閩亦有無花果與記所載殊異楊慎古度賦曰有木詭容在句之東脩梯盤壤巨榦撑空閟華青帝垂實𤣥工蓐收𫝊紺屏翳敷紅子穿皮出房殊卉叢膚無纎蠧腹育飛蟲又曰烜比景灌菵露果星燭葉雲布楠榴相思為黨鄰平仲君遷為朋故君子識之是曰古度滇中茶花甲於天下而㑹城内外尤勝其品七十有二冬春之交霰雪紛積而繁英艷質照耀庭除不可正視信尤物也豫章鄧渼稱其有十徳焉艷而不妖一也壽經二三百年二也枝幹高踈大可合抱三也膚紋蒼黯若古雲氣尊罍四也枝條夭矯似麈尾龍形五也蟠根輪囷可几可枕六也豐葉如幄森沈䝉茂七也性耐霜雪四序常青八也自開至落可歴數月九也折入缾中旬日顔色不變半含亦能自開十也為詩一百韻賞之其紫薇樹尤極繁盛皆高十數丈䕃數畆許公署尤多盡千百年物也自夏徂秋紺英照耀庭廡令人留連吟賞不忍捨去足稱二絶地湧蓮高一二丈形𩔖椶櫚花如蓮亦名木蓮其小而蔓生者曰西畨蓮雞足僧寮多植之楚雄之響水坡産蘭甚繁楊慎稱其葉大而香逺實離騷所稱可佩之真蘭莖葉皆香不獨花也血樹似芭蕉枝葉如血根榦紫黒色高者七八尺惟臨安有之高第詩血樹真如血染成細看疑是赤龍精與君不惜連牀話試聽中宵風雨聲念珠樹生大理之下闗每結穂百有八顆相𫝊元時有日本僧四人同日坐化棄念珠於地而生杜䳌俗謂之映山紅花色有十數種鮮麗殊甚家家種之盆盎又有燈籠花開如小燈籠紅色其葉近幹者青近梢者赤又有蝶戲珠花以其形似名之宋蘇子由詩誰唱殘春蝶戀花一團粉翅亞枝斜美人欲向釵頭插又恐驚飛鬢上鴉刺桐一名蒼梧花正赤色發宻葉中傍照他物皆朱殷然如是者竟嵗土人以其形似名曰鸚哥花又有蔬亦名刺桐肥潤若芝志謂鮮可貳肉菹可經年赤藤産緬甸朱色可為杖緬婦篾之以為腰飾唐元微之詩友親過滻别車馬到江囘惟有紅藤杖相隨萬里來韓愈和虞部盧汀酬翰林錢徽赤藤杖歌赤藤為杖世未窺臺郎始攜自滇池滇王掃宫避使者跪進再拜語嗢咿繩橋拄過免傾墮性命造次䝉扶持途經百國皆莫識君臣聚觀逐旌麾共𫝊滇神出水獻赤龍㧞鬚血淋漓又云羲和操火鞭暝到西極睡所遺幾重包裹自題署不以珍怪誇荒夷歸來奉贈同舍子浮光照手欲把疑空堂晝眠倚牖户飛電著壁搜蛟螭南宮清深禁闈宻唱和有𩔖吹塤篪妍詞麗句不可繼見寄聊且慰分司又裴夷直南詔朱藤杖詩六節南藤色似朱拄行堦砌勝人扶㑹須將入深山去倚看雲泉作老夫楚雄山中産斑竹不規而圓節去逾尺作筯殊佳謂之天生筯記云雲南有實心竹文采斑駁殊可為器物即此是耶火把花一名酒弔藤諸山俱有葉如杏大毒服無不立死者乾之亦可毒人滇中以六月廿五日火把節則采此草束而燎之故名蓋欲絶其種𩔖而蕃滋彌甚村氓自盡圗賴時見訟牘厲禁之不得也安寧温泉西岸有寺曰曹溪其中有曇花樹一株相𫝊自西域來者扶疎百尺緑葉白花移蘖他種終不復活其温泉之側有無名樹僅四五尺蟠根石崖四時不彫亦不復長楊用脩遊其地有瑶草蟠千嵗之語今距用脩又且百年矣而形質如故不知其為何木也江川縣北二十里雙龍鄉有古樹不知其名初春茁葉自南則旱自北則雨自東自西則風雨時禾稼登四圍竝發則饑饉旱澇驗之無爽亦不知昉於何代也瑣梅草實也似桑椹而短味亦似之其採以三月又有草叢生山徑白花若薇子赤可啖四五月間飢者茹之謂之救軍糧䝉自山中有仙草葉圎枝細採其葉乾之一二年蘸以井泉或氣呵之復鮮茂如故此亦太和山萬年松之屬也南方草木狀興古有果名劉三月花七月熟其色黄其味酢又有豆蔲樹大如李二月花七八月熟曝乾剥食其核味辛香梧實大如豆殻脆易剥不與他處𩔖俗謂之山松子亦曰飛松金剛纂木也出僰夷中北勝州亦有之青色狀如刺桐最毒土人種以編籬人莫敢觸滇程記云碧幹而蝟芒孔雀食之其漿殺人是已然以為草誤也魏武帝四時食製曰滇池鯽魚至冬極美今滇河冬月産者最佳腹中白腴長六七寸若切麪然烹之丼甚楊慎圖贊云滇池鯽魚冬月可薦中含腴白號水母綫北客乍餐以為麪纜魏武未嘗至滇豈亦得之𫝊聞耶樊綽南夷志䝉舎鯽魚重者五斤然未之見也西洱河産公魚一作魟又作工作弓僅如指長三寸許而味甚佳楊慎圗贊云西洱弓魚三寸其脩誰書以公音是字謬又哂多子亦孔之羞慎嘗作戲語云大理公魚皆有子雲南和尚豈無兒張志淳曰工即江也古韻江亦音工陶淵明詩時雨濛濛平陸成江李翺别灊山神文我亦何功路沿大江未知是否又上闗石穴中八九月産油魚視魟更小而肥美過之炙則腴溢趙州産丁魚又小僅如釘耳諸河中蚌蜆充牣人無捕者螺大如拳有黄有卵有腐秋夏之交盈肆亦竒錯也細鱗魚産金沙江中大者三尺許肥丼異常魚龍尾闗濞水中亦有之而味不及也澂江江中産大頭魚尤佳江川又有䆲䆡魚二水相通而二魚不相往來見則交嚙􅝄鷄水鳥也出通海然非土産每嵗以上已前來重陽前去來時以夜羣飛聲如雷其形金頂紅嘴色𩔖鴉身似鷺烹之香脆柔美甲於水陸之鳥宦澂江者謡云䆲䆡不入湖大頭不入海十年萬里滇雲夢惟有􅝄鷄沒處買滇程記云雲南百夷中有小孟貢江産䰾魚食之日御百婦故夷性極淫貴賤俱有數妻山中又産彎薑餌一刀圭終身斷絶人道土人以飼牡馬不宦也異魚圖贊滇中尚有二魚今未之見聊志之一曰髮魚贊云髪魚帶髮形如婦人出於滇池肥白無鱗一曰竹頭䱢贊云張揖廣雅􅋆竹頭䱢滇池所饒亦名竹丁烹以為䱓案酒薦馨按此恐即丁魚脆蛇一名片蛇産順寧大候山中長二尺許遇人輒自斷為三四人去復續乾之治惡疽腰以上用首以下用尾又治大麻風及痢䗲蛇蟒属四足長丈餘能呑豕鹿臨安諸郡及鎮康孟養有之冬春在山夏秋在水其膽治齒䘌解毒藥黄鱗為上黒者次之蚺蛇産孟艮山中土人欲取之先以雞卜問諸神得吉兆則入麓求之蛇見人輒伏不動夷人語之曰中國天子求爾膽爾可伏死否則吾亦不汝貰也蛇反背就戮今相𫝊云去膽復活者葢謬説耳一蛇有三膽居頷下者以傅毒矢居腹間者入藥有病疽者以童便研一合服之又以傅患所頃刻而愈居尾者棄勿用寰宇記云滇池黄津江有大蛇名曰青葱好食人又有大蛇藏樹上伺鹿過繞之鹿死乃呑而繞樹其角骨皆鑽皮而出蛇亦殆死創差即更呑之又郡國志云興古郡有大蛇長數丈尾有兩歧如鈎在水中以尾鈎取岸上人馬食之然今俱未之有聞也元志烏䝉山峽多小黄蠅生毒蛇鱗甲中嚙人痛癢搔之即成瘡惟以冷水沃之搽鹽即愈張志淳云永昌山中亦有問土人乃蛇糞中所生也山呼似鸚鵡而差小樊之易馴宋蘇軾有咏山呼詩終日鎻筠籠回頭惜翠茸誰知聲㗲㗲亦自意重重夜宿煙生浦朝鳴日上峰故巢何處是鷹隼豈能容鸚鵡滇山中甚衆僅值數十錢耳馴於隴産者教之甚易言語亦有黄者産百夷中永樂中嘗貢此金幼孜有黄鸚鵡賦至於鸜鵒趙州鳳山以千計能言又易於鸚鵡也孔雀自惜其毛常巢深草中或依灌木時於杲日舒翼崖陽文采照耀山谷尾色最麗展之如屏故稱孔雀屏也性噉蛇虺或云亦與惡蛇交其膽毒人立死夷人取其卵使家雞伏之可畜但不甚文耳華陽國志云雲南郡孔雀常以二月來翔月餘而去今殊不然朱秉器楮談云緬甸有鳥四足而肉翅其大如鵝其鳴似鶴能飛而不能逺其雛胎生飛行則負雛于背不踐稼穡不食生蟲殺之者不祥唐咸亨中永昌之西野桑生石上其材上屈西向而下直南詔取以為弓不筋漆而利名曰螟弓今鶴慶産巖桑猓猓取以為弓發矢千步其遺種也越睒之西産善馬世稱越睒駿始生若羔嵗中以紐莎縻飲之以米瀋七年可御日馳數百里至宋建炎紹興常以錦綵買馬於大理范成大桂海虞衡志云大理馬為西南蕃之最今滇絶無馬惟緬産者稍為雄駿次則昆明宜良陸凉世稱西馬黔國有牧塲焉其馬自生自育一牡九牝隨向飲齕他牡至輒蹄之非牧人不敢近也博物志云雲南郡出茶首其音蔡茂是兩頭鹿也其腹中胎可治蛇虺毒土人常以四月中取之按後漢書兩頭鹿見雲南其即是耶然亦不恒有矣象産緬甸之擺古距永昌可四千餘里莽酋居焉得象馴而習之以供戰陳其梟者直千金貢象可三百金景東土官常畜以備宣索常璩南中志云永昌有貊獸能食鐵有猩猩能人言其血可以染朱罽博物志云越嶲有牛稍割取肉經日復生釋法盛歴國𫝊亦云天竺有稍割牛十日一割不便困病氂牛産刺次香羅瓦魯諸夷地毛可為㡌為纓莊子所謂大若垂天之雲而不能捕䑕是已騰衝有地名緬箐常有二獸出見大如槖駝毛色碧緑獅首象蹄牛尾有齒無牙頂戴肉角見人則伏地而鳴土人誤殺其一暴露數日都不臭腐父老云此獸見則有兵史記稱莋馬僰僮髦牛髦即氂也僰僮信實而忠於其主至死不變人得此僮為僕甚為利益今之僰夷獰獷樂戰鬭詎堪畜養哉百夷雞産永昌諸蠻地視家雞足短而善鳴晝夜無時音穉若鷓鴣然雌者亦鳴又夏秋之交生秧田中者曰秧雞小而黠不可捕其五色俱備日中吐綬者曰錦雞薄辰大如狐而人立手足𩔖熊亦曰熊弟炙之甚美福羅似猴而毛赤可為裘性嗜蜜土人置蜜罝之出鶴慶山谷中哈芙蓉夷産也以鶯粟汁和草烏合成之其精者為鴉片價埒兼金可療泄痢風蟲諸症尤能堅陽不泄房中之術多用之然亦有大毒滇人忿爭者往往呑之即斃百鵲膽一名蘆薈亦夷地草滴脂淚而成凝黑若餳味苦甚故名也又謂之鴉覽亦名黑藥治小兒五疳最良解巴豆毒及頭癬齒䘌服過七分者死阿魏亦出者樂甸相𫝊大樹凝脂下洒著物即化市之鬻者皆其化也故諺曰阿魏無真此物極臭而能止臭殺蟲消痞辟瘟治瘧諸鬼物畏之一曰合昔泥夷人以醃羊肉甚美唵叭香不知何物所製以其國名氣味稍似阿魏可和諸香爇之昔人有賃㐫宅者既知其㐫不得便徙槖中有唵叭香取焚之數夕中夜聞鬼語曰彼焚何物令我頭痛不堪亟避之翌日宅遂清吉無患香又有白檀甘檀紫榆青木降真諸種而麝為之最然土人不知製香售之估客而已焚供皆劈檀榆之属爇之緬茄枝葉皆𩔖家茄結實似荔枝核而有蔕土人雕刻其上而繫之拭眼去翳亦解瘡毒緬豆者如豆蔓生子大如栗斑文㸃㸃咀之傅瘡良然性迅惡誤服之吐瀉致死又有神黄豆調水飲能解小兒痘毒然亦不甚驗也白龍鬚草名出䝉化永昌間有大毒袪風發汗軟人肌骨治痿痺最效然每服止可二三分至五分極矣須以無灰酒嚥之或與烏骨雞同煮服後仍坐宻室三日不可風滇人不甚用惟女子洗足用之云骨軟易纒也蛤蚧沅江山中有之穴於枯樹其鳴雄曰蛤雌曰蚧聲相和然後合捕之相抱至死不脱房中藥用之雪蛆産麗江之雪山形如竹䶉土人於積雪中捕得臛食之云愈心腹熱疾間有脯至鶴慶鬻者然不恒有也仙人骨出楚雄之吕合驛相𫝊南詔時張王二生遇吕仙於此王得度上昇張不能從憤而死埋骨山中化為石瑩徹如水晶傅一切瘡痬立愈詳見雜畧䝉山産草烏最毒𢎞治間有周朱二醫採以釀酒比熟周將以進要人夕先嘗之迨曉斃矣朱則邀道侣四人共飲二人先至飲之主客俱斃座上二人以後至得免僰爨諸夷煉以傅矢中人畜無不立死者讎家取置衣領及冠巾中遺人著之即腦裂頭斷然其方秘不𫝊也人參出姚州及大理山中性視遼産燥烈不可服土人亦不知製也其小而脩者曰竹節參性彌緩高河菜似芹菹之良出㸃蒼之高河故名相𫝊云採者不可有聲聲則致雷雨語云金生麗水今麗江其地也其江曰金沙源出吐蕃經鐵橋寳山永寧北勝以逹東川江滸沙泥金麩雜之貧民淘而煅焉日僅分文售蜀估轉諸四方其税屬之土府漢不得有也朝廷嵗責滇賦金五千其直可四萬緡皆蜀估有力者先期受直於官而走四逺裒入之間有逃且死者累及姻族桁楊纍纍至於黔巫瘴癘十死一生又不具論也永平山中間有金沙色更赤而利甚微麗江之金不止沙中又有瓜子羊頭等金大或如指産山谷中先以牛犁之俟雨後即出土夷人拾之納於土官然近亦絶無矣博物志補云金一也産于金沙江者紫色光瑩産於麗江者色赤而沾垢膩銀一也産於梁王山者白瑩而有茶花黄㸃撲之有聲琤琤然産於細花明光諸場者微有鉛色撲之其聲黯麗江府産金尤多每雨後其金散拾如豆如棗大者如拳破之中空有水亦有包石子者銀則穴地數十丈取鑛石鍊之其所産最甚者莫如磨乃場滇銀鑛共二十有三所置場委官以征其課嵗約二萬緡然脈有盛衰課隨盈縮又有銅鑛十九所鉛鑛四所碌鑛一所按禹貢梁州貢鐵銀鏤漢書地理注銀出朱提屬寧州部其來久矣錫則臨安者最佳上者為芭蕉葉扣之聲如銅鐵其白如銀作器殊良出市者雜以鉛遂頓減價瑪瑙産永昌之哀牢山紅白二色其相間者謂之纒絲又有土瑪瑙其色微紅而堅不足近遼東瑪瑙盛行而滇産廢矣寳石産猛宻木邦及永平以西皆有之生山坳溪澗注水之所謂之寳井色𩔖不一值亦懸絶蔚藍色而重數兩者即逾千金然亦不多得也其雜碎者為寳砂𫝊聞先朝時寳井得一寳石中有蒼蠅二頭置几上能辟蠅鎮守中官聞之以三百金購去琥珀産緬爨諸西夷地相𫝊松脂入地千年所化又云楓木精液凝成未知信否但其中亦有蚊蠛等形想不誣也其直火珀及杏紅為上血珀金珀次之蠟珀最下又其下者可供藥餌而已宋劉裕南征時寧州獻琥珀枕裕大悦以其治金創碎以分將士今重三五兩以上者即不可多得矣萬厯甲午有詔下藩司取二百斤一時騷然惟永昌郡帑舊貯二十餘斤悉以上供搜括數年竟不能充其數而止民破家者無算催生石亦出西陲山下色翠而間以白作酒器飲之云能治産難然不甚驗至于紫英雲母石青深緑石黄地所時有不足珍也其他如水精緑玉墨玉碧瑱古喇錦西洋布孩兒茶之屬皆流商自猛宻迤西數千里而至者非滇産也而為滇病最甚然後漢書已稱永昌出金銀光珠琥珀水晶琉璃軻蟲蚌珠孔雀翡翠犀象猩猩貊獸以今較之又不逮矣南中志云永昌産光珠有光珠穴吕凱子祥太康中獻光珠五百斤又云瀾滄水有珊瑚今俱絶無文石出㸃蒼山之北麓白質黑章膩若截肪琢為屏障其最佳者蒼素分明山川逺近雲林晻曖若天生圖畫不脛而走四方好事者爭購之相𫝊李徳裕平泉莊醒酒石即此也然贗作者亦復不少其作人物驢馬以媚俗眼者皆饞鼎耳大内鼎建不時採取頗為民累嘉靖辛酉詔取四尺以上至七尺者五十巡撫蔣宗魯奏罷之萬厯癸巳詔取鳳凰石百餘皆擇石中有花草鸞鶴形者名之然僅三四尺而止閩鄧原岳㸃蒼山石歌㸃蒼山頭日吐雲紫光白氣長氤氲却産竒石作屏障終朝開採徒紛紛頻年貢入長安道濃淡之間山色好君王便作圗畫看豈識閭閻刳肝腦朝鑿暮解苦不休詔書昨下仍苛求前運後運相結束道傍嘆息聲啾啾耳目之翫豈少此十夫供役九夫死從來尤物是禍胎吁嗟乎當時作俑者誰子永昌人善造料絲初由鎮守内使有之珍秘殊甚永昌人試效為及成反精於彼又長大數倍其法以紫石英赭石合饒磁諸料煅之於烈火中抽其絲織以成片加之綵繪以為燈屏故曰料絲李文正公以為繚絲誤矣又以瑪瑙合紫石粉而煅之以成碁子瑩潤細膩甲于天下滇苦無茗非其地不産也土人不得採取製造之方即成而不知烹瀹之節猶無茗也昆明之泰華其雷聲初動者色香不下松蘿但揉不匀細耳㸃蒼感通寺之産過之值亦不亷士庶所用皆普茶也蒸而成團瀹作草氣差勝飲水耳滇水皆以海名而味不鹹鹽皆自井中出也楚雄有黑井白石泉井巖泉井東井琅井阿陋井猴井姚安有白羊井白石谷井觀音井舊井橋井界井中井灰井尾井阿拜小井大理有諾鄧井大井山井天耳井師井順盪井石門井洛馬井石縫井河邊井天生井安寧州有大井石井河中井大界井新井鶴慶有彌沙井橋後井武定有只舊井草起井其餘小井無數皆熬波成鹽迤西者圎如瓜迤東者如巖石惟順盪自巖穴湧出有池盛之熬作楪形最潔白無滓此泉初出甚盛日百餘斛所司遣官驗眎土人懼其増課也以木石壅其源令緩既去泉流遂微矣又威逺州莫䝉寨有河汲而澆諸火上即成鹽㲲者織羊毛為之其細如絨堅厚如氊染成五色謂之縹㲲永昌麗江人能為之其在廣西者曰氆氌本一種也氊則諸郡皆為之而鄧川最良然亦麤甚桂海虞衡志云蠻氊以大理為最蠻人晝披夜卧無貴賤人有一畨布以永昌之細布為佳有千扣者其次有桐花布竹布井口布火麻布莎羅布象眼布而洱海紅花膏染成最艷謂之洱紅永昌善造青謂之金齒青其直獨倍他所南中志云有闌干細布闌干獠言紵也文如綾錦華嶠後漢書云哀牢夷之染綵細布織成文章如綾錦有梧桐木華績以為布幅廣五尺潔白不受垢汚先以覆亡人而後服之今西洋布豈其遺種耶南詔通紀云兜羅綿出金齒木邦甸又有火草布草葉三四寸蹋地而生葉背有綿取其端而抽之成絲織以為布寛七寸許以為可以為燧取火故曰火草然不知其何所出也紙出大理蒸竹及榖皮為之其水必用藥師井者良膩而不燥謂之青抄可以久藏但差狹小耳其用米粉抄者鮮白有餘而善腐蠧字畫易脱若華亭粉箋然其製稍長滇無柬紙以此代之蘇易簡曰雞足山古松心燒烟為墨最佳今大理工人取松煙膠和入丹砂雜以腦麝硫黄為之雖不及歙墨之良較之他處稍勝然歙墨用油煙非古法也曹子建詩云墨出青松煙仇池筆記真松煤逺煙自有龍麝氣則滇猶有古之遺法耶但持以作字一㸃如漆不能不遜新安耳桂海虞衡志云蠻甲惟大理國最工甲胄皆用象皮胷背各一大片如龜殻堅厚與鐵等又聨掇小皮片為披膊䕶項之屬製如中國鐵甲葉皆朱之兜鍪及甲身内外悉朱地間黄黒漆作百花蟲獸之文如世所用犀毗器極工妙又以小白貝纍纍絡甲縫又裝兜鍪疑猶𫝊古貝胄朱綅遺製云又云雲南刀即大理所作鐵青黒沈沈不䤾南人最貴之以象皮為鞘朱之上亦畫犀毗花文一鞘兩室各函一刀靶以皮條纒束貴人以金銀絲今大理無刀惟鶴慶刀劒馳譽四方其法取古宗鐵濯以鶴川水利可剸犀柔者可以繞腹然古宗鐵不易得貿之四逺者皆凡鐵耳而以金銀裝飾取媚無當於用也書刀則新興安寧者良緬鈴相𫝊鵬精也鵬性滛毐一出諸牝悉避去遇蠻婦輒啄而求合土人束草衣絳衣簪花其上鵬嬲之不置精溢衣上跳躍不休采之裹以重金大僅如豆嵌之於勢以御婦人得氣愈動然秘不外售殺夷取之始得滇人偽者以金作蒺藜形裹而摇之亦躍但彼不摇自鳴耳一云名太極丸景東䝉化之間夷民能織斑絲葢亦土蠶之繭織成紫白相間如記所稱吉貝者劉禹錫詩蠻衣斑斕布其謂是耶然幅狹而短不堪作衣耳滇畧卷三
