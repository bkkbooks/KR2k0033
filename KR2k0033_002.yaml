body:
  text: 滇略卷二明謝肇浙撰勝略大塊靈淑之氣不泄為人文則結為山川南天荒徼顓蒙未開故其勃鬱磅礴山斧削而水電飛至於詼怪嵬矞之竒不可名狀惜其自古以來職方不𨽻杖履罕經流賞題詠若斯而止今所存者亦千百中之什一耳昔尼父居夷伯陽入胡豈故逃之六合之外或有取爾也矧被聖化日月悉主悉臣者哉故擇其較著以俟觀風者採焉金馬碧雞二山在滇省城外西為碧雞東為金馬相距五十里許中隔滇池漢宣帝時方士言其有神可祠而致遣諌大夫王褒求之顔師古曰碧形如雞金形如馬故名一云以有鳳凰及龍馬隱見於上名之顔説非也元張雄飛詩北闕辭丹鳳南雲看碧雞紫苔移玉座瑶草濕金泥雨霽龍歸洞風生虎渡溪尋梅穿竹徑採藥躡松梯白日依山盡青天入海低寄書無鴈過擇木有猿啼花映高低樹園分逺近畦飛星馳寶馬沈水吐銀猊魚戲蓮房北鷗眠荻渚西長歌漢頌罷刻石紀新題五華山在省城中雄瞰千雉四望無際其上有寺樓閣宏麗為滇諸剎之最都御史錢塘鄭顒詩上人棲迹雲霞中樓居背倚青芙蓉映簾花木四攢繞深幽雅稱金仙宫古聞滇陽稱佳麗五華特秀西南叢滄波逺引勢吞吐城闉俯瞰煙溟濛樓臺萬井互參列浮圖百尺高凌空面前岡巒總奔附嵯峨宛若君山峰太華山在碧雞西北俯瞰滇池迥出逺近諸峰之上絶頂有寺元僧玄鑑建永昌張含詩滇國地形惟此最青霄樓閣迥招提山圍雉堞籠金馬海撼龍宫浴碧雞雲裏鶴巢松樹遍風前仙梵雨花迷諸天不在藤蘿外中夜起看星宿低銅梁張佳胤詩石牀橫架萬峰西海上雙明入户低自是山中無玉漏朝來還有碧雞啼又焚香髙卧大華煙鶴唳松濤夜不眠欲向此中尋住著海心月在白雲天螺山在省城之北山無草木石皆青色盤旋若螺髻焉其下有潮音洞深黑莫測有人燃炬行兩日阻水而還前為圎通寺依巖谷為之窮極幽險都御史吳興顧應祥詩有雲擁數峰環寺立煙開一徑傍城灣之句滇池即昆明池也在省城西南周廣五百餘里合盤龍江黃龍溪諸水為南中巨浸其水源廣而末狹有似倒流故曰滇漢武帝欲伐西南夷於長安穿昆明池象之以習水戰其上為太華金碧諸山其外有金稜銀稜澄清諸河菡萏蒲荇魚螺菱芡之産不可殫窮元李京詩嫩寒初褪雨初晴人逐東風去棹輕天際孤城煙外暗雲間雙塔日邉明未諳習俗人爭笑乍聽侏􅍣我亦驚珍重碧雞山上月相隨萬里更多情明顧應祥昆明池歌昆明池延袤數百里千山萬山直自崑崙來諸山之水匯於此相傳其水顛倒流滇池之名由此始左有金馬山右有碧雞峰瀰漫浩瀚渺無際但見洪濤巨浪日夕排蒼空青天忽驚白日起霹靂震撼蛟龍宫天吳水怪九首八足不可以名狀時復出沒于其中有時風恬波浪息一碧萬頃開青銅其廣也如此胡為乎不在九域之內不得與五湖七澤相爭雄神禹治水迹不到穆王八駿難為窮漢武鑿池徒倣佛王褒將命何匆匆唐宋以來各僭據聲教不與中國通天開景運聖人出一掃海內羣邪空五服之外更五服俯首受命歸提封侏􅍣椎結之類吾不知其幾千萬種禮樂不異車書同眇余生當全盛日觀風兩度乘青驄古來多少豪傑士局于偏安之世不得一洗塊磊胸百年過眼一彈指得此勝覽真竒逢振衣獨立太華頂狂歌目斷孤飛鴻滇池西二十里有海源洞中可容數百人四壁削立石乳倒垂凝成幻象千狀萬態不可數計其下有龍湫流水清淺四時不竭雨旱禱之輒應玉案山在滇池北十餘里一名列和蒙山秀麗多泉石山北有三泉如盆池上有玉案逺近佛剎攢列其最勝者為笻竹寺花木幽翳靜室清絶遊俗罕至寺僧皆修頭陀行守戒苦節其得道者終身未嘗下山山椒有碁局相傳有仙人奕于此唐道南和尚詩松鳴天籟玉珊珊萬象常應護此山一局仙碁蒼石爛數聲長嘯白雲間乾坤不蔽西南境金碧當分左右班萬古難磨真迹在峰頭鸞鶴幾時還南詔通記作牟浚詩髙嶢關在昆明縣東雲津橋之北舊有城嘉靖初成都楊慎謫戍永昌來往滇池相其地卜築焉樂其勝概為作十二景詩後竟卒于此今其莊亦荒廢張佳胤髙嶢弔楊太史詩君自投荒日飄零瘴海間風雲辭玉署嵗月老紅顔著述愁中盡詩篇病後刪大名留死諫前席阻生還石表何因折泉臺不可攀知無封禪草誰問碧雞關僮僕將孤櫬文章遍百蠻空餘載酒處寂寞鎖青山欶雺山在嵩明州東四十里世傳蒙世隆征烏蒙得四女歸至此山四女遙望故鄉俯仰嘆息忽山顛霧結三峰蠻謂三為欶霧為雺其山􅍶崒獨峻登眺則雲南悉在目中又名峻蔥山滇溫泉最多而安寧州之碧玉泉為冠在城北十里許四山壁立中為石凹飛泉注焉清可鑒髮香可瀹茗有坐石正方碧色如玉故名楊慎亟稱之謂海內第一湯其上為曹溪寺倚山飛閣登之可望百里諸山有海眼泉一日三潮隨涌隨涸相傳僧戒照卓錫之所楊慎詩黟岫靈砂址華清礜石湯佳名雖許並仙液詎堪方大井元通脈曹溪且讓香流溫涵水碧氣鬱謝硫黃清暑南薰際回暄北陸傍體應偕鷺潔心不假犀涼春醖熏蘭斚雲腴泛茗槍弄珠餘浣女鱠玉賸漁郎瑶草蟠千嵗瓊芝綴九房溫泉真此地難老更何鄉點蒼山一名靈鷲山在大理龍首龍尾兩關之間綿亘百餘里若屏風然有十九峰環列內向峰各一澗懸瀑而下散入市廛村墅東注于洱河隂崖積雪經夏不消故亦名雪山山腰時有白雲橫亘如帶蒙氏封為中嶽漢書曰邪龍雲南注山似扶風太乙之狀上有馮河周回萬步五月積雪皓然即此山也山中梵宇叢林絡繹相望相傳為阿育王封國三千蘭若兹得其半今所存什一耳馮河在玉局峰之下巖壁聳削潭水清徹每有墜葉鳥輒銜去志云觀音大士放黑龍於此也其北麓産文石黑白分明如畫可為屏障元髙昌雅詩水繞青山山繞城由來人傑地應靈水光萬頃開天鏡山色四時環翠屏康里子山詩有客新從鶴拓來自言曾上五華臺蒼顔暑雪當窗見玉腳晴雲對檻開桂樹小山招隱士桃花流水屬仙才王孫芳草年年緑為問西遊幾日回點蒼山有二龍潭南潭黑龍居之北潭黃龍居之黃龍善而黑龍惡二龍相與鬭黑龍敗眇其一目潛於潭底人近之輒雷雹暴作或云此即大士所放之龍也俗名其水為高河每嵗五月溪上不時有雨而田野烈日皎然割麥插秧兩不相妨相傳觀音大士授記而然蒼山三陽峰蔑原之上有風洞風從地孔中出雖五六月吹人肌骨寒顫即壯夫不能久立也臨安納樓長官司東二十里亦有風洞四時不絶滇之多風其以此耶鶴慶亦有之雞足山一名九曲在大理東北一百里峰巒攢簇如蓮花盤曲九折一頂三跂若雞足然故名上有石門七十二峰林樾雄深梯磴險絶世傳佛大弟子迦葉守佛衣以待彌勒之所後涅槃於此至秋夜不時放光一山盡明有白石菴河子孔洗心橋迦葉殿羅漢壁袈裟石猢孫梯大悲閣虎跳澗拜佛臺曹溪水大小龍潭華首門迦葉洞絶頂四望萬山皆伏唯點蒼西峙與之頡頏近侍御史南海潘公濬建觀風臺其上尤稱壯觀前後逺近蘭若七十有二窮極幽勝西域天竺諸僧嵗時雲集香燈梵唄百里相望殆非人境閩鄧原嶽詩葉榆水從山腳流點蒼雞足俱神丘東西對峙爭竒絶翩翩靈迹垂千秋我聞雞足之山元淨土迦葉授衣即其處禪宗正印信難求釋氏遺蹤或可覩相傳八月佛放光輪囷五色還非常琳宫紺宇不知數浮圖寶剎凌蒼蒼我來登覽多所歷煙霧冥冥恍相失披徑先尋兜率菴捫蘿再扣袈裟石江風吹雲雨如注猢孫梯滑不可度大悲閣在山之巔下視羣峰互吞吐須臾雨散雲亦開指點遙山青翠來麗江雪嶺白照眼茫茫海水浮銀杯捨身崖前多虎迹仙碁石上草花碧拜佛崖懸千仞岡曹溪泉冷成丹液華首門扄亦已久昔時衣鉢今何有洞天寂寂雲四封層巒半壁苔衣厚俯瞰下方亦可憐幻成百里兜羅綿我生一作空明想便如鉢裏開青蓮聞見如來非色相眼底何須説真妄佛地機關只自知靈山面目聊堪狀信宿山中俗慮清欲從此地學無生不然解帶還山去身騎赤龍朝玉京西洱河在大理城東即葉榆水也一曰洱海禹貢道黑水至于三危入于海注云西洱海與葉榆澤相貫又水經注云葉榆水道交址糜泠縣東徑浪泊其水黑似榆葉漬之而名按司馬相如文略斯榆注斯音曵又史記漢書皆作楪榆未可以臆解也水經曰罷谷之山洱水出焉山在浪穹縣北泉湧起如珠樹經玉案山前繞郡而南西出天橋點蒼山後是為濞水與漾水合又西入于蘭滄江又南入于海其水有三島四洲九曲彎環如新月島形如案故名玉案石上有朱文若古篆不可辨世傳是大士與羅剎買地劵也石壁上刻云此水可當兵十萬昔人空有客三千蜀都賦云諸葛亮之平南中也戰於是水之南其後唐開元中李宓王天運等伐南詔前後覆軍二十萬皆沒于此水濵有神祠其狀牛首人身或虎頭雞喙皆大石自地湧出非人工也雨旱禱之輒應冬月海風水面常有隂火高數丈起海賦曰隂火潛然是已東岸有分水崖儼若斧劃南為河北為海所産魚不相入八月望夜時有珊瑚出水面志云即恆河也元舒嚕杰詩洱水何雄壯源流自鄧川兩關龍首尾九曲勢蜿蜒大理城池固金湯鐵石堅四洲從古號三島至今傳羅閣憑巇嶮蒙人恃極邊要當兵十萬不數客三千世祖親征日初還一統天雨師清瘴癘風伯掃氛煙民物因蕃富封疆近百年點蒼山色好銘刻尚依然漾水一名神莊江源出劒川經趙睒過打牛坪繞點蒼之背與濞水合渺漫無際俗謂之漾備江謡云過了漾備渡閻王請上簿到得龍尾關才是到人間言其瘴毒甚也蘭滄江一名鹿滄其源出吐蕃嵯和哥甸一云出莎川石下其石似鹿故名自麗江度雲龍州至于永昌廣僅三十餘丈其深莫測其流如奔東流經順寧達于車里入于南海即漢書所云搏南蘭津也今曰瀾滄俗謂之浪滄蒙氏封為四瀆之一其江中有物黑如霧光如火聲如折木破石觸之則死或云瘴母也文選謂之鬼彈內典謂之禁水惟此江有之他所絶無李元陽曰此即禹貢黑水至于三危入于南海者也潞江在永昌南百餘里一曰怒江源出雍望奔流而下其深莫測兩岸陡絶入夏則多瘴毒不可渡蒙氏封為四瀆之一趙州南六十里為白崖古廟中有鐵柱諸葛武侯定南中歸以紀功也至唐咸通間蒙酋世隆復重鑄之故郭松年大理行記以為非武侯所立不知張樂進求時已有鐵柱矣崖半有畢鉢羅窟巖壁聳拔千丈餘其下林麓蓊翳無路可由南詔時有杜老蠻者即崖而寺之捫壁而上有獨木橋十餘所長三尺或五六尺巇嶮不敢著足樵子儇疾者履之而過亦不損折其木非常見之材每月十五夜換橋一次不知其因十六日但見橋製更新無復舊木矣世傳神仙所為因謂之仙橋昔寺僧畜犬仙橋遂斷後屏犬橋復完成化間壁上見詩云懸崖萬仞沒躋攀樓觀參差杳靄間一𣲖水流蒼石隙數聲猿嘯白雲間堪嗟蕭史乘鸞去定是王喬駕鶴還唯有靈橋髙絶處幽禽惆悵對空山不注姓氏然其地士人所不能到竟不知誰為也青華山在雲南縣南八里其下有洞山僅培塿而洞深邃不可窮懸崖滴乳愈深愈竒上有石竅漏光若天窗然岐徑支分人入必糜粳以志其返每嵗季夏二十四日土人士女還至以炬火爇之云不爾必有蜘蛛之齧或云此即唐三藏取經遇蜘蛛怪處也御史李元詩青華洞深且密神工融鬼斧劈茫茫天壤間此理不可詰無乃渾沌初闢時浩氣噓泡成幻質沿苔捫石豈容已宛若風雨投暗室虛幽極處明自生時復有竅見天日袪昏破晦露真機萬態千形難盡述行行洞口更升巔笑看扶桑紅日出九鼎山在雲南縣西北二十里一曰寶泉九峰相並望之簇如青蓮石穴空洞盤折而升其上有九鼎寺毗盧閣古佛洞華嚴洞玉峰塔諸勝倚巖結構飛梯令人登之有挾風生羽之想吳郡馮時可詩九鼎巑岏望裏新長松落落逼蒼旻蜂房燕壘虛無地薤簟藜牀逺絶塵雲宿下方流玉葉月生半壁吐金輪最憐政暇能兼隱倚石看山更幾巡水目山在雲南縣之南二十餘里山巔有泉深不可測南詔段氏於此建水目寺相傳初建時有僧阿漂為工匠都養炊爨汲水以供衆僧未嘗違失日則奔走勞苦夜則懸首廟梁三十餘年其懸髮金鈎至今猶存嘗挈筐入市貨乳酪蔬菌之屬雖二百里外産者一日致之人因其出窺其室中見漂閉戶默坐置筐坐前有頃筐中諸物自盈見者喧於衆漂遂立化寺有白虎窩黃龍木犬之異有貴客至木犬自吠今遺址猶存金沙江一曰若水源出旄牛徼外在麗江西北東南至于麗江鶴慶北勝姚安諸界水濵産沙金故名山海經曰黑水之間有木名曰若木若水出焉水經注曰若水南經雲南之遂久縣今金沙江巡檢司是也又東流合繩水孫水淹水瀘水注于馬湖諸葛亮南征渡瀘即此昔黃帝長子昌意德劣不足紹承大位降居斯水為諸侯娶蜀山氏女生顓頊於若水之野是其地已楊慎宿金沙江詩往年曾向嘉陵宿驛樓東畔欄杆曲江聲徹夜攪離愁月色中天照幽獨豈意漂零瘴海頭嘉陵回首轉悠悠江聲月色那堪説腸斷金沙萬里樓水經曰葉榆水西北有鳥弔山世傳鳳凰死於此每嵗秋冬百鳥羣聚鳴呼啁哳土人夜然火張羅待之鳥投火罹羅多有異羽匪直滇産也內無嗉者以為特哀不食稱為義鳥放之今鄧川浪穹之間有鳳羽鄉山曰鳥弔每九月至十一月夜中萬鳥羣聚居民燭而羅之所獲萬計與水經所載無異楊慎詩鳥弔山頭百鳥傷刺桐茅竹隱斜陽九苞文采不復見千古令人空斷腸按蒙化亦有鳳凰山其説與此同按鳥以赴義至而小民無知網而取之不仁甚矣萬厯己未余至始行邑禁絶之天橋在大理西南三十里洱水下趨處也相傳蒼洱之間其初皆為水國觀音大士鑿石為橋泄水民始得平土而居其石下斷上連絶壑深塹若梁跨之憑虛凌空可度一人故名天橋橋邊激水濺珠宛如梅樹人呼曰不謝梅亦竒觀也橋之北有沓嶂又名一線天水故道也石林古色可吹洞簫莆田方沆詩蒼嶺青未了寒煙野戍平危梁通地脈削壁類天成霜色孤鴻暝濤聲萬馬行昔年曽割據形勝控榆城閩陳嚴之詩似入天台路橫梁跨壑懸川應疑禹鑿石豈仗秦鞭歸鶴來何處長虹卧不還支機隨意取不必待張騫點蒼山龍泉峰下有諸葛武侯畫卦臺云世傳武侯南征屯兵於此披草萊中得石刻伏羲像因作八卦臺祀之土人以為祭天又名曰祭天臺其龍關以西謂之天威徑蓋取孟獲公天威也南人不復反之語唐髙駢詩豺狼坑盡却朝天戰馬休嘶瘴嶺煙歸路嶮巇今坦蕩一條千里直如弦萬里驅兵過海門此生今日報君恩回期只待風煙淨不遣征衣有淚痕大理之南有蕩山寺一名感通漢摩騰竺法蘭由西天竺入中國時建也唐南詔重新之其地山巒回合林樾蔥蒨佛堂之外僧院三十有六四壁繪人天諸相皆極工麗中堂石上有僧趺迹云洪武十六年寺僧無極率其徒入覲獻白駒一山茶一上臨軒受之山茶忽發一花上異之賜御製詩一十八章敘其水陸往返之勞併序刻於石其東麓曰獅山環山面河幽靜可賞𢎞聖寺一名一塔寺在大理城西其北有崇聖寺亦曰三塔寺皆勝地也𢎞聖有塔高二十餘丈十有六級相傳周時阿育王所造塔也其上有閣扆蒼山面洱河原野雉堞皆在指顧之中左有諸葛武侯祠及楊慎所摹禹碑崇聖三塔中者高三百丈外方而內空其二差小各錯金為金翅鳥立其上以厭龍也不知何始塔頂有鐵鑄欵識云貞觀六年尉遲敬德監造開元初南詔修之請唐匠恭韜徽義重造中觀音像高二丈許蒙氏董善明者籲天願鑄是夕天雨銅取以鑄像僅足而止像成之日瑞光五色樓有鴻鐘聲聞百里其外萬松離立蒼翠際天僧房花木幽翳臺閣孤􅞅至者徘徊不能去程本立詩眼中城郭與山川坐我江南罨畫船雲氣半空飛白雪水光一鏡落青天野牆棕樹人家住官路梅花驛使傳最是僧房聽梵唄此心能洗百憂煎判文山在臨安府城南二十里高千餘仭中有三峰削出如筆架昔大理段思平外舅爨判居其上因名有祠焉學士王景常判山玩月歌判山山上秋月明判山山下秋水清道人持杯待明月氣壓泰華吞滄溟姮娥靚粧倚碧井照見琉璃幾千頃興來吸盡金叵羅舞袖徘徊弄清影嘉靖中學使趙維垣易名煥文巖洞在臨安東二十里一名雲津洞山形綿亘林徑縈紆衆水歸宿伏流會盤江達于南海洞口空濶可容數百人前阻深潭無徑可通遊者循山背行達中洞結橋而度列炬而入石髓凝結倒垂千態萬狀蓋西南第一洞天也其後有小洞二曰南明曰萬象南明黝黑中忽有天窗豁然明朗萬象峻濶嵐靄層結如雲霞飛布其上尤為竒絶云學憲秀水吳鵬詩雅志在山水臨眺興無倦佇望城東郊幽巖表南甸使君復愛客撫景開芳宴解帶遡南風手掬氷花片披榛得微路延瞰中巖遍結橋度雲溪列炬散晴電怪石虯龍翔層臺玉芝炫旋轉尋丈間幻化千萬變勢凌天姥竒名並桃源擅自非神明護乾坤豈終見日來苦塵縛勝引資遊衍薄暮下山椒心賞徒留戀安得長公術移此中州奠依棲鍊五藥辟榖謝朝彥阿迷州北三十里有火井其水溢出流入于田井中常有煙氣投以竹木即燃夜則有光四傍石亦皆熱出煤可以代薪異龍湖在石屏州之東有九曲周百五十餘里中為三島小島名孟繼龍有蛇蟲不可居昔蠻酋以有罪者流於此中島名小末束大島名和龍湖蠻立城於上漢名水城四面皆巨浸東流入于瀘江太保山在永昌府西其名不知所始嵳峩東向高千餘尺橫岡數里山巔平衍可習騎射嘗有掘地者於土中得巨磚甚多皆有平好二字周遭林木蒼翠煙雲變幻稱竒觀云哀牢山在永昌東二十里孤峰秀聳如拱如坐髙三百丈餘雄視西陲延袤三十里許頂石巉巗如鱗有二穴名天井水出其中土人於春首視水之盈涸卜嵗之豐稔穴下相通取左穴水則右穴涸取右穴亦然山下有石如鼻二孔出泉南溫北冷分流數十步復合為一號玉泉故又名玉泉山博南山在永平縣西南四十里一名金浪山其巔又名丁當路極險隘乃蒲蠻出沒之所昔南詔遣將軍征緬回師多齎金寶經此山遇盜將軍死之後立祠于此北麓有泉流為花橋河方沆詩萬里哀牢地雙旌度博南林開山列障天逺樹如簪嵐氣征衣重霜華旅鬢含蘭津看漸近訪古一停驂羅岷山在永昌東北百里蘭滄江西岸也髙千丈袤四十餘里相傳蒙詔時僧羅岷者自天竺來此嘗作戲舞山石亦隨而舞後沒土人祠之巖下時墜飛石過者驚趨謂之催行石相傳上有野獸拋踏而下後有人將曉時見石自江中飛上霧中甚多不由獸也有橋于兩岸曰霽虹纜鐵梯木懸跨千尺郡人張含詩蘭津之南何崔嵬水寨仄路盤空回江氛嶺祲日月翳山狂谷很猿猱哀炎天風高屢見雹嚴冬地逈常聞雷鉤藤毒葛四時茂鸚哥杜鵑千樹開卧獅山在永昌南十五里以形名高百丈餘袤二里許其上有洞曰芭蕉廣二尋高稱之入深百五十步其中石乳燦爛有如蓮如鐘如傘之異故又名石花山雲巖山在永昌城北二十五里高二百丈餘盤回三里許雜木隂森巖石深百步中有石橫卧于下長丈餘好事者鑿而為佛建寺以覆之扁曰雲巖卧佛其左有洞洞門高三尺深十餘丈寺外築臺建門臺下有池高黎共山在騰越東北百餘里古名崑崙岡夷語訛為高良公云界龍潞二江之間潞江冬月無霜而此山巔霜雪嚴沍蒙氏封為西嶽山上下東西各四十里登之可望吐蕃之雪山山頂有泉東入永昌西入騰越故又名分水嶺侯璡詩高黎共山花正紅千岫萬岫煙雲中險道岧嶤鎖青黛絶巚突兀摩穹窿鶯聲鵲聲滿丹嶠逺色近色皆蒼松記取此景付彤管豪吟野眺生春風其左右有平川名彎甸炎熱瘴癘商賈謡曰冬時欲歸來高黎共上雪夏秋欲歸來無奈彎甸熱春時欲歸來囊中資糧絶永昌龍泉門外有九隆山相傳哀牢夷九龍兄弟世居此山之下諸葛亮南征時鑿斷山脈以泄王氣今遺址猶存其麓有泉自地湧出凡九竇郡人甃石為池承之其下匯為大池可三十畝名曰九龍池夏月荷花盛開中有畫船可以遊泛武陵江盈科謂滇人不知舟獨昆明池與此耳張佳胤詩陂塘晴射海霞紅樓榭清隂落鏡中古木浮槎天上過平橋流水席間通歌聲漸起千峰月寒氣非關九夏風環視盡搖河漢影對君疑坐斗牛宫烏蒙山在祿勸州東北三百里一名絳雲露山北臨金沙江山有十二峰聳秀為一州諸山之冠八九月間常有雪故又名雪山其頂有烏龍泉下流為烏龍河蒙氏封為東嶽蒙樂山在景東府北九十里一名無量山高不可躋連亘三百餘里中有石洞深不可測一峰特出狀若崆洞蒙氏封為南嶽其南有泉為通華河其北有泉為清水河俱東入于大河永平縣有打牛坪相傳諸葛武侯南征至此值春日鞭牛教民耕稼後人因以名之廣通縣翠屏山中有湯團箐云武侯擒孟獲駐師於此時臘月二十四日也軍士追思荆楚以湯團祀竈乃炊而食之未盡者棄之而去至今箐巾小石形類湯團然楚雄城北有坡曰青峰坡其上一石高八尺廣半之名曰峨􅨻石一人撼之則動聚衆挽之嶷然不搖澄江城南十里有湖曰撫仙周三百餘里北納諸溪南受星雲湖泓涵清徹一碧萬頃玉筍山撫其上宛若仙人憑鏡而立故名也山舊名湧拔屹立水際高峰刺天不與羣峰接狀如玉筍然其北有羅藏山羅藏夷言虎柵也昔有虎自碧雞渡滇池至此土人造柵以取之山高可五千尺其上寬平有龍湫時興雲霧元梁王立寨其上故又名梁王山飛泉自峰頂落流入四逺竹掃寺在蒙化南百里許無院無僧止有石佛旱則蒙人舁之城隅禱應即還山所居左右産竹甚茂竹稍下垂拂石其潔如掃亦一竒迹也石寶山在劒川西南二十里上有靈泉狀如仰臼才容斗水百人挹之不竭不挹亦不盈也洞中有石佛石棧石井石人以至獅象鐘鼓蛙蛇之屬遍于陵谷皆石也大理李元陽記謂緣崖諸石像如大士羅漢者甚多皆若雕鏤然及省其手足指爪剝折之處又皆空洞如人骨然乃知其為天成也楊慎詩初地追清賞名山愜素聞峰巒合元氣樓殿截霞氛灌木長藤繞幽篁細路分剛風凝石髓香梵滿崖薰泉溜瓊璈響天吳紫蘚文興因靈運發人是謫仙羣秦客迷青靄湯休和碧雲便應開淨社井露洗塵紛方丈山在鶴慶府城南一百里巍然峻拔山半有洞中有池深不可測水滴巖下如方響音昔蒙氏羅閣鳯琢觀音像於壁故又名觀音山南詔名山凡十七此其一也鶴慶東南七十里山名大成坡頂有泉圎徑尺許深如之終嵗不溢盛夏不涸相傳南詔蒙氏過此三軍無水渴甚遂拔劒插地泉隨湧出至今行人資焉謂之一碗水師宗州東有山曰馬者籠高峻雄峙勢莫與京其西二十里地名阿定鄉有小山高可五丈盤根數百尺𢎞治十年一夕忽移于此山之傍上有三大樹隨山而徙根枝如故土人但聞風雷聲旦起視舊處已為平地矣阿盧山在廣西府西延亘四十餘里南接彌勒北跨師宗舊有阿盧部居之故名山麓有洞深黝不可窮中有雕欄寶塔鐘鼓卧牀佛龕之異尋甸北五里有龍泉洞水湧出灌地數萬畝洞中深邃蝙蝠甚衆遊者明炬輒為所滅洞中有一雀俗呼為龍雀如遇木葉墜水輒為銜出郡中亢旱祈禱輒應獅山在武定城西五里許峰截如削壁立千仞其巔平敞里許有泉噴出瀦為小池池旁羅漢松一株大數十圍霜柯鐵幹世所罕見巖半有菴曰龍隱中祠建文皇帝云帝自靖難師入自髠以出栖此山者四十餘年始自白歸大內今其像禪衣錫杖凄然老衲狀也雪山在麗江西北二十餘里一名玉龍山條岡百里􅏭嵲千峰上插雲霄下臨麗水山巔積雪盛夏不消巖泉瀑布百道飛流蒙氏封為北嶽元李京詩麗江雪山天下絶積玉堆瓊幾千疊足盤厚地背摩天衡華真成兩丘垤平生愛作子長遊覽勝探竒不少休安得乘風凌絶頂倒騎箕尾看神州瓊英洞在順寧西南西粵山之麓其山層峰疊壑石壁橫峭洞口豁然如城闕狀可十丈許嵌空竒崛其上有青蓮華蓋朵朵下垂洞中石鐘鼓磬擊之琳琅成韻深邃莫窮幽致萬狀蓋西南之竒觀也董難詩有云兹山竒絶不可紀嶙峋嵌空難與比晦明幻化神物潛章亥艱難不到此山鬼啾啾木客號古藤縆索垂猿猱山禽百韻隔雲木落日熊羆呼其曹路斷弔橋懸怪石宛若晴虹高萬尺懸橦度索越他山颯颯天風吹羽翮煙霞不隔水源深仙境微茫何處尋人似避秦雞犬近松根履足跫然音洞門深鎖桃千樹山靈謝指桃源路翠觀岑青紫府圗鬼工斫處心驚怖石鐘纍纍石乳香龍飛鳳翥石筍長石鐘石鼓還石磬鈞天樂派音鏗鏘仙人酤我長春醑一飲歡襟無處所仙詞瀏亮滌塵煩自信仙緣吾與汝北勝州南有九龍山高萬丈餘磅礴百里山有九峰於麓仰視則九山皆齊登其中峰之巔則衆峰才及其半四顧無際可千里餘赤石崖在北勝州西北三里許相傳禹乘赤龍治水至此以斧劈之故山石皆殷赤色崖半有泉其味如醴仲春居民郊遊爭掬飲之布榖一鳴其味即變滇略卷二
