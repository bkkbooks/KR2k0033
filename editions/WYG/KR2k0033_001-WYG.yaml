body:
  text: 滇畧卷一明謝肇淛撰版畧三皇之世地過日表夏商盛時朝者萬國滇雖逺徼亦荒服之内臣也自周失其政六合瓜分蠻夷猾夏割據雄長始與中華隔絶歴漢唐宋雖或稱臣貢土而叛服靡常莫制其命長蛇封豕窟穴二千年矣髙皇帝開天闢地日月重朗金馬碧雞之墟始得與子男之列方幅齒遇至於今文運𢎞開樵蘇熙攘蒸蒸上逼鄒魯葢亘古以來所未有之盛而亦滇萬世之竒遇也故列其分合之蹟以及天造建侯之詳俾後之人有所攷焉雲南古梁州域徼外西南夷所居也顓頊建九州其西南為梁州禹貢華陽黒水惟梁州其地曰百濮以西南有百國名之如鄯闡昆彌句町牂牁之𩔖周武王伐紂濮人與焉春秋時楚叔熊逃難於濮始屬楚楚威王遣莊蹻畧地至滇會有秦師道絶遂王之秦通五尺道置吏焉漢元狩間彩雲見於南中遣使跡之雲南之名始此也是時滇王當𦍑問漢使曰漢孰與我大使者還報天子惡其不遜時白崖有天竺白飯王之後仁果者為衆所戴遂冊為滇王治白崖蹻世乃絶元封二年發巴蜀兵臨滇滇舉國降以為益州郡賜王玉印章帝元和二年建學立師後主建興三年益州渠帥雍闓殺永昌太守與孟獲誘煽諸夷以叛丞相亮討平之時仁果十五世孫龍佑那者能撫其民號大白子國仍以其地封之賜姓張氏而以吕凱為雲南太守晉宋齊梁陳隋廢置不一皆以守令治其人酋長世其官不相凌奪唐貞觀末冊龍佑那十七代孫張樂進求為首領大將軍時有哀牢夷細農邏者耕于䝉之巍山有祥異所居成聚樂進求遂遜國而去之自是諸酋分立為六詔而南詔強盛開元間遂并五詔朝廷遣使冊為雲南王天寳間殺太守張䖍陀臣於吐蕃王師討之敗績無何復請内附仍受冊封賜金印後為其臣鄭氏所簒石晉時段氏據之宋建隆三年王全斌既平蜀欲乗勝進取為圖上獻太祖鑒唐之禍以玉斧畫大渡以西曰此外非吾有也段氏遂得世其國元世祖定雲南改為中慶路封宗室梁王居之而段氏居大理不睦搆兵皇明洪武十四年遣潁川侯傅友徳西平侯沐英伐雲南諸郡悉平之置雲南布政使司領府二十州三十六縣三十二而羈縻不與焉見之夷畧雲南府古鄯闡國也楚莊蹻王其地曰滇國漢為益州為建寧晉為寧州為晉寧隋為昆州唐武徳中置雲南郡後為䝉氏段氏所據元置善闡萬户府改中慶路國初改今名領州四縣九昆明縣附郭漢滇池地隋昆州元置善州領昆明官渡二縣後併入昆明國朝因之富民縣唐西寧黎州烏蠻居之曰黎灢甸元改今名宜良縣唐蠻居之曰囉裒籠後置匡州元改今名羅次縣古壓磨吕村烏蠻居之元置羅次州後改為縣晉寧州漢滇池地晉改今名南詔為陽城元仍晉名國朝因之以歸化呈貢𨽻焉歸化縣漢安江又為大吳籠元改置今名呈貢縣漢以來皆烏白等蠻所據有故城曰呈貢元置晟貢縣國初改今名安寧州古滇國螳螂川也漢連然縣唐改安寧元改為州國朝因之𨽻以祿豐祿豐縣古琭琫甸白村宋大理高氏據之名祿豐元因之置縣昆陽州漢𨽻益州晉𨽻寧州隋立昆州宋大理高氏治之名巨橋元改今名國朝𨽻以三泊易門三泊縣古僰獠地有那龍城元置今縣以溪為名易門縣漢烏蠻仲磨由男所居元置洟門千户所後改今縣嵩明州古烏蠻枳氏居之曰枳磑漢曰長州因築臺盟蠻曰嵩盟宋段氏改為郡元改長州又改嵩盟又改為州領楊林邵甸二縣國朝省縣入州更盟為明大理府古昆彌國漢封滇王仁果於白崖置葉榆縣𨽻益州後改𨽻永昌或建寧寧州唐為南詔䝉氏所據曰大禮五代段氏建國曰大理元置大理路國初平段酋置府焉領州四縣三長官司一太和縣附郭漢葉榆地亦曰楪榆唐南詔取太和城即此元為理州後改今縣趙州漢永昌地唐䝉詔改今名元為趙睒州又於白崖睒立建寧縣𨽻之即古勃弄地也後省縣入州國初仍為趙州領雲南縣雲南縣漢彩雲見南中處也遣使跡之遂置雲南縣唐為匡州改品甸䝉詔為雲南州元降為縣鄧川州漢葉榆地唐邆備州治大釐城南詔置鄧川睒改徳元城元改今名國初𨽻以浪穹浪穹縣浪穹六詔之一治曰彌茨唐稱浪劒南詔併之立浪穹州元降為縣賓川州漢葉榆地唐䝉氏太和楚塲地也國朝𢎞治初割太和趙州雲南地置今州雲龍州古雲龍甸元置總管國初置州土官段氏領之萬厯末以土酋相殺改設流十二闗長官司本楚塲地因其僻險置司臨安府古句町國也漢置句町縣属牂牁郡唐南詔據之置通海郡段氏為秀山郡後為阿僰部蠻所居元置阿僰部尋改臨安路國初置府領州四縣四長官司九建水州附郭唐烏麽蠻地䝉氏城之曰恵􅝮漢語為建水元置州石屏州漢蠻曰舊欣華言林麓也宋阿僰於地掘得石坪聚居焉名石坪邑後訛為石屏元改為州阿迷州漢以前蠻名阿甯訛為阿迷元置阿甯萬戸府國初設阿迷州寧州漢筰都改沈黎郡唐改黎州䝉氏曰浪曠華言旱龍也後以與寧酋曰寧部元置寧海府尋改寧州通海縣漢蠻阿赤尼郎地唐䝉氏立通海郡元改為縣河西縣唐置西宗州領三縣河西其一也阿僰居之曰休臘元置河西州尋改為縣嶍峨縣唐為嶍猊蠻所居名嶍峨部元置州國初降為縣䝉自縣唐建水地有山曰目則後訛為䝉自宋為阿僰蠻據元置䝉自千户所後改為縣國朝因之納樓教化王弄虧容思陀溪處落恐左能安南共九長官司永昌軍民府古戎州哀牢國也一云身毒九隆氏居之漢通博南置不韋縣永平間立瀾滄郡尋改永昌郡唐以後䝉氏段氏代據之皆為永昌府元立金齒宣撫司以西南有金齒夷名之也國初置府立金齒衛後省府改衛為軍民指揮使司嘉靖初復設永昌軍民府領州一縣二安撫司一長官司二保山縣附郭漢以來皆為哀牢不韋縣境國朝嘉靖初設府始置縣以治西有太保山名騰越州古越賧地唐置羈縻州䝉氏為軟化府段氏改為騰衝元改騰越州又改騰衝征緬招討使司國初為指揮使司嘉靖初置州改司為衛永平縣漢博南縣晉改永平䝉氏為勝鄉郡元置今縣潞江安撫司潞江甸也亦曰怒江國初設柔逺府後改為司鳳溪長官司國初置施甸長官司舊石甸訛為施甸元置司楚雄府晉以前屬益州邊地後設安州爨夷築城居之名曰威楚䝉氏置銀生節度段氏為富筯睒改白鹿郡又為威楚部元改為路國初改設楚雄府領州二縣五楚雄縣附郭即安州威楚縣也元置威州尋降為縣國初改今名廣通縣古路晱地䝉氏立路晱縣元改今名定逺縣漢越嶲地唐曰西濮州曰髳州後沒於蠻曰耐籠元置牟州尋改定逺州後降為縣定邊縣唐濮落蠻居之曰南澗元置今縣􅑇嘉縣唐以前夷獠居之曰虚初元時有大星隕化為黒石人異之遂名􅑇嘉置縣焉南安州舊黒爨蠻居地曰摩芻元置摩芻千户所後改為南安州鎮南州濮落蠻所居川名欠舍城曰雞和䝉氏置石鼓縣又置俗富郡元置欠舍石鼓二千户後改為鎮南州曲靖軍民府漢夜郎味縣地也蜀漢置興古郡梁曰西爨隋置恭州協州唐曰曲州靖州䝉氏為石城郡元初為磨彌部後改曲靖路國初改為軍民府領州四縣二南寧縣附郭即漢味縣唐南寧州元改為縣亦佐縣漢牂牁郡宛温縣地唐為盤州諸蠻據之號夜苴部訛為亦佐元置縣霑益州漢宛温地唐西平州磨彌蠻居之元改霑益陸凉州漢平夷縣地晉置平夷郡䝉氏號落温部元改置陸凉州馬龍州漢興古地唐沒於蠻名撒匡僰喇又為納垢部元置納垢千户所後改馬龍州羅䧺州晉以前興古唐蠻羅䧺者居之遂以名部元置州焉澂江府古滇池地也漢置俞元縣隋屬昆州唐屬牂州後沒於蠻為羅伽甸南詔置河陽郡段氏析為三部元置澂江路國初改為府領州二縣三河陽縣附郭唐麽㱔蠻居之南詔置河陽郡元改河陽州尋改為縣江川縣漢碌雲異城又曰易簏䝉氏徙曲旺蠻居之段氏曰步䧺部元改江川州尋降為縣陽宗縣唐蠻強宗部居此訛為陽宗元因置縣新興州漢青蛉弄棟二縣地唐置求州蒙氏為温富州元曰部傍曰普舍曰研和曰休納後置新興州路南州唐昆州地夷名路甸後為落䝉蠻所據元置萬户府後改路南州䝉化府唐以前為白國與大理同𨽻䝉氏細奴邏居之號䝉舍詔後改為陽𤓰州叚氏改開南縣元為䝉化府又降為州國初因之屬大理正綂間復改為府鶴慶軍民府漢𨽻益州又分𨽻永昌郡唐初越析詔地名曰鶴川又曰漾工䝉氏置謀綂郡段氏改府元置鶴州後改為鶴慶府又為路國初改路為府尋改為軍民府領州二劒川州古名也浪穹詔與南詔戰敗保此稱劒浪䝉氏併之置劒川節度後臣吐蕃為吐蕃晱段氏改義督睒羅魯城羅魯華言海也元改劒川縣國朝陞為州順州唐名牛睒羅落蠻居之元改為順州姚安軍民府本滇地漢置弄棟青蛉二縣唐置姚州以其地多姚姓也䝉化改弄棟府段氏為統矢邏又改姚府元改姚州尋陞姚安路國朝改為府後改為軍民府領州一縣一姚州附郭漢弄棟沿革與府同大姚縣漢青蛉唐西濮州改髳州段氏為大姚堡元改為縣廣西府古滇國東南境漢牂牁郡地後為東爨烏蠻彌鹿等所居唐為羈縻州後師宗彌勒二部寖強䝉氏段氏不能制元時内附置廣西路國朝改為府領州三師宗州蠻部據名匿弄甸元以本部領阿寧豆勿阿盧豆吳四所後改為州彌勒州蠻部據名郭甸巴甸部籠元以本部領吉輸裒惡部籠阿欲四所後改為州維摩州元置領維摩屈中二所後改為州尋甸府古滇地僰剌蠻居之其部曰仲劄溢源後為烏蠻新丁所奪號新丁部訛為仁地䝉氏為尋甸段氏曰仁徳元置仁徳府國初改為尋甸軍民府土官領之成化間以土酋相殺始設流官改尋甸府武定軍民府漢益州地也唐𨽻姚州獹鹿諸蠻居之段氏為羅婺部元改武定路國初改軍民府土官鳳氏領之隆慶間以叛誅始設流焉領州二縣一和曲州附郭即羅婺地有甸曰叵􅇼元改和曲陞為州元謀縣舊曰環川元置今縣祿勸州舊為洪農碌勸甸元改今州景東府古曰柘南昔撲和泥二蠻居之名猛谷又曰景董唐以前不通中國䝉氏立銀生府後移於威楚其地復為蠻有元討平之置開南州國初改為景東府元江軍民府古西南極邊地曰恵龍甸又名因逺部䝉氏置威逺瞼後和泥蠻據之曰羅槃甸宋儂智髙之黨竄此元時内附置元江路領羅槃馬籠等十二部國初改府永樂間改軍民府領因逺羅必甸長官司麗江軍民府古荒服地漢唐皆𨽻越嶲䝉氏置麗水節度後為蠻酋䝉醋醋所據元討平之置麗江路國初改府後改軍民府土官木氏世居之領州四通安州附郭漢定笮縣唐昆明元置今州寳山州漢邪龍縣境元置寳山縣尋陞為州蘭州漢博南縣唐羅眉州段氏置瀾滄郡元改今州巨津州漢羅婺九睒諸蠻所居元置今州舊有縣曰臨西正綂間仍屬本府廣西府叢山深林古無郡邑宋儂智高裔居焉曰特磨道元立廣南路國初改府仍以儂氏官之領州一富州元置順寧府古百濮地也後訛濮為蒲地曰慶甸蒲人世據之自古不通中國元時内附置順寧府并寳通州慶甸縣國朝因之而省州縣入府後𨽻以雲州蠻名猛祐僰夷所居元時内附屬麓川路國初置大候長官司尋改為州土官奉氏領之萬厯間土酋叛討平之改今名𨽻順寧府永寧府古名樓頭睒又名荅藍一名茶藍地接吐蕃蠻泥月烏者居之後屬南詔元呼必賚駐師日月和即此尋内附置永寧州國初因之水樂初陞為府土司阿氏官之領革甸刺次和香羅瓦魯之四長官司鎮沅府在西南極邊地昔撲和泥二蠻居之唐屬䝉氏又為金齒僰夷所奪元初内附立威逺州及案板寨國初改鎮沅州永樂間陞為府領祿谷寨長官司北勝州漢以前屬白國時鐵橋西北施蠻據之䝉氏闢其地為北方睒徙諸蠻以居號劒羌又曰成偈賧又改善巨郡段氏為成紀鎮元置施州後改北勝府國初仍為州初屬鶴慶及瀾滄衛正綂間改𨽻布政司蒗蕖州唐名羅共睒元置今州屬北勝府國初屬鶴慶後改𨽻瀾滄衛新化州舊為馬龍他郎二甸阿僰諸蠻世據之元時内附屬之元江路國初改馬龍他郎甸長官司𢎞治間改今州𨽻布政司全省封疆東界廣西南界交趾西界僰夷北界四川東北五百里至貴州普安衛東七百五十里至廣西泗城州東南六百三十里至貴州烏撒可渡南四百六十里至廣西上林州西南三千五百里至南海西六千里至西洋海西北二千里至吐蕃北四百里至四川會川衛自司至應天府七千二百里至順天府一萬六百四十五里嶺南郭棐曰按周武王孟津之會及于濮人則其入中國自周始矣漢武開邊選守令治其地考之當時置益州郡領縣二十有四曰滇池雙栢同勞銅瀨連然俞元収靡榖昌秦臧邪龍味昆澤葉榆律高不韋雲南嶲唐弄棟比蘇賁古母棳勝休建伶來唯其屬越嶲郡縣有二遂久青蛉屬牂牁郡縣三平夷漏卧句町其在今日幅員視漢更廣大矣傅沐諸將軍開拓之功仰贊我高皇帝廓清之治豈不宏逺哉滇畧卷一
