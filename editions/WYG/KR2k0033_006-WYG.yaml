body:
  text: 滇畧卷六明謝肇淛撰獻畧夫枯木輪囷器於萬乘夜光懸黎終老他山世未有無媒而自致者况荒陬卉服日月所不照臨者哉常璩南中志蒐剔殆無遺佚不過披沙得金存一二於千百耳自玉斧一畫大渡中斷帝車無南指之期侏儒絶見竈之夢湮滅不稱曾不得與蒟醬卭竹同賔上國亦不幸矣國家薪槱化洽聲教四訖然後文人志士鵲起名世者項臂相接然麻中之蓬中駟可以上駕何者其時勢易也余裒往事葢詳於逺而畧於近司馬子長曰巖穴之士非附青雲惡能聲施後世哉漢盛覽字長通葉榆人也學於司馬相如所著有賦心四卷嘗問相如以作賦相如答曰合纂組以成文列錦繡而為質一經一緯一宫一商此賦之迹也賦家之心包括宇宙總覽人物斯乃得之於内不可得而𫝊覽乃作合組歌列錦賦而退終身不復言賦同時有張叔者天姿頴出過目成誦俗不知書叔每疾之思變其俗元狩間聞相如至若水造梁距葉榆二百餘里叔負笈往從之受經歸以教鄉人隗叔通若水人也性至孝母好飲江膂水叔通日入江取水以給冬夏天為出平石至江膂中人謂之孝子石見酈道元水經注許叔善闡人也章帝元和中入中國從師受五經歸教郡人尹珍字道直牂牁母歛人桓帝時自以生於荒裔不知禮義乃從汝南許慎應奉受經書圖緯學成還鄉里教授於是南域始有學焉官至荆州刺史爨習建寧郡人丞相亮平南中收其俊傑為官屬習官至領軍時朱提孟琰者亦以材見收用官至輔漢將軍阿南者酋長曼阿奴之妻也夫為漢將郭世忠所殺欲妻之贈以衣飾阿南恐逼已紿之曰妾欲從君君能從我三事乎曰從曰一須作幕次祭故夫二須焚故夫衣易君新衣三須令國人徧知禮嫁明日如其言聚國人張松幕置火其下阿南抽刀出令火熾盛乃焚夫衣告曰妾忍以身事讐遂引刀自剄身赴火中時六月二十五日也國人哀之每嵗以是日焚炬聚㑹以弔之後人名為星囘節晉龎遺葉榆人也成帝成和二年蜀賊李䧺攻建寧時遺為秀才起義兵攻䧺大破之䧺遁走謝恕字茂理牂牁母歛人咸和八年寧州為李䧺所破南中盡為䧺有惟恕保郡獨為晉官至撫夷中郎將寧州刺史傅寳字紀圖牂牁平夷人仕為尚書郎長安令時號南州人傑唐段赤城葉榆人有膽畧勇於為義䝉詔時龍尾闗外有大蟒吞啗人畜衆苦之赤城披甲持雙刀赴蟒蟒吞之刀出于背蟒亦死土人剖蟒腹出赤城骨葬之建塔冡上煅蟒骨以堊塔焉楊興永昌人䝉氏時為布僰天寳八載率所部入附天子下璽書褒美旌其門子孫世為永昌酋長張志誠善闡人憲宗元和中游成都學書得二王帖寳惜之日臨數過及歸從學書者甚衆王仁求安寧人為河東州刺史敎民以生聚阜財之道賦役均平恩義兼濟人心咸服夷風丕變子善寳以雲麾將軍持節河東諸軍事亦有治蹟閉珊居集者霑益州烏蠻也精卜筮之學其法用細竹四十九枚以代蓍草或以雞骨為之占算如神夷中稱為筮師阿町者馬龍州人納垢酋之後也棄官職隠山谷中撰爨字字如科斗二年始成字母十千八百四十有竒名曰韙書爨人至今習之為書祖云楊竒鯤葉榆人也讀書貫穿百家尤長聲詩唐詩載其一首云風裏浪花吹又白雨中嵐影洗還青江鷗聚處窻前見林狖啼時枕上聽杜光庭灌縣人避地南詔以文章教䝉氏之民太和城䝉國碑其所書也書有法度為時崇尚及卒䝉學士爨泰葬之於玉局峰麓依浮屠立廟世𫝊唐御史祠云賈餘絢蜀人也善屬文唐初寓雲南作兩爨王碑其後文人流寓者則成都閭丘均雍陶咸陽賈島皆以避亂至慈善者唐邆睒詔妻也開元中南詔既強有併吞五詔之心六月二十五日星囘節南詔召五詔燕㑹慈善逆知其謀止夫無往夫曰勢不可已婦乃作鐵釧約其臂而去既而南詔果焚五詔皆為灰燼佯曰五詔醉失火焚死各詔骸骨無從辨認獨慈善輿夫屍而去南詔聞其哲欲娶之慈善閉城自固南詔發兵圍之三月食盡乃盛衣粧西向自縛於座竟以餓死臨卒曰吾往訴夫寃於上帝南詔聞之悔曰誤逼此貞節婦乃旌其城曰徳源城宋段宗牓南詔臣也師子國王伐緬緬求救于南詔遣宗牓將兵救之時詔老子世隆幼權臣楊苴顛熾盛宗牓恐其簒奪乃請曰今臣救緬若權不重人不用命必専生殺乃可許之遂出令限七日齊軍於河尾惟綂矢違限遂斬其將乃苴顛子也既入緬得勝獲師子國旗幟金皷兵仗而還緬王酬以金寳不取取佛舍利至騰越聞詔卒苴顛果簒立宗牓與苴顛書云王崩子幼聞公攝位國家之福也曩承詔㫖率師救緬師子國不戰而潰緬王酬我佛舍利今凱還倘率國中多人迎舍利境上榮甚苴顛得書率國中耆艾服龍衣手執金爐盛陳儀衛至義修相見宗牓云先拜舍利苴顛下拜宗牓斬之歸國求世隆立焉高量成段氏相也避位不仕築城於威楚之徳江村優恤孤寡教誨子弟風俗翕然丕變稱為夷中君子李紫琮大理人以其主段和譽命為進奉使入貢於宋過湖南聞學校文物之盛請於押伴求詣學瞻拜宣聖像邵州守張察許之遂往遍謁見諸生又乞觀御書閣舉笏叩首元髙泰祥者南詔段氏相也世祖率衆二十萬來攻泰祥以死拒戰衆寡不敵走姚州募兵勤王復戰兵敗被虜世祖訊之不屈欲官之嫚罵不受斬于五華樓下臨刑曰段運不囘天使其然為臣死國職也吾事畢矣時烈日當午雷電大作風沙愁慘觀者萬人莫不洒泣元主曰忠臣也命收葬之陳恵亦段氏臣四川明玉珍紅巾攻善闡梁王奔威楚總管段功救之與紅巾戰間伺得玉珍母書語子成功乃返功更其詞募軍中無人敢持書者恵願往功難之恵曰以吾一命救萬人當不負但老母無養耳功曰迎爾母宫吾宫膳吾膳爾無顧也恵遂持書往玉珍得書黙然揮之出飯恵詣功言狀功下令曰紅巾今夜必囘使人偵之果然追至七星闗大破之欲官恵恵不受王昇字彦高昆明人資禀聰敏官至宣慰副使以文章政事名於南詔中州文士宦滇者咸與交遊同里張景雲亦以理學文章顯景雲字天祥官登仕郎楊昇太和人性質超邁儒吏兼通至正中以討明玉珍功官木邦路同知卒子寳為姚安路判官從征克蔚州曹州遷大理路治中梁王段氏搆兵寳曰兩兵相鬬民有供餉鋒鏑之苦極力解和土人深感其徳董文彦通海人任威楚路知事天厯間中慶路鎮將敗狐判引兵攻威楚官吏皆走文彦獨不去賊欲降之文彦怒曰汝食君之祿不思報恩逆天殄民滅棄綱常恨不能殺汝乃從汝反耶賊怒桎梏之文彦罵不絶口截其耳使啗焉文彦嚼血噴賊遂遇害明年敗狐伏誅事聞賜諡莊愍官其子時中為禄豐主簿楊淵海南詔臣事段功功有寵於梁王淵海逆知其不終累以為言功不聽淵海出語人曰吾王與我無生還日矣人怪之曰主有怙寵於君何預淵海曰豈有食人之食而不同其難者明年功果為梁王所害淵海死之楊恵楚䧺人父蚤喪事母劉氏盡孝母遘疾幾危恵不櫛髪不解帶者月餘禱神求以身代劉氏夜夢神告之曰爾壽當終為爾子孝誠所感今特延之次日果瘳壽至八十五卒恵負土營墳廬於傍者三年哀毁喪明有司以聞旌其門蠲其徭役同時昆明則楊立義臨安則張友直董茂春河陽則段文瑞姚州則趙和皆以至孝著稱朝廷旌之麥宗者通安州麽些人也生七嵗不學而識文字偶入玉龍山中見石盎中水飲之遂知禽鳥語一日羣鴉在林有一鴉從南來哀鳴甚急羣鴉從之宗曰此雄鴉為白沙里人所弋迹之果然長而百蠻諸夷之書無不通曉善闡國稱為異人焉楊保楊名太和人皆段氏臣洪武十五年天兵入大理保遣弟名往探緩急約以翌日日出為期名過期不至有頃聞國破遂自縊死名至亦解弓弦自縊國人義之合葬於𢎞圭山阿結者梁王女也梁為紅巾所攻平章段功救之梁王徳功以女妻焉既頗猜忌欲酖之結知其謀以告功不信遂遇害結悲憤作詩自悼不食而死時功女羌奴方幼聞變手繡一旗為志誓復父讐及嫁以付其弟寳詳見雜畧國朝吳孝先嶍峨人也幼名虎兒洪武間方十嵗隨父出遊父偶為虎所攫孝先皇遽間取父所佩刀斫虎腰應手而斃父得生還人咸異之一時稱為孝童丁嵩永昌人有至性自少至壯動無違禮開舘教里中子弟從者如雲洪熙中舉懷才抱徳科辭不就徵宣宗即位下詔求直言嵩陳首務八策一曰正心術則天道應二曰重經筵則宗社福三曰開言路則聞見定四曰用賢才則政治美五曰總大綱則庶務舉六曰汰冗兵則軍儲足七曰重守令則邦本寧八曰崇節儉則財用足上嘉納詔所司強起之至中道卒所著有横峰樵唱李純昆明人少不羈有智畧正綂間舉孝亷為監察御史按遼東時土木之變純曰敵人以我兵勤王而西必出吾不意乃選精鋭八百分布要害敵果以二萬騎直趨遼東未至二十里純設兩伏待半入舉火擊之敵騎中斷斬馘無算自是不敢復窺東陲後巡撫榆林大敵壓境純微服潛行敵中盡得其虛實部署諸將擊其不備大破之敵逺遁去卒于官段子澄太和人為諸生時即以志操自厲鄰女私奔却之不内路得遺金求還其主及入試試官得其卷夢有神人薦之遂舉天順壬午鄉試第一仕至别駕鬱鬱不自得竟謝病去居鄉以盛徳雅量見推里閈謂太丘彦方之亞也楊一清字應寧安寧之石淙人也父景始徙巴陵幼頴悟絶倫一覽成誦八嵗舉神童入翰林憲宗命内閣選師教之十四舉於鄉成進士歴事四朝出將入相經略固原以五千人破敵數萬總督三邊築河套邊城増兵花馬池邊境肅靖其用兵如神算無遺策臨機應變動合事宜再入内閣與張永共誅逆瑾反危為安宗社賴之官至少師大學士卒諡襄敏趙弼字廷直太和人舉成化辛丑進士官至太僕丞清介恬静始終一操僚友有馳競者耻之不與言罷官里居躬耕南畝與農夫耦晏然自足若未嘗顯者同榜姚祥來為監司過其廬弼適芸田投耒見之詞色無怍祥問生事何窶答曰差勝諸生時矣遺之金不受祥歎息而去楊輔字存誠太和人博學多聞隠居不仕孝友好施家貲盡以予人自甘粗糲庭前桂樹扶疎蟠蹙巢居其上命曰桂樓讀書不輟一日硯水枯欲下取之顧視則水溢矣自是遂通靈異神明後入雞足栖巖穴中八十餘卒卒之日交遊盡見其至家為别又有人於安寧道上遇之疑其仙去也所著有桂樓集篆隸宗源行世張志淳字進之永昌人天性聰哲六藝咸通登成化甲辰進士為選部郎用賢㧞滯門無私謁歴官户部侍郎謝病歸功業風節為時崇尚晩嵗著書自娱有南園集西銘通南園漫録續録行世張璁字廷璧平夷人成化三年進士為重慶守治行為天下第一𢎞治初南贑閩廣夷寇為亂以璁備兵江右既至治城池積糧糗練士卒修器械設防禦地方賴以無虞尋以事去郡盗復起詔復任璁賊聞其至悉解散嵗餘復謝病歸家四壁立璁有吏才通達治體盤錯立解所至有神明聲然以剛直不阿未究其用也楊南金字本重鄧川人𢎞治已未進士為泰和令有三不動之謡謂刁詐脅不動財利惑不動權豪撓不動也擢監察御史時逆瑾威震中外都御史其黨也凌辱屬官南金不為屈一日叱欲縛之南金解冠帶曰不作此官便了豈可屈于權奸乎即日出都行二百里瑾使人捕不及除其名嘉靖初起楚臬尋謝病歸性嚴重不茍言笑至於扶良善䘏孀寡竭力為之八十餘卒祠於鄉雷應龍字孟升䝉化人正徳甲戌進士為莆田令有古循吏風所建立皆愜民心巨璫遣人督方物甚横應龍械繫之擢侍御史伉直敢言嘉靖初因災異上八事曰務實學親大臣放宫人去無益正禮教改編發宥罪謫均賦役上嘉納之有中貴營乞織造得請應龍手疏極論之不報恚憤成疾卒中外莫不嗟悼張西銘字希載寧州人母夢黄鶴入帳而生年十三五經皆成誦舉進士為金谿令先教後刑民相戒無敢犯法者縣有虎暴西銘為文禱於神虎遁去蝗傷稼亦隨禱而滅拜監察御史按遼東繕城塹閲軍實劾邊將失律者邊境以寧平生博雅脩潔為政識大體不為苛察卒之日朝野皆悼惜云趙徳宏字有容鶴慶人舉孝亷孝友謙恭人無間言父在京病劇宏為嘗糞及卒哀毁骨立假貸營斂徒跣偕傭人肩櫬以歸廬墓三年歘有白犬朝夕相伴小鳥巢於塋樹呼即啄食知府唐標親至其所唁之賻贈有加出判順慶知潼川咸有異政撫麗江夷土舍髙鵬餽金八百宏立却之里居環堵蕭然當事榜其門曰孝亷楊元字務本永昌人潛心理學沉黙静坐頓悟邵子先天數學人有叩者應驗如響為諸生遊太學歸隠居不仕從學者甚衆當道重其為人時有饋遺悉辭不受強之則封識以待其去任還焉所著有納甲圖九圭數學基指南行世楊全劍川人父繼宗為土官部曲海真所殺全方在襁褓及長知父死非命矢志復讐乃拜海真夫婦為父母一日治酒邀真酒醉拔刀殺之土官聞欲甘心焉全竄入麗江為麗江奏他事連土官得請土官死于獄全曰吾事畢矣遁入山中窮困以死楊士雲字從龍自號九龍山人正徳丁丑進士改翰林院庶吉士授給事中以養母乞歸不復出嘉靖初詔強起之補宫寮辭疾不就人問其故曰吾豈能俯仰人以求進乎居里二十餘年郡縣罕見其面鄉人不知婚娶喪葬之禮士雲條析教誘令易奢為儉通國化之自少至老手不釋卷又精風角每中夜歩觀星緯或喜或歎不以語人所著有皇極天文律吕諸書紀經綸字肫夫臨安人天資純樸不妄一言里中稱為篤行君子嘗市一婢察其言貌頗異問之曰父為百户立功貧迫至此遂養為己女厚嫁之舉孝亷為上蔡令以計擒劇賊黒龍黒象黒虎等開溝繕城百姓利之跡其生平志操無媿於前哲云張含字愈光志淳子也舉於鄉不仕遊梁楚間善為詩李獻吉何仲黙咸亟稱之里居時成都楊修撰慎謫戍金齒意不可一世而獨與含友善倡和不絶手為㸃定其詩有禺山集行世時太和布衣董難者字西羽亦以詩名從慎遊寓蕩山一樓輯轉注古音不樂仕進以終其身孫繼魯字道夫進士仕至都御史慷慨有大節秉正嫉邪不阿權貴守衛輝以忤閹人逮詔獄民遮道號哭卧轍下死者十餘人調淮安有羡銀萬金例為督撫及守用者繼魯分毫不取督撫欲取之亦不與也歴官至都御史撫山西竟以戇直為輔臣中傷下獄死死之日所治民聚千百於京師巷哭之長安為之罷市隆慶初加贈祭諡清愍李資坤字伯生昆陽人也幼以孝友端謹聞舉孝亷歴官郡守所至咸有異績肅皇帝考亷吏為天下第一居家置義塾教子弟不詣公府性剛介寡合而好古信義老而彌篤積書數萬卷硏誦終日自稱一蠧居士李元陽字仁甫太和人少夢神人授錦三丈令吞之既寤詞藻竒進舉進士選庶常吉士以議禮不合謫分宜令有異政拜監察御史侃侃敢言獨立不阿當事者銜之㑹扈駕至荆州荆州守缺即推元陽無何竟罷之元陽俶儻有竒節文章徳行皆為中外崇重家居孳孳為善惟恐不及兩修郡乗卓然成一家言年八十餘卒元陽為御史時按閩墨吏望風解印綬去遇文人墨士雖布衣與抗禮後大理髙崶至風裁尤峻捕境内豪強一空閩至今稱兩御史云郭文字仲炳昆明人浮家泛宅以詩自娱常往來滇洱間自號舟屋楊慎稱其竹枝詞云金馬何曽半歩行碧雞那解五更鳴儂家夫婿久離别恰似兩山空得名又登太華寺一聨云湖勢欲浮雙塔去山形如擁五華來一時詞人咸為閣筆有舟屋集時同邑李尚文者亦布衣有詩名遨遊公卿間及楊林蘭茂安寧張維皆以文章行誼為鄉里崇尚絶意仕進模楷後學時人為之語曰楊林有蘭安寧有張而太和段錦文金齒湯琮曲靖項瑄柴宗儒鶴慶奚謙姚安李黻先後隠居不仕咸有時稱琮題鸚鵡詩云翠閣香閨帶緑隂忽聞靈舌囀嬌音總將懷袖溫存意不稱雲林自在心籠絡反因毛羽誤矜誇休羡賦辭深隴山煙雨春雛小莫遣虞羅著意尋當時目為湯鸚鵡又有明經陶寧者字致逺亦永昌人有詩云杜宇枝頭百舌吟何人不動惜芳心桃花紅雨梨花雪鋪得春愁一寸深又題菜燈有云草堂照破虀鹽夢華屋燒殘肉食心惜其全集不𫝊張志淳南園續録又載一塾師送客詩云紛紛車馬駐江干布襪青鞋我獨難惟有相思心一片隨君千里到長安山行云山勢似墮不墮水聲欲停未停行過小橋囘首天然一幅丹青如此𩔖甚多而識字尤博乃姓名湮沒無聞可惜也嚴清字闕昆明人登嘉靖甲辰進士歴官清介秋毫無取月俸衣食之外以贍親故布袍蔬食終其身萬厯初為吏部尚書裁汰冗倖振拔寒畯中外仕路為之一清無何致政歸家居室廬仍諸生之舊當事者欲為更新力辭不可杜門却軌卒世無所造請論者謂楊襄敏之後一人云楊雨太和人郡吏也有志節不與胥曹偶人餽之問所從來出借貸則不受曰已有之則受十之一久而知其亷也皆紿曰貸㮣不受也雨方正悻直有寃事必力爭於庭守怒笞之起而復爭初疑其有私既知無他亦時時嘉納之一時無寃民云冬月其鞾無襪藉之以草役滿徑入雞足山郡守聞諸當事者往物色之不得也趙愷尋甸人性行誠樸為鄉人所重嘉靖六年銓賊攻城愷首率衆拒敵力不支為所執以刀加頸欲脇從之愷紿之曰待囘率家眷相從賊信釋之愷至家集衆於前曰今賊勢猖獗人民殺戮殆盡吾惟有死而已我若死汝等舉火焚屋毋致我屍骸暴露可也遂登樓自縊而死衆亦舉火闔家皆自焚惟幼男景新年十三以他出得免時有庠生馮世傑火頭必沙者俱以抗賊死國朝以遷謫流寓入滇者不可勝數而最著者則學士王景常武功伯徐有貞修撰楊慎云景常名奎松陽人洪武初為山西參政以事謫戍臨安博學宏才詩文高古一時翰墨之士咸從之遊無何召還為翰林學士有貞初名珵字原玉姑蘇人其學自天文地理兵法河渠以至隂陽方術風角醫卜無不洞曉詩文雄偉竒麗謫戍金齒僦一小室荷殳從役不異行伍三年赦歸慎字用修成都人以議禮廷杖戍永昌歴遍湖山以詩酒自娱興到輒揮洒淋漓夷夏得其片紙藏為至寳從遊者以千百計竟卒于雲南今髙嶢其讀書處也又有韓宜可字伯時山隂人劉寅崞縣人髙莘山東人祝璀徳興人皆先後謫戍至流風餘韻至今人能道説之滇畧卷六
