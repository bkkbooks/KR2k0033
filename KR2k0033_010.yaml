body:
  text: 滇略卷十明謝肇浙撰雜略雜者事之支也稗官之野記里巷之叢談以及方外殊踪神鬼誕跡雖有無不可知而嵬瑣詼譎往往足以昭勸戒補遺逸佐噴飯張談鋒有其録之莫敢棄也以其不附於正事故謂之雜昔虞初酉陽說以千百計而滇僅僅止此掛一漏萬俟之後人邃古之初蒼洱舊為澤國水居陸之七邪龍據之是名羅剎好啖食人居民鮮少有一老僧自西方來託言欲求片地藏修羅剎問所欲僧身披袈裟手牽一犬指曰他無所求但欲吾袈裟一展犬一跳之地羅剎諾僧曰既承許諾合立符券羅剎又諾遂就洱水岸上畫券石間于是僧展袈裟縱犬一跳已盡羅剎之地羅剎倣徨失措意欲背盟僧以神力制之不敢背但問何以處我僧曰别有殊勝之居因於蒼山之上陽溪神化金屋寶所一區羅剎喜過望盡移其屬入焉而山遂閉于是僧乃鑿河尾泄水之半是為天生橋今洱水島上有赤文如古篆籀云是買地券僧即觀音大士也永平今有觀音叫狗山云諺曰娘娘叫狗山九轉十八彎當水初泄時林藪蔽翳人莫敢入有二鶴日從河岸行人尾其跡始得平土以居故大理又名鶴拓云邪龍既為大士所除其種類尚潛於東山海窟惡風白浪時覆舟航有神僧就東岸創羅筌寺厭之誦經其中一夜忽聞大震動聲僧喝之見十百童子造曰師在此壞我屋宅吾屬不安請師别遷僧厲聲曰是法住便住有何不可遂失童子所在明日寺下漂死蟒百餘自是安流以濟僧隨遷化碧雞山相𫝊周惠王時有鳳凰翔集於此時人不識目為碧雞因以名山教授牟俊有詩云鏡涵逺近三千頃劍卓西南第一峰鳴鳳不來人事變蒼煙依舊鬱重重其神即東天竺國阿育王長子也封碧雞景帝又别記云阿育王有子三人龍馬一匹三子皆欲之王意欲與季子而患其爭乃以轡私授季子即驃苴低也縱其馬命三子云捕得者與之馬奔往善闡今安寧州龍馬跳澗山并草溪井龍馬河即其所經之地石上蹄跡深尺許三子追之長子意馬渴飲滇池伺而邀之不獲仲子意馬必過甸中伺而邀之亦不獲季子往東松林以轡邀之馬見轡而就遂獲之長子見季子得馬遂沒于碧雞山下為神仲子沒于巖頭為神封上甸景帝季子亦沒于松林為神封金馬景帝羝羊石在姚安東一里許昔䝉氏時洞庭君愛女於此牧羊有羝餂土驅之不去掘地遂得滷泉名曰白羊井人即其地立聖母祠及開橋頭井得石羊云即餂土之羝後歸於聖母祠其井即白鹽井也江川縣雙龍鄉其山無石皆螺殼積成昔有夷婦浣衣于河忽螺精出見婦驚急以浣衣盆覆之其精遂止後人因以覆盆名山漢永昌太守劉安世鑄黃金為蛇以獻梁冀益州刺史种皓糾發其姦不果獻冀恨皓因以他事陷之李固上疏伸理太后赦皓免官行永昌以金蛇輸官冀從大司農杜喬借觀不與由是見忤竟以他事誣喬而殺之丞相亮征孟獲入滇滇人未知琴亮居南常操之土人有願學者乃為著琴經一卷述琴之始及七絃十三徽之音意於是滇人始識鼓琴又從征者冬暮思歸各與一磚曰卧枕此即抵家從之果然不用命者終莫能歸因號雞鳴枕又嘗用炊釡自隨不炊自熟以防不時之需魏明帝時昆明國貢嗽金鳥常吐金屑如粟此鳥畏寒乃處以辟寒臺宮人爭以鳥吐之金用飾叉佩謂之辟寒金故宮人相嘲曰不服辟寒金那得聖人心隋開皇中太平公行軍總管史萬嵗擊南寧爨玩諸夷行數百里見諸葛亮紀功碑銘其背曰萬嵗之後勝我者過此萬嵗令左右倒其碑其碑趺志曰史萬嵗不應仆吾碑萬嵗駭服重立其碑而進南詔神武王有女欲為擇配女曰父王擇配非天婚也我欲倒坐牛背任牛所之不問貧富貴賤牛入之家則嫁之王從其請牛至一委巷左右側其角而入其家老嫗走避强之乃出問有子否曰子往樵薪女即拜嫗為姑頃之其子負炭回見巷有騶從走避女招之入曰此吾壻也令報王王大怒遂絶其女一日壻問女首飾是何物曰金也壻曰吾樵處此物甚多明日載回皆金磚也頃之王怒解女請宴王王難之曰汝能作金橋銀路吾當來果作以宴王王歎曰信天婚也後人名其地曰轆角莊言方牛入時角如轆轤轉入陋巷也唐南詔永貞間有雞足僧小沈者與二僧同住一庵小沈入城乞食詔問識何法門小沈答云我能使死者生極樂世界詔令國中但有死者請小沈起棺如此十餘年有讒於詔曰小沈妄人也云能超度死魂何所證驗臣願入棺試之詔如言請小沈起棺將至化骨之所啓棺視之誠死矣懇小沈求生沈又作法遂蘇死者悔曰我已生在七寶宮殿中如何復來此小沈遂還舊庵見二僧問食二僧曰汝從城中來乃不裹糧却至此欲食耶小沈遂走叩迦葉石門門訇然中開二僧追呼至則石門閉矣二僧悔恨焚身門外焚處生柏二株或謂小沈迦葉化跡也太平廣記載韋陀將軍童真梵行不交天欲𢎞護佛法唐乾封二年告宣律師曰西洱河有白石其土人造多寶佛全身相安在西洱河鷲山寺蜀青城山人往彼興易請佛道由郎州大小勃律三千餘里方達西洱河河大袤百里廣三十里中有洲島古寺經像尚存無僧住守經文與今相同時聞鐘聲百里殷實每年二時供養古塔基如戒壇二重塔上有覆釡彼土諸人見塔每放光明即以素食祭之求其福祚也其地去嶲州二千餘里去天竺不逺方請像時由西洱河見岸上小童行遊謂是山鬼遂即殺之不知是海神因爾神怒踏覆前船人像俱溺晉時有僧於成都多寶寺前見土墳出隨除隨長終不可平乃深掘丈餘獲像及人骨俱在故船其髏骨肘脛悉皆粗大數倍過於今人即迦葉佛時閻浮人壽二萬嵗時人也今時劫減命促人小固然不足怪也出像之時牽曳艱難弟子化為老人指揮方便乃出其花趺上有𨽻書多寶字因名多寶寺律師問曰𨽻出李斯如何周時已有此體耶答曰見今南州四面文字俱是篆𨽻但以海路遼逺重驛莫𫝊耳觀春申君墓銘亦是𨽻字則知不出於李斯也唐初居人髙氏生一子一女女名谷女年十三尚不能言其兄從軍東川三月不歸谷女一日忽語嫂曰兄缺食我往餉之家喜其開言戲應之曰汝將裹飯去谷女果行家人笑躡其後至盤陀石下入水洞而去覓之不得衆方驚怪未己谷女忽至謂家人曰兄一旅之衆皆已飽矣具言軍中地形事勢其嫂不信東川距此二千餘里安得即至不知其有神足也乃以衣授之曰汝送與兄取其垢衣來谷女如其言果取垢衣來自是送餉日以為常谷女常牧一白猪一日謂家人曰軍回矣遂騎白猪化為象騰空而去乃知為普賢化身也土人即其地建寺曰谷女寺後訛為谷鳥寺云唐時楊都師創洱河東羅筌寺寺前有田四十畝每栽秧約三日傭者戲師曰若能繫日當為畢栽師默念呪田栽既而日乃暝傭歸而後知已歷二晝矣山下有黑龍常作風浪覆舟師以白犬吠之龍怒而出師視龍猶蜒蚓若教誨之有頃龍馴俯而去先是河浪九疊師以念珠鞭之去其三疊河乃翕順可舟唐時漁人於洱河岸得鵰遺卵收之有頃破卵而出為嬰兒漁人異之不敢加害嬰兒能食即解種種伎倆長而為僧居萗模莊人呼為萗模師既長能呼致風雨驅役鬼神指使如意又能以符呪化水石為酒食千百人皆醉飽南詔憚之師輒化為鵰飛集髙興寺不知所終唐永徽間有一老僧戴赤蓮冠身披袈裟持鉢至䝉舍細農邏家乞食時農邏父子耕巍山下妻婦往餉見僧乞食遂食之再炊往饁僧坐不去持饁前行而僧業已先在復向乞食姑婦驚怪又食之返而復炊且至巍山見僧坐磐石前有一青牛左有白馬朱鬛右有白象各馴伏上覆雲氣雲中有二童子一執鐵杖於左一執金鏡於右姑婦驚喜再供之僧問何願二女不言僧曰奕業相承二女促農邏等至則但見五色雲中一人持鉢而坐倣佛見二童子唯餘磐石上衣㾗及象馬牛之跡耳楊波逺東漢時人號為神明大士唐永徽以後常騎三角青牛逍遙以遊偶逢神僧於三陽峰麓為設一供陳石案長丈六闊六尺但以一手持將今石案猶存千夫莫舉後不知所終唐滇僧道清者姓楊殉道忘軀日課經典感現觀音大士遐邇欽風漁者焚其網酒家隳其具䝉氏冊為顯密融通大義法師一日微哂而化火中彩雲盤礴舌根不爛如紅蓮然南詔時威楚西五十里許有五樓山有王載𤣥張明亨者栖焉志在清虛日載酒峰巔長嘯狂吟時人莫之識也一夕飲酣見一道人乘風而至飄飄然丰采迥異二子迎之曰或者先生能劇飲耶先生莞爾而笑問姓名則曰無心昌道人遂促膝傾觴淋漓醉卧先生忽言别二子戀戀不能捨先生曰來年秋風起塞上吾當再至及期二子重登塞上目極欲狂口占云去年霜草斷人魂滿江秋水白紛紛猶記别離亭畔約西風塞上未逢君吟罷清風徐來彩雲飛舞遙望則昌先生至矣手執一瓢盛米汁其中命二子飲之王飲張不飲先生覆之三人語歡甚時萬里澄空碧天清籟先生曰將得五樓明皎月換來一頃玻瓈風復題壁間云帶劍飄然負不羣幾回揮袖拂紅塵不圖紫綬朝金闕獨愛青山鎖白雲踽踽一身空蓋世茫茫四海覓知音與君不負當年約一榻清風到五城吟罷出户二子隨之先生曰仰首二子仰見祥雲繚繞瑞氣彌漫先生曰時當行矣騰空而起王子亦隨起張子踴躍無措伏地大呼先生回顧曰子仙骨已成遲一劫耳張子遂化鄉人瘞之冢上流光掘視如水晶石然是夜夢曰吾功行尚缺當以骨救瘡痍試之果效後人思其勝事乃窺測之昌無心是吕其吕祖乎遂指閣關灘名曰吕閣後為元兵所焚改閣為合為有合襟水也遷驛署居其間劍川崔君廟神姓崔名子玉祁州人正直不撓仕唐為長子令再遷衛州皆為民除害民德之時顯夢異立祠於州南三里相𫝊崔君昔於五月五日諭人曰是月十六日毋得殺生及漁獵犯之必遭官刑隂譴時有朱竇二人獵一為門吏所獲將執之官求免是夜一黃衣吏喚二人至公庭見神王者冕服正二人罪一減其年一縮其祿叱還後果如所夢云唐䝉氏時楚雄有野馬二風雨鬬於原野久之化為龍大者逸入東南村塢小者逸入西南山谷僰人呼馬為驃因以名村無言和尚姓李氏紹祖父精密教法嘗持一鐵鉢入定呪誦欲晴則鉢內火光燭天欲雨則鉢內白氣上升遂雨䝉氏封為灌頂國師嘗於崇聖寺講經有老翁立聽畢乘風雲而去衆驚問之曰洱水龍也五代趙善政時浪穹縣天馬山下有山狀如龜蛇即善政所居其山左澗有水右澗無水有樵青神者善呪法衆樵謂之曰若能分水於右澗乎青神曰不難耳遂以斧柯觸山右澗水即湧出與左澗均人居在右者咸利之沒後為神附祀於善政之廟焉段氏素興以宋慶厯中嗣位性好狎遊廣營宮室於春登堤上多種黃花名繞道金稜雲津橋上多種白花名縈城銀稜今二稜河名由此也每春月必挾妓幸載酒自玉案三泉遡為九曲流觴男女列坐鬬草簪花以花盤髻上為飾今花中有素馨者以素興最愛故後人名之也又有花遇歌則開有草遇舞則動素興令妓歌者傍花舞者對草宋寧宗嘉定十七年甲申元太祖南征東印度至鐵橋石門關前軍報曰有一角獸形如鹿而馬尾其色緑作人言曰汝主宜早還帝以問耶律楚材對曰此獸名角端能言四方語好生惡殺此天降符以告陛下陛下天之元子天下之人皆陛下之子願承天心以全民命即日班師大德間昆明池有蛟化美少年淫婦女居民苦之有趙伽羅世精阿叱力教尤通梵經鄉父老禮請治之伽羅即遣黑貌蠻奴擒至以水噀之蛟立見形因斬之怪絶人問蠻奴為誰曰此大黑天神也後不知所往至正元年玉案山産小赤犬羣吠遍野云天狗墜地為赤犬其下有大軍覆境又時雨鐵民舍屋皆穿人物值之多斃號曰鐵雨泰定間有大星隕于􅑇嘉縣之虛初山化為黑石狀如瓜上有㸃如星擊之鏘然有聲人不言舉之則動言則弗動土人以為怪積薪焚之雷雨交作衆懼而止大理總管段功以破紅巾之功梁王德之以女阿結妻之奏授雲南平章功戀戀不忍歸國其夫人髙氏寄樂府促之歸其詞曰風捲殘雲九霄冉冉逐龍池無偶水雲一片緑寂寞倚屏幃春雨紛紛促蜀錦半閒鴛鴦獨宿好語我將軍只恐樂極生悲寃鬼哭功得書乃歸既而復往左右譖之於王曰段平章此來大有吞金馬咽碧雞之心矣盍早圖之梁王密召阿結命曰親莫若父母寶莫若社稷功今志不滅我不已脫無彼猶有他平章不失富貴也今付汝以孔雀膽一具乘便可毒殪之主澘然不敢受命夜寂人定私語平章曰我父忌阿奴願與阿奴西歸因出毒具示之平章曰我有功爾家我趾蹶傷爾父為我裹之爾何造言至此三諫之終不聽明日邀功東寺演梵至通濟橋馬逸因令蕃將格殺之阿結主聞變失聲哭曰昨暝燭下才講與阿奴雲南施宗施秀煙花殞身今日果然阿奴雖死奴不負信黃泉也欲自盡梁王百方防衛主愁憤作詩而死詩曰吾家住在鴈門深一片閒雲到滇海心懸明月照青天青天不語今三載欲隨明月到蒼山誤我一生踏裏彩錦被名也吐嚕吐嚕段阿奴吐嚕可惜也施宗施秀同奴歹歹不好也雲片波潾不見人押不蘆花顔色改押不蘆北方起死回生之草名肉屏獨坐細思量肉屏駱駝背也西山鐵立霜瀟灑鐵立松林也平章從官員外楊淵海亦題詩粉壁飲藥而卒其詩曰半載功名百戰身不堪今日總紅塵死生自古皆由命禍福于今豈怨人蝴蝶夢殘滇海月杜鵑啼破㸃蒼春哀憐永訣雲南土綿酒休教灑淚頻段寶者功之子既嗣父職明玉珍復侵善闡梁王遣叔特穆爾達罕借兵大理時寶已長答書云殺虎子而還喂其虎母分狙栗而自詐其狙公假途滅虢獻璧吞虞金印玉書乃為釣魚之香餌繡閨淑女自設掩雉之網羅况平章既亡弟兄罄絶今止遺一獒一奴奴堪再贅華黎氏獒又可配阿結妃如此事諾必借大兵如其不可待金馬山換作㸃蒼山昆明池改作西洱池時來矣書後附以詩云烽火狼煙信不符驪山舉戲是支吾平章枉死紅羅帳員外虛題粉壁圖鳳别岐山祥兆隱麟遊郊藪瑞光無自從界限鴻溝後成敗興衰不屬吾梁王見之恨寶入骨寶聞髙皇帝開基金陵乃遣使間道歸欵時有妖巫女歌曰莫道君為山海主山海笑諧諧園中花謝千萬朵别有真主來寶數日疾卒段功既為梁王所殺有女名僧奴志恆不忘復讎將適建昌阿黎氏出手刺繡文旗以與寶曰我自束髮聞人稱父寃恨非男子不能報此旗所以識也今歸夫家收合東兵飛檄西洱汝急應兵㑹善闡因作詩二首曰珊瑚勾我出香閨滿目澘然淚濕衣氷鑒銀臺前長大金枝玉葉下芳菲烏飛走頻來往桂秀梅馨不暫移惆悵同胞未忍别應知含恨㸃蒼低又何彼穠穠花自紅歸車獨别洱江東鴻臺燕苑難經目風刺霜刀易塞胸雲舊山髙連水逺月新春疊與秋重淚珠恰似通宵雨千里關河幾處逢僧志登者永昌人姓馬氏有戒行結庵於龍泉門外入山五里而居之忽一日謂其徒曰炊十三人飯備碗筯及羮皆如其數中夜以俟至夜有盜入果十三人志登坐牀不動徐曰昨已知汝輩來矣盜入視其所備皆如其人遂羅拜而去雲南府治西二十里許有進耳山國初太祖髙皇帝方有睿謨未播而衢童即謡於道求其故知為土地神所泄因謫其神於雲南後憑巫於此故名進耳成化間有西僧號哈爾瑪遊䝉化終日兀坐服麻花善吸水入腹徐則放出而其竒邪尤不可勝言䝉之富家競供奉之憲廟聞其名召至京師試之坐關未滿適李繼曉伏誅哈爾瑪無依遁回雲南為巡撫張誥所擒時大暑啖之巴豆炙以爐火命其兀坐不令移易數日死太監錢能北直人兄弟四人俱有寵成化間能號三錢來鎮雲南其怙寵驕蹇貪淫侈虐古所未有不能悉記有二事最可資笑語者雲南有一富翁病癩其子頗孝則執其子曰汝父癩𫝊於軍士不便且又老矣今將沈于滇池其子出厚資乃免又王姓者業賣檳榔致富人呼為檳榔王家則執其人曰汝庶民也敢惑衆僭號王家王復出所有方免後繼之者雖貪求無厭聞斯事未嘗不為發笑也能後守備南京𢎞治末老死京師不識天道何在或言其幼畜錢寧于滇晚俾専鎖鑰能病寧利其所有遂進毒于能而死寧初名福寧兒者是也本李巡檢之家生子然則能之報亦不為無也成化庚子五月內雲南麗江軍民府巨津州白石雲山約長四百餘丈距金沙江計二里許一日忽然山裂中分其一半走移于金沙江中與兩岸雲山相倚山上木石依然不動江水壅塞逆流淹沒田苖蕩析民居州府具申上司鎮守太監等官具聞諸朝雲南屢有邊報此山之兆也成化甲辰楚雄太守邵敏自南都來路過洞庭舟中夢一方巾藍袍人來謁曰紫溪龍王也及抵郡祀龍見塑像儼如夢中所見大駭異遂飭廟宇䖍祀之迄今無敢怠焉永昌東南七十里曰施甸長官司者舊廣夷州也地有名鐵毛觜者有眢井深窅莫測𢎞治戊午冬有莊指揮逐獵縱一鶻搏雉雉入井鶻隨雉入莊命左右尾之至井鶻雉復騰起而聞井中嗚嗚有聲衆疑為鬼也則隱隱有人以白莊莊命引繩下曳之則一婦人遍體衣觸風皆碎而氣息僅存徐飼以粥飲逾日始能言曰奴姓張氏大理人也從夫楊拱貨易於施甸夫姦其叔母情好甚篤因紿以歸寧至此則束縛手足共推入井中尋下大石如雨賴蔽于崖得不死徐則所束縛繩索漸斷見井有掬水因取飲之今四十二日矣既出髮盡脫不存時西安謝御史朝宣適按永昌莊以告謝謝謂姦叔母事大不理命莊杖其夫而歸張氏於其母𢎞治間景東忽然昏黑三日往來相值面目莫辨若夜行焉有司聞于朝上命廷臣集議行考察法南京刑部左侍郎兼都察院右僉都御史樊瑩承德意考察罷黜文武官一千二百員有竒𢎞治中內官吉慶守金齒路選京師惡少從行括民無遺錙銖勢若虜掠貨多寶石慶盡擇美者櫝以隨籍扃一室晝夜守之羣從窺利罔獲日謀所以死慶㑹慶病渴各從禁水弗與醫來私賂之進金石藥慶燥極呼親信出櫝中貨易水活命得石者復馳去不顧慶突地而號髮焦膚裂死從者祕其喪各載貨逃去尸蛆逾月官司方為瘞於途兵書華容劉公大夏吏部撥送雲南一承差見之獻㸃蒼石屏風一面不納承差乃懇言二錢市之非比重禮叩頭求不已公取而玩之云置諸室暇則玩之承差喜甚不數日呼之曰看足矣遂歸之承差出語人云大理買此用銀八兩以為上驛計而值如此誠命也歎息而已白崖有屠子至一婦人家買猪婦人得銀三兩置於几屠子匿之婦人自縊死其夫歸見婦死不知其故棺殮將葬為暴雨所阻明晨婦乃在門夫怪問之婦曰我但記自縊不知何以復生亦不知從何來夫乃偕婦往看棺尸則棺中無尸只見屠子已死跪於棺旁手捧一物乃前銀三兩也屠子家驗屠子尸乃雷擊也鎮守金騰劉太監玉任一尚京官言無不從橫暴特異至騰越强姦婦女不可計騰人至千百告於御史訊之不言搒之乃曰京中某寺僧也寺與玉鄰玉時借其銀後因幹鎮守盡以所畜假之玉無償因言金寶婦女之多誘之養髮還俗名之曰尚京官也幼出家承師之資足以自養因誤於玉遂至此官乃笞而捨之正德間永昌人於哀牢山掘地得古碑段中庸撰文其略曰夫人諱福則伽宗胄裔之嫡女也事君子也樂其道而不淫逮下妾也用其能而不妬又曰月出雞鳴照哀牢之名縣鴻飛滇渚下潯陽之長江餘文俱零落不可識葉瑞滇臨安人為庠生貧甚好飲酒一日醉卧窑溝中夜深聞有數鬼曰大水將至恐淹死辛巳進士相與將瑞舁至諸天寺大門相距可三百步及覺則在寺門首矣溝果大水泛漲翌日記鬼所言以為笑蓋已年無春榜也是日應本府贊禮生竟以醉誤太守責之試其文佳焉月分俸一石以給後果成正德庚辰進士以車駕南巡至辛巳始殿試何宗魯酆都人由舉人為浪穹知縣剛正有能聲知府干璠惡其不遜下獄禁食死明年干入覲逆旅主人治辦甚備干問之對曰有浪穹何知縣先來令預潔館舍以待耳干怪之頃之干入厠遂死何之死也家中忽聞其聲喚家人曰吾為干知府所殺已奏上帝語吾復讎今回家待時汝可設位日獻常餐於位上言語理治家事及鄉人禍福一日其壻禱曰欲於某處買猪苦乏人牽奈何答曰汝但去猪自隨來不用人牽也壻如言往猪至半路奔失壻歸告何笑曰汝午飯不獻故牽猪别去耳汝到彼獻飯猪即來果如其言得猪一日忽語曰吾今報讎時至往矣數日又曰吾讎已報上帝命吾為某處城隍今日去矣自此遂絶楊用修既戍永昌僑寓安寧遍遊臨安大理諸郡所至攜娼伶以隨夷酋欲得其詩翰不可得乃以精白綾作裓遺諸妓服之酒間乞書楊欣然命筆醉墨淋漓裙袖酋重賞妓女購歸裝潢成卷楊後知之更以為快有規之者答曰文有仗境生情詩或托物起興如崔延伯每臨陳則召田僧超為壯士歌宋子京修史使麗豎㸐椽燭吳元中起草令逺山磨隃麋是或一道也走豈能執鞭古人聊以耗壯心遣餘年所謂老顛欲裂風景者良亦有之不知我者不可聞此言知我者不可不聞此言滇南范寅為諸生屢試不第遂成心疾出遊不知所之嘗語其子師顔曰吾葫蘆山人也爾他日於此訪我師顔以嘉靖壬子舉於鄉次日即裹糧尋父僻壤遐陬無弗到行三年至蜀有葫蘆寺扣主僧謂三年前有稱葫蘆山人者寓此今死矣瘞之近岡且出其手札真寅筆也師顔慟絶芟莽得穴刺血入骸斂而返葬焉御史黃中疏而旌之又有趙重華太和縣人父廷瑞亦以不第逺遊莫知所往華甫七嵗至年二十一母沒乃出尋父榜其背曰萬里尋親至武當見寺壁有字云嘉靖四十四年十二月二十二日大理趙廷瑞至此華至日乃萬厯六年十二月二十二日也又間關至建康祈於三茅君夢神謂之曰爾父故在如是者三至毗陵遇老僧示往無錫南禪寺語訖不見明日至南禪見皤髮老叟曝背廊下華心疑之伏地曰我雲南人有父出遊尋覓不見叟曰我亦滇人出遊時一子七嵗潜然淚下各通名姓相持而哭迎歸故鄉吳興茅坤為文以記之大理趙汝濓者應嘉靖壬午省試與友人往淨耳寺祈神途次遇一道人拉趙過松下出䄂中一劄曰此虎榜也趙取觀之無其名因懇求道人笑曰念汝善人待我另處乃遍閲衆名云俱不可易惟第三人德行稍劣可易與汝即挖補改趙汝濓字復用圖書三顆鈐蓋别去及揭曉日填榜至三名監臨羅侍御疑而未定二司云此仕宦之子素有才名羅云如此則私矣即刻挖寫趙名用印三顆鈐之一如道人所挖補余從祖大司農杰有金梅詩其序云滇臬憲黃者有養子閩福清人也慧過其諸兒諸兒交妬之乃呼從吏陳綸告之曰能全是兒者惟掾幸子之綸收而撫焉先有子􅙆名黃子曰翀翀􅙆交相愛無何竝試弟子員督學使者察翀籍閩也黜落之綸乃泣遣翀還翀不得已歸歸則登閩嘉靖辛卯省試􅙆亦起家于滇後厯官中原逆旅相過率悲喜交集以為常􅙆宅有金梅忽枯一枝􅙆異之未幾翀之訃至逾年復枯一枝􅙆大異之未幾􅙆卒二氏子姓竒其事為作金梅傳索余為之賦翀復姓游名新祐終香河令詩云丈人收春春滿堂丈人愛花花繞廊金梅一株更竒絶殊根合幹參羣芳南枝乍長北枝短北枝暖比南枝暖雨露無私春色勻庭前嵗嵗花開滿自從花飛歸故叢江鷗海燕各西東連枝曾入長安市春風幾度桃花紅二十年來八千里岐路相看悲復喜叢桂山原分小大紫荆花合同生死北枝既瘁南枝零卉木無情似有情只今肥瘠分秦越四海誰堪託弟兄昆明梁王墓甚多皆元王子也相傳嘉靖間板橋之北一村民每夜見墓有光疑為寶藏糾力盜開空無物惟破匣中一劍而已民取歸家中夜光大起燭天四鄰謂火發趨問之至則寂然民疑劍為怪恐伐冡露遂裹劍潛投山麓小池內劍一得水如生物漸透土入山坎遂成巨潭其洞深廣杳𡨕探之隱隱有聲人不敢入蓋龍劍所為也楚雄城西鳴鳳山腹有磐石髙五尺餘闊倍之其裂隙處僅可容指而內稍闊不可度有物如蝦蟆而差小形絢五色隱見不常蓋數百年物也過者每以銀及貝呼而投之或視或含然罕得遇相值者輒有吉應焉臨安王得民買屋城外天井中鑿魚池三尺許得大石版起其下有小方塘四周磗甃中一小几几上燈一盞書一册開視兵書也末載採戰引魂二方得民試之殊效其引魂方于婦人則呪一物與食其婦夜即至于女子則得其生時呪之無不驗其弟恩民為諸生時聞而借觀得之即棄書水深處兄大恚然無如之何其後恩民成進士位中丞人謂棄此書之功也王純心滇臨安人登嘉靖辛酉鄉試年三十餘嵗病死一晝夜矣惟心微熱未敢斂即時託生於其妻弟家開目見其母妻弟婦也即趨出門外已聞房內哭聲又至河南陳州一巨室託生見一貴人鬚睂皓白盛服焚香祝天以乏嗣也既生知為河南嫌其逺又奔出又聞房內哭聲出至㕔樹前見樹上黃蜜果甚佳摘其一食之竟奔回家中大呼而蘇妻孥驚視但聞滿口蜜果香氣後任綿竹知縣又三十餘年而終南園漫録載永昌有偷兒知一家夫不在而其母與妻織布且畢夜伺之寢將穿窬取之至久姑詈其婦怒而先寢俄而婦自經于機旁偷兒大呼其鄰與姑起而救之婦得不死又一賤娼滇士有事至者醉宿其家有銀數兩在䄂中夜密置枕下向曉有友急呼之告以家禍其士驚起遂歸行十里許方憶所袖銀置娼家枕下自以為必不可得矣試返而求之娼曰固在此完封還之夫人至為盜為娼本心已盡亡矣而因憐死止盜因假義不取然則仁義之根於性有固無時而息耶而仕以行義乃貪利無厭殺人喪已方揚揚然大小安慶而略不恥何也又永昌有符丁二生相友善丁後病而有子支漫不事生産丁乃以白金若干託符曰子支漫不事生産身後恐即耗煩君密收訓使治生改則畀之不可改則君之物矣符許諾日過其子告以其父命之篤子稍改悟曰恨無資以營生計符許借之借而叩之果不費踰時再詢而叩之曰恨少耳若多假焉生彌遂矣則再借之如是者三子曰若得若干業可成矣符知其可也則曰汝當具牲醴來吾為汝轉假其子如命往符則以牲醴置丁之靈几前為文告曰君不鄙豫託豫以子而委我以財今君子克家矣財凡若干兩盡以付君子君可以無慮矣遂歸時丁頗裕而符更窶財不相負不足論而又能忠誨其子俾有成可謂難矣郡人盡能道其事然八十年來近似此者何嘗聞耶又可為世道嘆也隆慶末年隴川有百夷夫婦入山伐竹剖其中有水水中有活魚六七頭持歸烹食之夫婦皆化為虎殘害人畜不可計百方阱捕竟不能得廬陵郭公撫黔一日中夜其夫人蹴公覺問曰猛廷瑞何人公大詫曰爾婦人安知猛廷瑞且中夜問何為夫人曰適夢有人裝束如廟中金甲神來謁云我猛廷瑞也過此欲見中丞不得近故來謁夫人耳公曰汝盍問其所由來夫人曰吾固問之渠云吾為陳巡撫寃死訴帝得請今歸耳公心異之不敢語人逾月而用賓被逮之報至滇略卷十
